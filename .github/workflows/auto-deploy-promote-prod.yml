name: Auto-deploy merged promote-prod PRs

# Completes the production promotion lane: when a promote-prod/* PR merges
# into deploy/production, dispatch promote-and-deploy.yml with the
# source-sha recorded in .promote-state/source-sha.
#
# Why this workflow (and not `on: push: deploy/production` inside
# promote-and-deploy.yml): GitHub Actions reads workflow files from the
# branch being pushed. deploy/production has no `.github/` and must stay
# state-only (docs/spec/ci-cd.md — "deploy branches are environment state
# only"). So the trigger has to live on a branch that does carry
# workflows. Main is the right home, mirroring flight-preview.yml's
# pull_request-merge pattern for preview.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  actions: write # needed for `gh workflow run`

concurrency:
  group: auto-deploy-production
  cancel-in-progress: false

jobs:
  dispatch:
    # Only fire on merged promote-prod/* PRs targeting deploy/production.
    # Closed-without-merge and non-promotion PRs are ignored.
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'deploy/production' &&
      startsWith(github.event.pull_request.head.ref, 'promote-prod/')
    runs-on: ubuntu-latest
    steps:
      - name: Read source-sha from deploy/production
        id: src
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The merge landed this file onto deploy/production; read it via
          # the contents API so we don't need a checkout.
          RAW=$(gh api \
            "repos/${{ github.repository }}/contents/.promote-state/source-sha?ref=deploy/production" \
            --jq '.content' 2>/dev/null || true)
          if [ -z "$RAW" ]; then
            echo "❌ .promote-state/source-sha missing on deploy/production — aborting auto-dispatch."
            echo "Dispatch promote-and-deploy.yml manually if this was intentional."
            exit 1
          fi
          SRC=$(echo "$RAW" | base64 -d | tr -d '[:space:]')
          echo "source_sha=$SRC" >> "$GITHUB_OUTPUT"
          echo "Dispatching production deploy for source ${SRC:0:8}"

      - name: Dispatch promote-and-deploy.yml (production)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run promote-and-deploy.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f environment=production \
            -f source_sha=${{ steps.src.outputs.source_sha }}
          echo "✅ Dispatched promote-and-deploy.yml production for PR #${{ github.event.pull_request.number }}"
