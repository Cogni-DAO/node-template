name: Build Multi-Node

# Builds all node apps + services for k3s deployment via Argo CD.
# Independent per-node builds: each node has its own Dockerfile, its own image, its own digest.
# No bespoke skip-build logic — Turborepo --affected is the future optimization (task.0260).

on:
  push:
    branches: [integration/multi-node, canary]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: read

concurrency:
  group: build-multi-node-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ── Per-node matrix build ──────────────────────────────────────
  build-nodes:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [operator, poly, resy]
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          # Canonical GHCR package name. github.repository returns the redirect
          # (node-template) but GHCR stores as cogni-template. docker push follows
          # redirects but imagetools inspect does not.
          IMAGE_NAME="ghcr.io/cogni-dao/cogni-template"
          IMAGE_TAG="preview-${GITHUB_SHA}"
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tag
        id: tag
        run: |
          NODE="${{ matrix.node }}"
          IMAGE_NAME="${{ steps.meta.outputs.image_name }}"
          IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"

          if [ "$NODE" = "operator" ]; then
            # Operator uses the base tag (backwards compatible)
            FULL_TAG="${IMAGE_NAME}:${IMAGE_TAG}"
          else
            FULL_TAG="${IMAGE_NAME}:${IMAGE_TAG}-${NODE}"
          fi
          echo "full_tag=$FULL_TAG" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.node }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nodes/${{ matrix.node }}/app/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.tag.outputs.full_tag }}
          cache-from: type=gha,scope=build-${{ matrix.node }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.node }}

      - name: Verify push
        run: |
          docker buildx imagetools inspect "${{ steps.tag.outputs.full_tag }}" --format '{{.Manifest.Digest}}'
          echo "✅ ${{ matrix.node }} pushed: ${{ steps.tag.outputs.full_tag }}"

  # ── Services build (parallel with nodes) ───────────────────────
  build-services:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          # Canonical GHCR package name. github.repository returns the redirect
          # (node-template) but GHCR stores as cogni-template. docker push follows
          # redirects but imagetools inspect does not.
          IMAGE_NAME="ghcr.io/cogni-dao/cogni-template"
          IMAGE_TAG="preview-${GITHUB_SHA}"
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push migrator
        id: build-migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: nodes/operator/app/Dockerfile
          target: migrator
          push: true
          tags: ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}-migrate
          cache-from: type=gha,scope=build-migrator
          cache-to: type=gha,mode=max,scope=build-migrator

      - name: Build and push scheduler-worker
        id: build-sw
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/scheduler-worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}-scheduler-worker
          cache-from: type=gha,scope=build-scheduler-worker
          cache-to: type=gha,mode=max,scope=build-scheduler-worker

      - name: Build summary
        run: |
          echo "## Multi-Node Build" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${GITHUB_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Migrator digest:** \`${{ steps.build-migrator.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Scheduler-Worker digest:** \`${{ steps.build-sw.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Promote k8s overlays (after all builds pass) ──────────────
  # Inlined here because workflow_run triggers only fire from the default branch.
  # When this workflow moves to staging, extract back to promote-k8s-staging.yml.
  promote-k8s:
    runs-on: ubuntu-latest
    needs: [build-nodes, build-services]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve all image digests
        id: digests
        run: |
          IMAGE_NAME="ghcr.io/cogni-dao/cogni-template"
          TAG="preview-${GITHUB_SHA}"

          resolve() {
            local full_tag="${IMAGE_NAME}:${1}"
            local digest
            digest=$(docker buildx imagetools inspect "$full_tag" --raw 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('digest',''))" 2>/dev/null) || true
            # Fallback: parse from --format if raw didn't work
            if [ -z "$digest" ]; then
              digest=$(docker buildx imagetools inspect "$full_tag" 2>/dev/null | grep -oP 'Digest:\s+\Ksha256:[a-f0-9]+' | head -1) || true
            fi
            if [ -z "$digest" ]; then
              echo "❌ Failed to resolve digest for: $full_tag"
              exit 1
            fi
            echo "${IMAGE_NAME}@${digest}"
          }

          OPERATOR_DIGEST=$(resolve "$TAG")
          POLY_DIGEST=$(resolve "${TAG}-poly")
          RESY_DIGEST=$(resolve "${TAG}-resy")
          MIGRATOR_DIGEST=$(resolve "${TAG}-migrate")
          SW_DIGEST=$(resolve "${TAG}-scheduler-worker")

          echo "operator=$OPERATOR_DIGEST" >> $GITHUB_OUTPUT
          echo "poly=$POLY_DIGEST" >> $GITHUB_OUTPUT
          echo "resy=$RESY_DIGEST" >> $GITHUB_OUTPUT
          echo "migrator=$MIGRATOR_DIGEST" >> $GITHUB_OUTPUT
          echo "scheduler_worker=$SW_DIGEST" >> $GITHUB_OUTPUT

          echo "✅ Resolved all digests:"
          echo "  operator:         $OPERATOR_DIGEST"
          echo "  poly:             $POLY_DIGEST"
          echo "  resy:             $RESY_DIGEST"
          echo "  migrator:         $MIGRATOR_DIGEST"
          echo "  scheduler-worker: $SW_DIGEST"

      - name: Update overlay digests
        run: |
          # Map branch → overlay environment
          case "${{ github.ref_name }}" in
            canary)   OVERLAY_ENV=canary ;;
            staging)  OVERLAY_ENV=preview ;;
            main)     OVERLAY_ENV=production ;;
            *)        echo "Unknown branch for overlay promotion"; exit 1 ;;
          esac
          echo "Promoting to overlay: $OVERLAY_ENV"

          scripts/ci/promote-k8s-image.sh \
            --env "$OVERLAY_ENV" \
            --app operator \
            --digest "${{ steps.digests.outputs.operator }}" \
            --migrator-digest "${{ steps.digests.outputs.migrator }}"

          scripts/ci/promote-k8s-image.sh \
            --env "$OVERLAY_ENV" \
            --app poly \
            --digest "${{ steps.digests.outputs.poly }}" \
            --migrator-digest "${{ steps.digests.outputs.migrator }}"

          scripts/ci/promote-k8s-image.sh \
            --env "$OVERLAY_ENV" \
            --app resy \
            --digest "${{ steps.digests.outputs.resy }}" \
            --migrator-digest "${{ steps.digests.outputs.migrator }}"

          scripts/ci/promote-k8s-image.sh \
            --env "$OVERLAY_ENV" \
            --app scheduler-worker \
            --digest "${{ steps.digests.outputs.scheduler_worker }}"

      - name: Commit and push overlay updates
        run: |
          # Map branch → overlay environment (same as above)
          case "${{ github.ref_name }}" in
            canary)   OVERLAY_ENV=canary ;;
            staging)  OVERLAY_ENV=preview ;;
            main)     OVERLAY_ENV=production ;;
            *)        OVERLAY_ENV=canary ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add infra/k8s/overlays/${OVERLAY_ENV}/

          if git diff --cached --quiet; then
            echo "No overlay changes (digests unchanged)"
          else
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-8)
            git commit -m "chore(cd): promote ${OVERLAY_ENV} overlays to ${SHORT_SHA} [skip ci]"
            git push origin "HEAD:${{ github.ref_name }}"
            echo "✅ Overlay digests updated for ${OVERLAY_ENV}"
          fi

  # ── Verify deployment ──────────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    needs: promote-k8s
    environment: integration
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - name: Poll health endpoints
        run: |
          if [ -z "$DOMAIN" ]; then
            echo "⚠️ No DOMAIN variable set in integration environment — skipping verify"
            exit 0
          fi

          OPERATOR_URL="https://${DOMAIN}"
          POLY_URL="https://poly-${DOMAIN}"
          RESY_URL="https://resy-${DOMAIN}"

          MAX_ATTEMPTS=30
          SLEEP=15

          poll_health() {
            local name="$1"
            local url="$2"
            local attempt=1

            echo "Polling $name at $url/readyz ..."
            while [ $attempt -le $MAX_ATTEMPTS ]; do
              STATUS=$(curl -sk -o /dev/null -w '%{http_code}' "$url/readyz" 2>/dev/null || echo "000")
              if [ "$STATUS" = "200" ]; then
                echo "✅ $name healthy (attempt $attempt)"
                return 0
              fi
              echo "  $name: HTTP $STATUS (attempt $attempt/$MAX_ATTEMPTS)"
              sleep $SLEEP
              attempt=$((attempt + 1))
            done
            echo "❌ $name failed health check after $MAX_ATTEMPTS attempts"
            return 1
          }

          FAILED=0
          poll_health "operator" "$OPERATOR_URL" || FAILED=1
          poll_health "poly" "$POLY_URL" || FAILED=1
          poll_health "resy" "$RESY_URL" || FAILED=1

          if [ $FAILED -ne 0 ]; then
            echo "❌ One or more nodes failed health checks"
            exit 1
          fi
          echo "✅ All nodes healthy"

      - name: Smoke test
        if: env.DOMAIN != ''
        run: |
          for url in "https://${DOMAIN}" "https://poly-${DOMAIN}" "https://resy-${DOMAIN}"; do
            BODY=$(curl -sk "$url/livez" 2>/dev/null)
            echo "$url/livez → $BODY"
            if ! echo "$BODY" | grep -q '"status"'; then
              echo "❌ $url/livez did not return expected JSON"
              exit 1
            fi
          done
          echo "✅ Smoke tests passed"

      - name: Dump diagnostics on failure
        if: failure() && env.VM_HOST != ''
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          echo "=== Argo CD Applications ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n argocd get applications -o wide" 2>&1 || true
          echo ""
          echo "=== Pods ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n cogni-staging get pods -o wide" 2>&1 || true
          echo ""
          echo "=== Events ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n cogni-staging get events --sort-by=.lastTimestamp | tail -20" 2>&1 || true
