name: Candidate Flight

# Pre-merge APP LEVER for an open PR (task.0314): acquires the candidate-a
# slot, promotes the PR's digests into the deploy/candidate-a overlay,
# reconciles the ArgoCD ApplicationSet on the VM from repo state, and waits
# for Argo to roll the pods. Does NOT touch Compose infra — that's the infra
# lever (see candidate-flight-infra.yml). An app PR can flight without any
# SSH to the VM's Compose layer, upholding "Argo owns reconciliation"
# (docs/spec/ci-cd.md).
#
# Structure (bug.0321): three jobs.
#   1. flight          — acquire slot, promote digests, push deploy branch,
#                        reconcile AppSet. Emits promoted_apps + deploy_branch_sha.
#   2. verify-candidate — gated `if: flight.outputs.promoted_apps != ''`.
#                        Waits for Argo sync + rollout + smoke + /version.buildSha verify. When
#                        promoted_apps is empty, this job is visibly SKIPPED
#                        (grey in the checks list), never a silent-green.
#   3. release-slot    — always() && flight acquired. Releases lease based on
#                        verify-candidate.result (free on success, failed
#                        otherwise) and reports the terminal commit status.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to flight"
        required: true
        type: string
      head_sha:
        description: "Optional PR head SHA override"
        required: false
        type: string

permissions:
  contents: write
  packages: read
  pull-requests: read
  statuses: write

concurrency:
  group: candidate-flight-${{ inputs.pr_number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/cogni-dao/cogni-template
  SLOT: candidate-a
  OVERLAY_ENV: candidate-a

jobs:
  flight:
    runs-on: ubuntu-latest
    environment: candidate-a
    outputs:
      head_sha: ${{ steps.meta.outputs.head_sha }}
      status_url: ${{ steps.meta.outputs.status_url }}
      promoted_apps: ${{ steps.promote.outputs.promoted_apps }}
      deploy_branch_sha: ${{ steps.push-deploy.outputs.deploy_branch_sha }}
      acquired: ${{ steps.acquire-summary.outputs.acquired }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Resolve PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_REF=$(gh api "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}" --jq '.base.ref')
          HEAD_SHA_INPUT="${{ inputs.head_sha }}"
          if [ -n "$HEAD_SHA_INPUT" ]; then
            HEAD_SHA="$HEAD_SHA_INPUT"
          else
            HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}" --jq '.head.sha')
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=pr-${{ inputs.pr_number }}-${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "status_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ steps.meta.outputs.head_sha }}
          fetch-depth: 0
          path: app-src

      - name: Report pending candidate-flight status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ steps.meta.outputs.head_sha }}
          STATE: pending
          DESCRIPTION: Candidate flight in progress
          TARGET_URL: ${{ steps.meta.outputs.status_url }}
        run: bash ci-src/scripts/ci/report-candidate-status.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve PR image digests
        id: images
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          OUTPUT_FILE: ${{ runner.temp }}/resolved-pr-images.json
        run: bash ci-src/scripts/ci/resolve-pr-build-images.sh

      - name: Require at least one built image
        if: steps.images.outputs.has_images != 'true'
        run: |
          echo "No pushed PR images found for ${{ steps.meta.outputs.image_tag }}"
          exit 1

      - name: Prepare deploy branch workspace
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" deploy-branch
          cd deploy-branch
          if git ls-remote --exit-code origin "refs/heads/deploy/${SLOT}" >/dev/null 2>&1; then
            git fetch origin "deploy/${SLOT}"
            git checkout -B "deploy/${SLOT}" "origin/deploy/${SLOT}"
          else
            git fetch origin "${{ steps.meta.outputs.head_sha }}"
            git checkout -B "deploy/${SLOT}" "${{ steps.meta.outputs.head_sha }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # task.0373 — snapshot deploy/candidate-a overlay digests *before*
      # the rsync below clobbers them with whatever the PR branch carries.
      # Combined with the post-promote restore step, this self-heals
      # non-promoted overlays so a stale PR base cannot roll an unrelated
      # node to a regressing image. Cold-start (newly-created
      # deploy/candidate-a) reads the PR-branch state — restore is a no-op,
      # which is acceptable because there is no prior good state.
      - name: Snapshot deploy-branch overlay digests (pre-rsync)
        id: snapshot
        working-directory: deploy-branch
        env:
          OVERLAY_ENV: candidate-a
          SNAPSHOT_FILE: ${{ runner.temp }}/candidate-a-overlay-snapshot.tsv
        run: |
          bash ../ci-src/scripts/ci/snapshot-overlay-digests.sh > "$SNAPSHOT_FILE"
          echo "ℹ️  Pre-rsync overlay snapshot ($(wc -l < "$SNAPSHOT_FILE" | tr -d ' ') rows):"
          sed 's/^/  /' "$SNAPSHOT_FILE"

      - name: Sync base and catalog to deploy branch
        run: |
          rsync -a --delete app-src/infra/k8s/base/ deploy-branch/infra/k8s/base/
          rsync -a --delete app-src/infra/catalog/ deploy-branch/infra/catalog/
          rsync -a --delete app-src/infra/k8s/overlays/candidate-a/ deploy-branch/infra/k8s/overlays/candidate-a/

      - name: Acquire candidate slot
        id: acquire
        continue-on-error: true
        working-directory: deploy-branch
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          RUN_ID: ${{ github.run_id }}
          STATUS_URL: ${{ steps.meta.outputs.status_url }}
        run: bash ../ci-src/scripts/ci/acquire-candidate-slot.sh

      - name: Record acquire outcome
        id: acquire-summary
        # Job-level output flag: true iff we own the lease and must release it.
        # Consumed by the release-slot job's `if:` to decide whether to run at all.
        run: |
          if [ "${{ steps.acquire.outcome }}" = "success" ] && [ "${{ steps.acquire.outputs.slot_busy }}" != "true" ]; then
            echo "acquired=true" >> "$GITHUB_OUTPUT"
          else
            echo "acquired=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop when candidate-a is busy
        if: steps.acquire.outputs.slot_busy == 'true'
        run: |
          echo "candidate-a busy with PR #${{ steps.acquire.outputs.busy_pr_number }}"
          exit 1

      - name: Promote resolved digests into candidate-a overlay
        id: promote
        if: steps.acquire-summary.outputs.acquired == 'true'
        working-directory: deploy-branch
        env:
          PAYLOAD_FILE: ${{ runner.temp }}/resolved-pr-images.json
          OVERLAY_ENV: candidate-a
        run: bash ../ci-src/scripts/ci/promote-build-payload.sh

      # task.0373 — for every ALL_TARGETS app NOT in promoted_apps, restore
      # the digest the snapshot captured pre-rsync. Promoted apps' digests
      # were just written by promote-build-payload above and must stay.
      # Snapshot rows without a digest pin (`:tag` form, only possible on
      # cold-start) are skipped — promote-k8s-image.sh requires `@sha256:`.
      - name: Restore non-promoted overlay digests (post-rsync self-heal)
        if: steps.acquire-summary.outputs.acquired == 'true'
        working-directory: deploy-branch
        env:
          PROMOTED_APPS: ${{ steps.promote.outputs.promoted_apps }}
          SNAPSHOT_FILE: ${{ runner.temp }}/candidate-a-overlay-snapshot.tsv
        run: |
          set -euo pipefail
          if [ ! -s "$SNAPSHOT_FILE" ]; then
            echo "ℹ️  No snapshot rows (cold-start) — nothing to restore"
            exit 0
          fi
          # shellcheck source=../ci-src/scripts/ci/lib/image-tags.sh
          . ../ci-src/scripts/ci/lib/image-tags.sh
          declare -A snap=()
          while IFS=$'\t' read -r app ref; do
            [ -n "$app" ] && snap["$app"]="$ref"
          done < "$SNAPSHOT_FILE"
          for target in "${ALL_TARGETS[@]}"; do
            if printf ' %s ' "$PROMOTED_APPS" | grep -q " $target "; then
              echo "  promoted: $target — keep newly-built digest"
              continue
            fi
            ref="${snap[$target]:-}"
            if [ -z "$ref" ]; then
              echo "  skip: $target — no snapshot row (cold-start or no overlay)"
              continue
            fi
            if [[ "$ref" != *"@sha256:"* ]]; then
              echo "  skip: $target — snapshot pin is tag-only ($ref); cold-start, leave PR-branch state in place"
              continue
            fi
            echo "  restore: $target ← ${ref#*@}"
            bash ../ci-src/scripts/ci/promote-k8s-image.sh --no-commit \
              --env candidate-a --app "$target" --digest "$ref"
          done

      - name: Commit and push deploy/candidate-a
        id: push-deploy
        if: steps.acquire-summary.outputs.acquired == 'true'
        working-directory: deploy-branch
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No deploy-state changes to push"
            DEPLOY_SHA=$(git rev-parse HEAD)
            echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "candidate-flight: pr-${{ inputs.pr_number }} ${{ steps.meta.outputs.head_sha }}"
          git push origin "HEAD:deploy/${SLOT}"
          DEPLOY_SHA=$(git rev-parse HEAD)
          echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      # ── Reconcile the ApplicationSet on the candidate-a VM (bug.0312 fix —
      # see promote-and-deploy.yml for the rationale). Kept in the flight job
      # because it's a one-shot state write, not verification: without it the
      # AppSet template drifts and subsequent Argo-sync waits hang forever.
      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        if: steps.acquire-summary.outputs.acquired == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set on candidate-a environment — skipping Compose reconcile"
            echo "has_vm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_vm=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Testing SSH connection to $VM_HOST..."
          set +e
          OUT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6 root@"$VM_HOST" "echo SSH test successful" 2>&1)
          RC=$?
          set -e
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            echo "❌ SSH failed (rc=$RC)"
            exit 1
          fi
          echo "✅ SSH connection successful"

      - name: Reconcile ArgoCD ApplicationSet from repo
        if: |
          steps.acquire-summary.outputs.acquired == 'true' &&
          steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
        run: |
          # The workflow ref owns the CI control plane. App content still
          # comes from the target PR checkout (`app-src`), but the
          # ApplicationSet used by this workflow should track the branch that
          # dispatched the run so workflow / Argo-wait fixes are self-validating.
          APPSET_FILE="ci-src/infra/k8s/argocd/candidate-a-applicationset.yaml"
          if [ ! -f "$APPSET_FILE" ]; then
            echo "⚠️  No ApplicationSet file at ${APPSET_FILE} — skipping"
            exit 0
          fi
          # shellcheck disable=SC2086
          scp $SSH_OPTS "$APPSET_FILE" root@"$VM_HOST":/tmp/appset.yaml
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl apply -f /tmp/appset.yaml -n argocd && rm -f /tmp/appset.yaml"
          echo "✅ candidate-a ApplicationSet reconciled"

      # VM compose infra is an independent lever — see candidate-flight-infra.yml
      # and docs/spec/ci-cd.md. This workflow (the "app lever") only writes
      # deploy-branch state and lets Argo CD reconcile pods. See task.0314.

  # ── Verification job — gated at the JOB level on promoted_apps.
  # Empty promoted_apps → this job is visibly SKIPPED in the checks list
  # (grey), never a silent-green-skipped-step-in-running-job. The gating
  # discipline here is the structural primitive that closes bug.0321.
  verify-candidate:
    needs: flight
    if: needs.flight.result == 'success' && needs.flight.outputs.promoted_apps != ''
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.flight.outputs.head_sha }}
          path: app-src

      - name: Checkout deploy/candidate-a (for .promote-state/source-sha-by-app.json)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: deploy/candidate-a
          path: deploy-branch
          token: ${{ github.token }}

      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set on candidate-a environment — skipping"
            echo "has_vm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_vm=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # Argo sync gate. EXPECTED_SHA MUST be the deploy-branch tip SHA written
      # by the flight job, NOT the source PR head SHA. See the header of
      # scripts/ci/wait-for-argocd.sh — passing the wrong SHA silently times
      # out because Argo tracks the deploy branch, not main.
      #
      # On success wait-for-argocd.sh writes ARGOCD_SYNC_VERIFIED=true to
      # $GITHUB_ENV — wait-for-candidate-ready refuses to run without it
      # (gate-ordering invariant, bug.0321 Fix 4).
      - name: Wait for ArgoCD sync on candidate-a
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          DEPLOY_ENVIRONMENT: candidate-a
          EXPECTED_SHA: ${{ needs.flight.outputs.deploy_branch_sha }}
          PROMOTED_APPS: ${{ needs.flight.outputs.promoted_apps }}
        run: bash ci-src/scripts/ci/wait-for-argocd.sh

      - name: Wait for candidate readiness
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: bash ci-src/scripts/ci/wait-for-candidate-ready.sh

      - name: Wait for in-cluster services
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          DEPLOY_ENVIRONMENT: candidate-a
        run: bash ci-src/scripts/ci/wait-for-in-cluster-services.sh

      - name: Run candidate smoke checks
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          PROMOTED_APPS: ${{ needs.flight.outputs.promoted_apps }}
        run: bash ci-src/scripts/ci/smoke-candidate.sh

      # Authoritative contract probe: promoted pods serve the SHA that built
      # their overlay digest. SOURCE_SHA_MAP mode (bug.0321 Fix 4) reads
      # deploy-branch/.promote-state/source-sha-by-app.json written by
      # promote-build-payload.sh and asserts each promoted app's /version.buildSha.
      # Falls back to EXPECTED_BUILDSHA + NODES if the map is absent.
      - name: Verify buildSha on endpoints
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          SOURCE_SHA_MAP: deploy-branch/.promote-state/source-sha-by-app.json
          EXPECTED_BUILDSHA: ${{ needs.flight.outputs.head_sha }}
          NODES: ${{ needs.flight.outputs.promoted_apps }}
        run: bash ci-src/scripts/ci/verify-buildsha.sh

  # ── Release + report — always() on flight acquisition. Decides lease
  # STATE and commit status from verify-candidate.result. Skipped entirely
  # when flight never owned the lease (acquire failed or slot was busy).
  release-slot:
    needs: [flight, verify-candidate]
    if: always() && needs.flight.outputs.acquired == 'true'
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.flight.outputs.head_sha }}
          path: app-src

      - name: Prepare deploy branch workspace
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" deploy-branch
          cd deploy-branch
          git fetch origin "deploy/${SLOT}"
          git checkout -B "deploy/${SLOT}" "origin/deploy/${SLOT}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Decide lease state
        id: decide
        # STATE=free only when the deploy was verified, OR when nothing was
        # promoted and verify-candidate therefore legitimately skipped. The
        # latter case is only valid when needs.flight.outputs.promoted_apps
        # is empty — that is the same signal the verify-candidate job-level
        # `if:` gate used to decide whether to run.
        #
        # bug.0328: a VERIFY_RESULT=skipped with non-empty promoted_apps is
        # a contradiction — the flight job pushed real promotions to
        # deploy/candidate-a but verification never ran (promoted_apps got
        # wedged empty in $GITHUB_OUTPUT because promote-build-payload
        # aborted after the overlay writes but before the trailing output
        # line). Treating that skip as success is exactly the silent-green
        # class PR #921 eliminated; this gate closes the remaining path.
        run: |
          FLIGHT_RESULT="${{ needs.flight.result }}"
          VERIFY_RESULT="${{ needs.verify-candidate.result }}"
          PROMOTED_APPS="${{ needs.flight.outputs.promoted_apps }}"
          echo "flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT} promoted_apps='${PROMOTED_APPS}'"
          if [ "$FLIGHT_RESULT" != "success" ]; then
            STATE=failed; STATUS=failure; DESC="Candidate flight failed"
          elif [ "$VERIFY_RESULT" = "success" ]; then
            STATE=free; STATUS=success; DESC="Candidate flight passed"
          elif [ "$VERIFY_RESULT" = "skipped" ] && [ -z "$PROMOTED_APPS" ]; then
            STATE=free; STATUS=success; DESC="Candidate flight passed (no-op — nothing to verify)"
          elif [ "$VERIFY_RESULT" = "skipped" ]; then
            # Contradiction: flight promoted apps but verify was skipped.
            STATE=failed; STATUS=failure
            DESC="Candidate flight failed: promoted apps (${PROMOTED_APPS}) but verify-candidate was skipped"
          else
            STATE=failed; STATUS=failure; DESC="Candidate flight failed in verify-candidate"
          fi
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "status=${STATUS}" >> "$GITHUB_OUTPUT"
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "failure" ]; then
            echo "::error::${DESC}"
          fi

      - name: Release candidate slot
        working-directory: deploy-branch
        env:
          STATE: ${{ steps.decide.outputs.state }}
        run: bash ../ci-src/scripts/ci/release-candidate-slot.sh

      - name: Commit and push released candidate slot
        working-directory: deploy-branch
        run: |
          git add "infra/control/candidate-lease.json"
          if git diff --cached --quiet; then
            echo "No released lease changes to push"
            exit 0
          fi
          git commit -m "candidate-flight: release pr-${{ inputs.pr_number }} ${{ needs.flight.outputs.head_sha }}"
          git push origin "HEAD:deploy/${SLOT}"

      - name: Report terminal candidate-flight status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ needs.flight.outputs.head_sha }}
          STATE: ${{ steps.decide.outputs.status }}
          DESCRIPTION: ${{ steps.decide.outputs.description }}
          TARGET_URL: ${{ needs.flight.outputs.status_url }}
        run: bash ci-src/scripts/ci/report-candidate-status.sh

      # bug.0328: when Decide chose STATUS=failure, the commit status has
      # been reported and the lease released; now fail the job itself so
      # the workflow run shows red in the GitHub UI and downstream
      # automations (the pr-coordinator loop) don't auto-advance as if
      # this were a green flight.
      - name: Fail job on decided failure
        if: steps.decide.outputs.status == 'failure'
        run: |
          echo "::error::${{ steps.decide.outputs.description }}"
          exit 1

  # ── Failure reporting when flight never acquired the lease (acquire
  # failed or slot was busy). No release needed — we don't own the lease.
  # Separate job so the commit status is still posted back to the PR.
  report-no-acquire-failure:
    needs: flight
    if: always() && needs.flight.result != 'success' && needs.flight.outputs.acquired != 'true'
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.flight.outputs.head_sha }}
          path: app-src

      - name: Report failure status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ needs.flight.outputs.head_sha }}
          STATE: failure
          DESCRIPTION: Candidate flight failed before slot acquisition
          TARGET_URL: ${{ needs.flight.outputs.status_url }}
        run: bash ci-src/scripts/ci/report-candidate-status.sh
