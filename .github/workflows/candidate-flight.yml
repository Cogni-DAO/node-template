name: Candidate Flight

# Pre-merge APP LEVER for an open PR (task.0314): acquires the candidate-a
# slot, promotes the PR's digests into the deploy/candidate-a overlay,
# reconciles the ArgoCD ApplicationSet on the VM from repo state, and waits
# for Argo to roll the pods. Does NOT touch Compose infra — that's the infra
# lever (see candidate-flight-infra.yml). An app PR can flight without any
# SSH to the VM's Compose layer, upholding "Argo owns reconciliation"
# (docs/spec/ci-cd.md).
#
# The Reconcile ArgoCD ApplicationSet step mirrors promote-and-deploy's step
# so candidate-a self-heals against AppSet template drift the same way
# preview does. See scripts/ci/wait-for-argocd.sh for the wait contract.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to flight"
        required: true
        type: string
      head_sha:
        description: "Optional PR head SHA override"
        required: false
        type: string

permissions:
  contents: write
  packages: read
  pull-requests: read
  statuses: write

concurrency:
  group: candidate-flight-${{ inputs.pr_number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/cogni-dao/cogni-template
  SLOT: candidate-a
  OVERLAY_ENV: candidate-a

jobs:
  flight:
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Resolve PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_REF=$(gh api "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}" --jq '.base.ref')
          HEAD_SHA_INPUT="${{ inputs.head_sha }}"
          if [ -n "$HEAD_SHA_INPUT" ]; then
            HEAD_SHA="$HEAD_SHA_INPUT"
          else
            HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}" --jq '.head.sha')
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=pr-${{ inputs.pr_number }}-${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "status_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ steps.meta.outputs.head_sha }}
          fetch-depth: 0
          path: app-src

      - name: Report pending candidate-flight status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ steps.meta.outputs.head_sha }}
          STATE: pending
          DESCRIPTION: Candidate flight in progress
          TARGET_URL: ${{ steps.meta.outputs.status_url }}
        run: bash app-src/scripts/ci/report-candidate-status.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve PR image digests
        id: images
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          OUTPUT_FILE: ${{ runner.temp }}/resolved-pr-images.json
        run: bash app-src/scripts/ci/resolve-pr-build-images.sh

      - name: Require at least one built image
        if: steps.images.outputs.has_images != 'true'
        run: |
          echo "No pushed PR images found for ${{ steps.meta.outputs.image_tag }}"
          exit 1

      - name: Prepare deploy branch workspace
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" deploy-branch
          cd deploy-branch
          if git ls-remote --exit-code origin "refs/heads/deploy/${SLOT}" >/dev/null 2>&1; then
            git fetch origin "deploy/${SLOT}"
            git checkout -B "deploy/${SLOT}" "origin/deploy/${SLOT}"
          else
            git fetch origin "${{ steps.meta.outputs.head_sha }}"
            git checkout -B "deploy/${SLOT}" "${{ steps.meta.outputs.head_sha }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync base and catalog to deploy branch
        run: |
          rsync -a --delete app-src/infra/k8s/base/ deploy-branch/infra/k8s/base/
          rsync -a --delete app-src/infra/catalog/ deploy-branch/infra/catalog/
          rsync -a --delete app-src/infra/k8s/overlays/candidate-a/ deploy-branch/infra/k8s/overlays/candidate-a/

      - name: Acquire candidate slot
        id: acquire
        continue-on-error: true
        working-directory: deploy-branch
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.meta.outputs.head_sha }}
          RUN_ID: ${{ github.run_id }}
          STATUS_URL: ${{ steps.meta.outputs.status_url }}
        run: bash ../app-src/scripts/ci/acquire-candidate-slot.sh

      - name: Stop when candidate-a is busy
        if: steps.acquire.outputs.slot_busy == 'true'
        run: |
          echo "candidate-a busy with PR #${{ steps.acquire.outputs.busy_pr_number }}"
          exit 1

      - name: Promote resolved digests into candidate-a overlay
        if: steps.acquire.outcome == 'success' && steps.acquire.outputs.slot_busy != 'true'
        working-directory: deploy-branch
        env:
          PAYLOAD_FILE: ${{ runner.temp }}/resolved-pr-images.json
          OVERLAY_ENV: candidate-a
        run: bash ../app-src/scripts/ci/promote-build-payload.sh

      - name: Commit and push deploy/candidate-a
        if: steps.acquire.outcome == 'success' && steps.acquire.outputs.slot_busy != 'true'
        working-directory: deploy-branch
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No deploy-state changes to push"
            exit 0
          fi
          git commit -m "candidate-flight: pr-${{ inputs.pr_number }} ${{ steps.meta.outputs.head_sha }}"
          git push origin "HEAD:deploy/${SLOT}"

      # ── Compose infra reconcile on the candidate-a VM ─────────────────
      # Without this step, `infra/compose/**` changes (alloy config, caddy,
      # nginx, litellm, temporal, postgres config) would never reach the
      # candidate-a VM and would first be exercised live on preview post-merge.
      # See bug.0312 Phase 2.5 for the rationale.
      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        if: steps.acquire.outcome == 'success' && steps.acquire.outputs.slot_busy != 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set on candidate-a environment — skipping Compose reconcile"
            echo "has_vm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_vm=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Testing SSH connection to $VM_HOST..."
          set +e
          OUT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6 root@"$VM_HOST" "echo SSH test successful" 2>&1)
          RC=$?
          set -e
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            echo "❌ SSH failed (rc=$RC)"
            exit 1
          fi
          echo "✅ SSH connection successful"

      # Reconcile the ApplicationSet on the candidate-a VM (bug.0312 fix — see
      # promote-and-deploy.yml for the rationale).
      - name: Reconcile ArgoCD ApplicationSet from repo
        if: |
          steps.acquire.outcome == 'success' &&
          steps.acquire.outputs.slot_busy != 'true' &&
          steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
        run: |
          APPSET_FILE="app-src/infra/k8s/argocd/candidate-a-applicationset.yaml"
          if [ ! -f "$APPSET_FILE" ]; then
            echo "⚠️  No ApplicationSet file at ${APPSET_FILE} — skipping"
            exit 0
          fi
          # shellcheck disable=SC2086
          scp $SSH_OPTS "$APPSET_FILE" root@"$VM_HOST":/tmp/appset.yaml
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl apply -f /tmp/appset.yaml -n argocd && rm -f /tmp/appset.yaml"
          echo "✅ candidate-a ApplicationSet reconciled"

      # VM compose infra is now an independent lever — see candidate-flight-infra.yml
      # and docs/spec/ci-cd.md. This workflow (the "app lever") only writes deploy-branch
      # state and lets Argo CD reconcile pods. See task.0314 for the split rationale.

      - name: Wait for candidate readiness
        if: steps.acquire.outcome == 'success' && steps.acquire.outputs.slot_busy != 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: bash app-src/scripts/ci/wait-for-candidate-ready.sh

      - name: Wait for in-cluster services
        if: |
          steps.acquire.outcome == 'success' &&
          steps.acquire.outputs.slot_busy != 'true' &&
          steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          DEPLOY_ENVIRONMENT: candidate-a
        run: bash app-src/scripts/ci/wait-for-in-cluster-services.sh

      - name: Run candidate smoke checks
        if: steps.acquire.outcome == 'success' && steps.acquire.outputs.slot_busy != 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: bash app-src/scripts/ci/smoke-candidate.sh

      # NOTE: buildSha verification (scripts/ci/verify-buildsha.sh) is
      # intentionally NOT wired here. That script needs the concrete set of
      # nodes whose digest was actually promoted in this flight to avoid
      # false-failing untouched nodes (affected-only CI rebuilds a subset).
      # `scripts/ci/promote-build-payload.sh` does not yet emit that list.
      # Until it does, the authoritative per-app rollout gate is
      # wait-for-in-cluster-services above. Follow-up: emit promoted_apps from
      # promote-build-payload.sh and wire verify-buildsha here.

      - name: Release candidate slot after success
        if: always() && success() && steps.acquire.outcome == 'success' && steps.acquire.outputs.slot_busy != 'true'
        working-directory: deploy-branch
        env:
          STATE: free
        run: bash ../app-src/scripts/ci/release-candidate-slot.sh

      - name: Release candidate slot after failure
        if: always() && failure() && steps.acquire.outcome == 'success' && steps.acquire.outputs.slot_busy != 'true'
        working-directory: deploy-branch
        env:
          STATE: failed
        run: bash ../app-src/scripts/ci/release-candidate-slot.sh

      - name: Commit and push released candidate slot
        if: always() && steps.acquire.outcome == 'success' && steps.acquire.outputs.slot_busy != 'true'
        working-directory: deploy-branch
        run: |
          git add "infra/control/candidate-lease.json"
          if git diff --cached --quiet; then
            echo "No released lease changes to push"
            exit 0
          fi
          git commit -m "candidate-flight: release pr-${{ inputs.pr_number }} ${{ steps.meta.outputs.head_sha }}"
          git push origin "HEAD:deploy/${SLOT}"

      - name: Report successful candidate-flight status
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ steps.meta.outputs.head_sha }}
          STATE: success
          DESCRIPTION: Candidate flight passed
          TARGET_URL: ${{ steps.meta.outputs.status_url }}
        run: bash app-src/scripts/ci/report-candidate-status.sh

      - name: Report failed candidate-flight status
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ steps.meta.outputs.head_sha }}
          STATE: failure
          DESCRIPTION: Candidate flight failed
          TARGET_URL: ${{ steps.meta.outputs.status_url }}
        run: bash app-src/scripts/ci/report-candidate-status.sh
