name: Candidate Flight

# task.0372 v4 — per-node lane isolation. Pre-merge APP LEVER for an open PR.
#
# Matrix-fanned across affected nodes (computed from PR diff via
# detect-affected.sh, post-task.0374 catalog SSoT). Each cell scopes to its
# own deploy/candidate-a-<node> branch + its own Argo Application
# (candidate-a-<node>). Sibling-node failure cannot fail this cell —
# isolation is structural (separate GHA jobs, fail-fast: false), not a
# script-level filter.
#
# Job graph:
#   decide ──► reconcile-appset ──► flight (matrix) ──► verify-candidate (matrix) ──► report-status
#                                       └ fail-fast:false        └ fail-fast:false                 └ single PR-head status
#
# Pinned invariants (task.0372 revision 4):
#   - LANE_ISOLATION:               cells are independent GHA jobs with fail-fast:false
#   - BRANCH_HEAD_IS_LEASE:         no candidate-lease.json; branch ref + concurrency group is the lease
#   - CONCURRENCY_GROUP_FORMAT:     flight-${{ matrix.env }}-${{ matrix.node }}
#   - PROMOTED_APPS_PER_CELL:       wait-for-argocd PROMOTED_APPS=<single node>
#   - SOURCE_SHA_MAP_PER_CELL:      single-entry map on per-node deploy branch
#   - AFFECTED_FROM_TURBO:          detect-affected.sh (v0 path-prefix workaround for turbo)
#   - CATALOG_EDITS_ARE_GLOBAL_BUILD_INPUT: per-cell rsync touches only this node's catalog file
#   - APPLICATION_NAMES_UNCHANGED:  AppSets still produce candidate-a-<node>; reconcile in place
#
# Acquire/release-slot scripts and the report-no-acquire-failure job are
# DELETED (BRANCH_HEAD_IS_LEASE makes them obsolete).

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to flight"
        required: true
        type: string
      head_sha:
        description: "Optional PR head SHA override"
        required: false
        type: string

permissions:
  contents: write
  packages: read
  pull-requests: read
  statuses: write

# Workflow-level concurrency: per-PR. Cancel the previous run if a newer
# dispatch supersedes it (e.g. PR head pushed). Per-cell concurrency
# (flight-<env>-<node>) is the cross-workflow lease primitive — see jobs.
concurrency:
  group: candidate-flight-${{ inputs.pr_number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/cogni-dao/cogni-template
  SLOT: candidate-a
  OVERLAY_ENV: candidate-a

jobs:
  # ── Resolve PR metadata, image digests, affected node set ────────
  decide:
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.meta.outputs.head_sha }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      status_url: ${{ steps.meta.outputs.status_url }}
      digests_json: ${{ steps.images.outputs.digests_json }}
      targets_json: ${{ steps.detect.outputs.targets_json }}
      has_targets: ${{ steps.detect.outputs.has_targets }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0

      - name: Resolve PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BASE_REF=$(gh api "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}" --jq '.base.ref')
          HEAD_SHA_INPUT="${{ inputs.head_sha }}"
          if [ -n "$HEAD_SHA_INPUT" ]; then
            HEAD_SHA="$HEAD_SHA_INPUT"
          else
            HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}" --jq '.head.sha')
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=pr-${{ inputs.pr_number }}-${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "status_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Report pending candidate-flight status (single, pre-matrix)
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ steps.meta.outputs.head_sha }}
          STATE: pending
          DESCRIPTION: Candidate flight in progress
          TARGET_URL: ${{ steps.meta.outputs.status_url }}
        run: bash scripts/ci/report-candidate-status.sh

      # Affected-node detection. detect-affected.sh reads catalog path_prefix
      # and emits a JSON matrix array. Catalog edits trigger add_all_targets
      # (CATALOG_EDITS_ARE_GLOBAL_BUILD_INPUT) so all 4 cells run in lockstep
      # on a catalog change.
      - name: Detect affected nodes
        id: detect
        env:
          TURBO_SCM_BASE: origin/main
          TURBO_SCM_HEAD: ${{ steps.meta.outputs.head_sha }}
        run: |
          set -euo pipefail
          # Fetch the head SHA so the diff has both endpoints.
          git fetch origin "${{ steps.meta.outputs.head_sha }}" --depth=100 || true
          bash scripts/ci/detect-affected.sh

      - name: Set up Docker Buildx
        if: steps.detect.outputs.has_targets == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.detect.outputs.has_targets == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve PR image digests
        id: images
        if: steps.detect.outputs.has_targets == 'true'
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          OUTPUT_FILE: ${{ runner.temp }}/resolved-pr-images.json
        run: bash scripts/ci/resolve-pr-build-images.sh

      - name: Require at least one built image
        if: steps.detect.outputs.has_targets == 'true' && steps.images.outputs.has_images != 'true'
        run: |
          echo "::error::No pushed PR images found for ${{ steps.meta.outputs.image_tag }}"
          exit 1

      # Stash the resolved digest JSON as an artifact so matrix cells can
      # read it without re-resolving from GHCR (saves N-1 imagetools-inspect
      # round-trips).
      - name: Upload resolved-pr-images artifact
        if: steps.detect.outputs.has_targets == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: resolved-pr-images
          path: ${{ runner.temp }}/resolved-pr-images.json
          retention-days: 1

  # ── Reconcile candidate-a ApplicationSet on the VM (single, before matrix) ──
  # Without this step the AppSet template drifts and matrix-cell Argo waits
  # hang forever (bug.0312). Runs once per dispatch, not per cell —
  # `kubectl apply` of one resource shouldn't race against itself.
  reconcile-appset:
    needs: decide
    if: needs.decide.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source (for AppSet YAML)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set on candidate-a — skipping AppSet reconcile"
            echo "has_vm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_vm=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Apply candidate-a-applicationset.yaml
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
        run: |
          set -euo pipefail
          APPSET_FILE="infra/k8s/argocd/candidate-a-applicationset.yaml"
          # shellcheck disable=SC2086
          scp $SSH_OPTS "$APPSET_FILE" root@"$VM_HOST":/tmp/appset.yaml
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl apply -f /tmp/appset.yaml -n argocd && rm -f /tmp/appset.yaml"
          echo "✅ candidate-a ApplicationSet reconciled"

  # ── Per-node flight cell ─────────────────────────────────────────
  # Each cell scopes to one node: clones deploy/candidate-a-<node>, rsyncs
  # only that node's overlay subdir + base + that node's catalog file,
  # promotes one digest, pushes to its own per-node branch. Branch ref +
  # concurrency group is the lease (BRANCH_HEAD_IS_LEASE).
  flight:
    needs: [decide, reconcile-appset]
    if: needs.decide.outputs.has_targets == 'true'
    strategy:
      fail-fast: false
      matrix:
        env: [candidate-a]
        node: ${{ fromJson(needs.decide.outputs.targets_json) }}
    concurrency:
      group: flight-${{ matrix.env }}-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    outputs:
      # Note: matrix-job outputs aggregate across cells; downstream readers
      # see the LAST cell's value. Use needs.flight.result for cross-cell
      # status; per-cell deploy_branch_sha is consumed inline by verify
      # (which is also matrix-fanned).
      head_sha: ${{ needs.decide.outputs.head_sha }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          fetch-depth: 0
          path: app-src

      - name: Download resolved-pr-images
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: resolved-pr-images
          path: ${{ runner.temp }}/

      - name: Prepare per-node deploy branch workspace
        env:
          GH_TOKEN: ${{ github.token }}
          PER_NODE_BRANCH: deploy/${{ matrix.env }}-${{ matrix.node }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" deploy-branch
          cd deploy-branch
          git fetch origin "+refs/heads/deploy/*:refs/remotes/origin/deploy/*"
          if git rev-parse --verify --quiet "refs/remotes/origin/${PER_NODE_BRANCH}" >/dev/null; then
            git checkout -B "${PER_NODE_BRANCH}" "origin/${PER_NODE_BRANCH}"
          else
            # Bootstrap from whole-slot if per-node branch missing (should not
            # happen post-bootstrap-script; safety net for cold-start).
            echo "::warning::Per-node branch ${PER_NODE_BRANCH} missing — bootstrapping from deploy/${{ matrix.env }}"
            git fetch origin "deploy/${{ matrix.env }}"
            git checkout -B "${PER_NODE_BRANCH}" "origin/deploy/${{ matrix.env }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # task.0373 — snapshot deploy-branch overlay digests pre-rsync. On a
      # per-node branch the snapshot still emits all 4 overlay rows
      # (bootstrap forked from whole-slot), but only this node's row is
      # read by Argo. Restore loop runs verbatim — writes to dead sibling
      # subdirs are harmless; cold-start invariant is preserved.
      - name: Snapshot deploy-branch overlay digests (pre-rsync)
        id: snapshot
        working-directory: deploy-branch
        env:
          OVERLAY_ENV: candidate-a
          SNAPSHOT_FILE: ${{ runner.temp }}/candidate-a-overlay-snapshot.tsv
        run: |
          bash ../ci-src/scripts/ci/snapshot-overlay-digests.sh > "$SNAPSHOT_FILE"
          echo "ℹ️  Pre-rsync overlay snapshot ($(wc -l < "$SNAPSHOT_FILE" | tr -d ' ') rows):"
          sed 's/^/  /' "$SNAPSHOT_FILE"

      # Per-cell rsync scope (CATALOG_EDITS_ARE_GLOBAL_BUILD_INPUT):
      #   - infra/k8s/base/                                      (kustomize base; needed for build)
      #   - infra/k8s/overlays/candidate-a/${{ matrix.node }}/   (this node's overlay only)
      #   - infra/catalog/${{ matrix.node }}.yaml                (this node's catalog file only)
      # Other nodes' overlay subdirs on this branch survive harmlessly.
      - name: Sync base + per-node overlay + per-node catalog to deploy branch
        env:
          NODE: ${{ matrix.node }}
        run: |
          set -euo pipefail
          rsync -a --delete app-src/infra/k8s/base/ deploy-branch/infra/k8s/base/
          mkdir -p "deploy-branch/infra/k8s/overlays/candidate-a/${NODE}"
          rsync -a --delete \
            "app-src/infra/k8s/overlays/candidate-a/${NODE}/" \
            "deploy-branch/infra/k8s/overlays/candidate-a/${NODE}/"
          mkdir -p deploy-branch/infra/catalog
          cp "app-src/infra/catalog/${NODE}.yaml" "deploy-branch/infra/catalog/${NODE}.yaml"

      # Promote this node's digest. resolve-pr-build-images.json carries
      # all targets the PR built; we read just this node's entry.
      - name: Promote this node's digest into per-node overlay
        id: promote
        working-directory: deploy-branch
        env:
          PAYLOAD_FILE: ${{ runner.temp }}/resolved-pr-images.json
          OVERLAY_ENV: candidate-a
          NODE: ${{ matrix.node }}
          HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
        run: |
          set -euo pipefail
          # Single-app subset of the payload. promote-build-payload.sh's
          # default mode promotes everything in the payload; we restrict via
          # NODES env so only this matrix.node is written. update-source-sha-map
          # records this node's source_sha into the per-node branch's single-
          # entry .promote-state/source-sha-by-app.json (SOURCE_SHA_MAP_PER_CELL).
          NODES="$NODE" bash ../ci-src/scripts/ci/promote-build-payload.sh

      # task.0373 — restore non-promoted overlay digests from snapshot.
      # On a per-node branch this writes to dead sibling subdirs; harmless,
      # preserved verbatim per work item Reuses. Single-target promotion
      # makes the inner loop a near-no-op for the AppSet's reconciliation.
      - name: Restore non-promoted overlay digests (post-rsync self-heal)
        working-directory: deploy-branch
        env:
          PROMOTED_APPS: ${{ steps.promote.outputs.promoted_apps }}
          SNAPSHOT_FILE: ${{ runner.temp }}/candidate-a-overlay-snapshot.tsv
        run: |
          set -euo pipefail
          if [ ! -s "$SNAPSHOT_FILE" ]; then
            echo "ℹ️  No snapshot rows (cold-start) — nothing to restore"
            exit 0
          fi
          # shellcheck source=../ci-src/scripts/ci/lib/image-tags.sh
          . ../ci-src/scripts/ci/lib/image-tags.sh
          declare -A snap=()
          while IFS=$'\t' read -r app ref; do
            [ -n "$app" ] && snap["$app"]="$ref"
          done < "$SNAPSHOT_FILE"
          promoted_padded=" $(echo "$PROMOTED_APPS" | tr ',' ' ' | tr -s ' ') "
          for target in "${ALL_TARGETS[@]}"; do
            if [[ "$promoted_padded" == *" $target "* ]]; then
              continue
            fi
            ref="${snap[$target]:-}"
            [ -z "$ref" ] && continue
            [[ "$ref" != *"@sha256:"* ]] && continue
            bash ../ci-src/scripts/ci/promote-k8s-image.sh --no-commit \
              --env candidate-a --app "$target" --digest "$ref"
          done

      - name: Commit and push to per-node deploy branch
        id: push-deploy
        working-directory: deploy-branch
        env:
          PER_NODE_BRANCH: deploy/${{ matrix.env }}-${{ matrix.node }}
          NODE: ${{ matrix.node }}
          HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No deploy-state changes to push"
            DEPLOY_SHA=$(git rev-parse HEAD)
            echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "candidate-flight ${NODE}: pr-${{ inputs.pr_number }} ${HEAD_SHA}"
          # Per-cell concurrency group serializes same-(env,node) pushes;
          # cross-cell pushes go to different branches and never race.
          git push origin "HEAD:${PER_NODE_BRANCH}"
          DEPLOY_SHA=$(git rev-parse HEAD)
          echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      # Pass per-cell deploy_branch_sha to the verify-candidate matrix via
      # an artifact keyed by node. GHA matrix-job outputs collapse to the
      # last cell's value, which would race; per-node artifact is the
      # robust contract.
      - name: Upload per-cell deploy_branch_sha artifact
        if: always()
        env:
          NODE: ${{ matrix.node }}
          DEPLOY_SHA: ${{ steps.push-deploy.outputs.deploy_branch_sha }}
        run: |
          mkdir -p deploy-sha-out
          printf '%s' "${DEPLOY_SHA:-}" > "deploy-sha-out/deploy-sha-${NODE}.txt"
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deploy-sha-${{ matrix.node }}
          path: deploy-sha-out/deploy-sha-${{ matrix.node }}.txt
          retention-days: 1

  # ── Per-node verify cell ─────────────────────────────────────────
  # Same matrix shape as flight. Each cell verifies one Argo Application
  # at one EXPECTED_SHA against one /version.buildSha contract probe.
  verify-candidate:
    needs: [decide, flight]
    if: |
      needs.decide.outputs.has_targets == 'true' &&
      needs.flight.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        env: [candidate-a]
        node: ${{ fromJson(needs.decide.outputs.targets_json) }}
    concurrency:
      group: verify-candidate-${{ matrix.env }}-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          path: app-src

      - name: Checkout per-node deploy branch (for source-sha map)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: deploy/${{ matrix.env }}-${{ matrix.node }}
          path: deploy-branch
          token: ${{ github.token }}

      - name: Download per-cell deploy_branch_sha
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: deploy-sha-${{ matrix.node }}
          path: ${{ runner.temp }}/

      - name: Resolve EXPECTED_SHA
        id: expected
        env:
          ARTIFACT_FILE: ${{ runner.temp }}/deploy-sha-${{ matrix.node }}.txt
        run: |
          set -euo pipefail
          DEPLOY_SHA=$(cat "$ARTIFACT_FILE" 2>/dev/null || true)
          if [ -z "$DEPLOY_SHA" ]; then
            echo "::error::Per-cell deploy_branch_sha artifact empty for ${{ matrix.node }}"
            exit 1
          fi
          echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set on candidate-a — skipping verification"
            echo "has_vm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_vm=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # Argo sync gate. PROMOTED_APPS=${matrix.node} restricts the wait to
      # this node's Argo Application. EXPECTED_SHA is the per-node branch
      # tip the cell just pushed. wait-for-argocd writes
      # ARGOCD_SYNC_VERIFIED=true to $GITHUB_ENV which wait-for-candidate-ready
      # requires (gate-ordering invariant, bug.0321 Fix 4).
      - name: Wait for ArgoCD sync (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          DEPLOY_ENVIRONMENT: candidate-a
          EXPECTED_SHA: ${{ steps.expected.outputs.deploy_branch_sha }}
          PROMOTED_APPS: ${{ matrix.node }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: bash ci-src/scripts/ci/wait-for-argocd.sh

      - name: Wait for candidate readiness
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: bash ci-src/scripts/ci/wait-for-candidate-ready.sh

      - name: Wait for in-cluster services (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          DEPLOY_ENVIRONMENT: candidate-a
          PROMOTED_APPS: ${{ matrix.node }}
        run: bash ci-src/scripts/ci/wait-for-in-cluster-services.sh

      - name: Run candidate smoke checks (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          PROMOTED_APPS: ${{ matrix.node }}
        run: bash ci-src/scripts/ci/smoke-candidate.sh

      # Authoritative contract probe (per-cell). SOURCE_SHA_MAP on the
      # per-node deploy branch carries a single entry (this node's
      # source_sha). NODES=${matrix.node} restricts the probe to that one
      # app. SOURCE_SHA_MAP_PER_CELL invariant.
      - name: Verify buildSha on endpoint (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          SOURCE_SHA_MAP: deploy-branch/.promote-state/source-sha-by-app.json
          EXPECTED_BUILDSHA: ${{ needs.decide.outputs.head_sha }}
          NODES: ${{ matrix.node }}
        run: bash ci-src/scripts/ci/verify-buildsha.sh

  # ── Aggregate cell results into a single PR commit-status ────────
  # Single status check on the PR head SHA, NOT matrix-fanned (avoids
  # racing same-head status writes). Aggregates: success iff all matrix
  # cells succeeded; failure if any failed; skipped if decide had no
  # targets.
  report-status:
    needs: [decide, flight, verify-candidate]
    if: always() && needs.decide.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Decide aggregate state
        id: decide
        env:
          HAS_TARGETS: ${{ needs.decide.outputs.has_targets }}
          FLIGHT_RESULT: ${{ needs.flight.result }}
          VERIFY_RESULT: ${{ needs.verify-candidate.result }}
          TARGETS_JSON: ${{ needs.decide.outputs.targets_json }}
        run: |
          set -euo pipefail
          echo "has_targets=${HAS_TARGETS} flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT} targets=${TARGETS_JSON}"
          if [ "$HAS_TARGETS" != "true" ]; then
            STATE=success
            DESC="Candidate flight no-op (no affected nodes)"
          elif [ "$FLIGHT_RESULT" = "success" ] && [ "$VERIFY_RESULT" = "success" ]; then
            STATE=success
            DESC="Candidate flight passed (matrix: ${TARGETS_JSON})"
          elif [ "$FLIGHT_RESULT" = "failure" ] || [ "$VERIFY_RESULT" = "failure" ]; then
            STATE=failure
            DESC="Candidate flight failed (flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT})"
          elif [ "$FLIGHT_RESULT" = "cancelled" ] || [ "$VERIFY_RESULT" = "cancelled" ]; then
            STATE=failure
            DESC="Candidate flight cancelled"
          else
            # skipped + has_targets = something is wrong
            STATE=failure
            DESC="Candidate flight indeterminate (flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT})"
          fi
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"

      - name: Report terminal candidate-flight status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ needs.decide.outputs.head_sha }}
          STATE: ${{ steps.decide.outputs.state }}
          DESCRIPTION: ${{ steps.decide.outputs.description }}
          TARGET_URL: ${{ needs.decide.outputs.status_url }}
        run: bash scripts/ci/report-candidate-status.sh

      - name: Fail job on aggregate failure
        if: steps.decide.outputs.state == 'failure'
        run: |
          echo "::error::${{ steps.decide.outputs.description }}"
          exit 1
