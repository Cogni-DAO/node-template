name: Promote and Deploy

# Dispatched by flight-preview.yml (primary path: PR merge → re-tag → dispatch here).
# Updates deploy branch overlays with image digests, reconciles the Argo CD
# ApplicationSet on the VM from repo state, waits until Argo reports the new
# deploy-branch SHA as Healthy, deploys Compose infra via SSH, verifies health,
# runs E2E, and drives the preview review-state lease.
#
# Job graph (bug.0321 + bug.0361):
#
#   promote-k8s ─► deploy-infra* ─┬─► verify-deploy ─┐
#                                 └─► verify         ┴─► e2e ─┬─► lock-on-success
#                                                             └─► unlock-on-failure
#
#   * deploy-infra is gated on `skip_infra != 'true'` (bug.0361). When
#     skipped (the normal app-only flight-preview path), downstream jobs
#     (verify, verify-deploy, e2e, lock-preview) use an explicit
#     `deploy-infra.result in {success, skipped}` guard instead of GHA's
#     implicit success() — otherwise the whole chain cascade-skips and
#     the preview lease would never transition to `reviewing`.
#
# verify-deploy is also job-level gated on promote-k8s.outputs.promoted_apps
# != '' (Axiom 11). Empty-promotion runs visibly skip it → e2e skipped →
# lock-preview-on-success skipped → unlock-preview-on-failure fires. Preview
# lease stays unlocked instead of silently advancing against an unchanged
# overlay.
#
# AppSet-reconcile-from-repo (bug.0312) runs inside verify-deploy, NOT
# inside deploy-infra, so template-drift on the VM is caught on every
# non-empty promotion regardless of skip_infra.
#
# Job outputs that downstream jobs care about:
#   promote-k8s.deploy_branch_sha  — tip SHA of deploy/{env} after promote
#                                    pushes. verify-deploy passes this to
#                                    wait-for-argocd as the Argo reconcile
#                                    target. On no-op promotes (overlay
#                                    unchanged) this still carries the
#                                    current deploy-branch tip so the wait
#                                    step has a deterministic target.
#   promote-k8s.head_sha           — source_sha the caller dispatched with
#                                    (merge commit SHA for normal flow).
#                                    Written into deploy/preview current-sha
#                                    by lock-preview-on-success.
#   promote-k8s.promoted_apps      — CSV of apps that actually got a new
#                                    digest this run. Gates verify-deploy
#                                    at the job level.
#
# Checkout refs (each job picks the right one):
#   promote-k8s, deploy-infra, verify, e2e          — ref=head_sha
#     (need overlay templates, compose bundles, and e2e specs from the
#     source artifact commit)
#   lock-preview-on-success, unlock-preview-on-failure — ref=main
#     (set-preview-review-state.sh is orthogonal to the deploy artifact;
#     checking out source_sha broke any dispatch with an off-main SHA)
#
# All envs: direct push to deploy branch (git history is the audit trail).
# App containers are managed by Argo CD (auto-syncs on deploy branch change).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: preview
        type: choice
        options: [preview, production]
      source_sha:
        description: "SHA of source images (PR head SHA — images must exist as preview-{sha} in GHCR). Leave empty for production to copy current deploy/preview state forward (bug.0364)."
        required: false
      build_sha:
        description: "SHA baked into images at build time (PR branch head). Defaults to source_sha. Needed on squash-merge where source_sha is the merge commit but containers report the branch SHA. Ignored in preview-forward mode (per-app SHAs come from deploy/preview map)."
        required: false
      skip_infra:
        description: "Skip deploy-infra (Compose) step — use for app-only changes; infra has its own lever (candidate-flight-infra.yml)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write
  packages: read
  actions: read

concurrency:
  group: promote-deploy-${{ inputs.environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── Promote k8s overlays via direct commit to deploy branch ─────
  promote-k8s:
    runs-on: ubuntu-latest
    concurrency:
      group: promote-${{ inputs.environment }}
      cancel-in-progress: false
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      overlay: ${{ steps.env.outputs.overlay }}
      head_sha: ${{ steps.env.outputs.head_sha }}
      build_sha: ${{ steps.env.outputs.build_sha }}
      deploy_branch: ${{ steps.env.outputs.deploy_branch }}
      preview_forward: ${{ steps.env.outputs.preview_forward }}
      deploy_branch_sha: ${{ steps.deploy-push.outputs.deploy_branch_sha }}
      promoted_apps: ${{ steps.deploy-push.outputs.promoted_apps }}
    steps:
      - name: Determine environment
        id: env
        run: |
          ENV="${{ inputs.environment }}"
          RAW_SOURCE_SHA="${{ inputs.source_sha }}"
          # bug.0364 preview-forward mode: production + empty source_sha means
          # "copy whatever deploy/preview is currently proving forward". We
          # derive head_sha from deploy/preview's .promote-state/current-sha
          # so downstream checkouts (app-src, appset yaml, e2e) reference the
          # same main commit the preview artifact was built from.
          PREVIEW_FORWARD=false
          if [ "$ENV" = "production" ] && [ -z "$RAW_SOURCE_SHA" ]; then
            PREVIEW_FORWARD=true
            # In preview-forward mode head_sha must carry the workflow ref
            # (typically main tip), NOT preview current-sha: bootstrap scripts
            # for the workflow (resolve-digests-from-preview.sh, AppSet YAML,
            # verify-deployment.sh, e2e specs) may post-date preview's
            # current-sha. Using main tip matches the invariant that the
            # workflow always runs with its own paired scripts.
            # Informational: preview_current_sha is emitted for the summary.
            PREVIEW_CURRENT_SHA=$(curl -fsSL --max-time 30 "https://raw.githubusercontent.com/${{ github.repository }}/deploy/preview/.promote-state/current-sha" || true)
            if [ -z "$PREVIEW_CURRENT_SHA" ]; then
              echo "❌ preview-forward mode: failed to read deploy/preview .promote-state/current-sha"
              exit 1
            fi
            RAW_SOURCE_SHA="${{ github.sha }}"
            echo "🔁 preview-forward mode: head_sha=${RAW_SOURCE_SHA:0:8} (workflow ref) / preview_current_sha=${PREVIEW_CURRENT_SHA:0:8}"
            echo "preview_current_sha=$PREVIEW_CURRENT_SHA" >> $GITHUB_OUTPUT
          fi
          SHA="${RAW_SOURCE_SHA:-${{ github.sha }}}"
          # build_sha is the SHA baked into images at pr-build time (PR branch head).
          # On squash-merge, source_sha is the new main commit SHA but containers
          # report the PR branch SHA. Callers (flight-preview.sh) pass this
          # explicitly. Falls back to source_sha when not supplied (direct-push or
          # production promotion where the same image is re-used). In
          # preview-forward mode per-app build SHAs come from the preview
          # source-sha map — this value is a commit-message label only.
          BUILD_SHA="${{ inputs.build_sha }}"
          BUILD_SHA="${BUILD_SHA:-$SHA}"

          case "$ENV" in
            preview)    OVERLAY=preview;    DEPLOY_BRANCH=deploy/preview ;;
            production) OVERLAY=production; DEPLOY_BRANCH=deploy/production ;;
            *)          echo "❌ Unknown environment: $ENV"; exit 1 ;;
          esac

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "overlay=$OVERLAY" >> $GITHUB_OUTPUT
          echo "head_sha=$SHA" >> $GITHUB_OUTPUT
          echo "build_sha=$BUILD_SHA" >> $GITHUB_OUTPUT
          echo "deploy_branch=$DEPLOY_BRANCH" >> $GITHUB_OUTPUT
          echo "preview_forward=$PREVIEW_FORWARD" >> $GITHUB_OUTPUT
          echo "Promoting to $ENV (overlay: $OVERLAY, deploy branch: $DEPLOY_BRANCH, source: ${SHA:0:8}, build: ${BUILD_SHA:0:8}, preview_forward: $PREVIEW_FORWARD)"

      # Checkout app source for scripts and overlay templates
      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.env.outputs.head_sha }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          path: app-src

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # bug.0364: preview-forward mode checks out deploy/preview to read
      # resolved per-app digests + source-sha map, bypassing the single-SHA
      # GHCR tag assumption.
      - name: Checkout deploy/preview (preview-forward mode)
        if: steps.env.outputs.preview_forward == 'true'
        uses: actions/checkout@v4
        with:
          ref: deploy/preview
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          path: preview-src

      - name: Resolve digests from deploy/preview overlays (preview-forward mode)
        if: steps.env.outputs.preview_forward == 'true'
        id: digests-preview
        env:
          PREVIEW_OVERLAY_ROOT: ${{ github.workspace }}/preview-src/infra/k8s/overlays/preview
        run: bash app-src/scripts/ci/resolve-digests-from-preview.sh

      - name: Resolve all image digests
        if: steps.env.outputs.preview_forward != 'true'
        id: digests
        env:
          HEAD_SHA: ${{ steps.env.outputs.head_sha }}
        run: |
          # Canonical target catalog + tag-suffix + GHCR-package mapping
          # (bug.0328 + bug.0344). Checkout step places the repo under
          # `app-src/` (see `path: app-src` above), so the lib lives there.
          # image_name_for_target picks the APP vs MIGRATOR GHCR package
          # per target (bug.0344 GHCR split).
          # shellcheck source=../../scripts/ci/lib/image-tags.sh
          . app-src/scripts/ci/lib/image-tags.sh

          TAG="preview-${HEAD_SHA}"

          # Non-fatal: affected-only CI builds only changed services.
          # Empty digest = service not in this build; promote-k8s-image skips it,
          # leaving the existing digest in the overlay unchanged. The emitted
          # `repo@sha256:...` form takes the repo from the looked-up tag so
          # app-repo and migrator-repo digests are each preserved correctly
          # (bug.0344 — do not re-stamp the outer IMAGE_NAME onto migrator
          # digests, that was the single-repo-world bug).
          resolve_optional() {
            local full_tag="$1"
            local digest
            digest=$(docker buildx imagetools inspect "$full_tag" --raw 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('digest',''))" 2>/dev/null) || true
            # Fallback: parse from --format if raw didn't work
            if [ -z "$digest" ]; then
              digest=$(docker buildx imagetools inspect "$full_tag" 2>/dev/null | grep -oP 'Digest:\s+\Ksha256:[a-f0-9]+' | head -1) || true
            fi
            if [ -z "$digest" ]; then
              echo "⚠️  Image not found: $full_tag (not built in this run — overlay entry unchanged)" >&2
              echo ""
              return 0
            fi
            echo "${full_tag%%:*}@${digest}"
          }

          # Resolve every target and emit a single JSON blob the promote step
          # iterates — keeps the "one edit to add a node" promise: lib/image-tags.sh
          # is the only file that knows the target list. GHA outputs with dashes
          # are accessible only via the bracket-accessor form of a GHA
          # expression; JSON via jq is uniform and matches the underscore-key
          # pattern used elsewhere. NOTE: don't write a literal two-curly GHA
          # expression in this comment — GHA's expression scanner parses comment
          # text inside a run-block and an empty expression crashes dispatch.
          echo "Resolved digests:"
          DIGESTS_JSON="{}"
          for target in "${ALL_TARGETS[@]}"; do
            full_tag=$(image_tag_for_target "$(image_name_for_target "$target")" "$TAG" "$target")
            digest=$(resolve_optional "$full_tag")
            DIGESTS_JSON=$(printf '%s' "$DIGESTS_JSON" | jq -c --arg k "$target" --arg v "$digest" '. + {($k): $v}')
            printf '  %-18s %s\n' "${target}:" "${digest:-"(not built)"}"
          done
          # Single compact-JSON output consumed by the promote step.
          echo "digests_json=${DIGESTS_JSON}" >> "$GITHUB_OUTPUT"

      # Checkout the deploy branch — promote-k8s-image.sh runs HERE, not on app-src.
      # This preserves env-specific state (EndpointSlice IPs) written by provision.
      - name: Checkout deploy branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.env.outputs.deploy_branch }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          path: deploy-branch

      - name: Sync infra/k8s + catalog from app branch
        run: |
          # INFRA_K8S_MAIN_DERIVED (bug.0334): every file under infra/k8s/ on a
          # deploy branch must be byte-identical to main at the promoted SHA, OR
          # be an env-state.yaml (the per-overlay VM-truth file written by
          # provision). Two passes:
          #   (1) Bootstrap-only: seed env-state.yaml from main if missing
          #       (first promote after bug.0334 ships, or when a new overlay
          #       is added). --ignore-existing preserves VM IPs written by
          #       provision on subsequent runs.
          #   (2) Authoritative sync: rewrite everything else under infra/k8s/
          #       from main, preserving env-state.yaml via --exclude.
          # Digest lines are mutated in the next step by promote-k8s-image.sh.
          rsync -a --ignore-existing \
            --include='*/' --include='env-state.yaml' --exclude='*' \
            app-src/infra/k8s/ deploy-branch/infra/k8s/
          rsync -a --delete --exclude='env-state.yaml' \
            app-src/infra/k8s/ deploy-branch/infra/k8s/
          rsync -a --delete app-src/infra/catalog/ deploy-branch/infra/catalog/

      - name: Update overlay digests on deploy branch
        env:
          OVERLAY_ENV: ${{ steps.env.outputs.overlay }}
          PREVIEW_FORWARD: ${{ steps.env.outputs.preview_forward }}
          # Exactly one of these has a value (guarded by the `if:` on each
          # digests step). The fallback via `||` picks the populated one.
          DIGESTS_JSON: ${{ steps.digests.outputs.digests_json || steps.digests-preview.outputs.digests_json }}
        working-directory: deploy-branch
        run: |
          echo "Promoting digests to overlay: $OVERLAY_ENV (on deploy branch, preview_forward=$PREVIEW_FORWARD)"

          # promote-k8s-image.sh runs on the deploy branch checkout.
          # It only touches image digest fields — never EndpointSlice IPs.
          # Services with empty digest were not built in this run (affected-only CI);
          # their existing overlay entry is left unchanged.

          # Track which apps actually get new digests so wait-for-argocd
          # only blocks on apps that changed (not e.g. sandbox-openclaw with
          # a placeholder image that can never pull). Each promoted app
          # also records its source_sha into .promote-state/source-sha-by-app.json
          # for cross-env contract verification (bug.0321 Fix 4).
          PROMOTED=()

          # Source-SHA resolution:
          #   - Normal mode: every promoted app gets the same build_sha (PR
          #     branch head for this dispatch).
          #   - Preview-forward mode (bug.0364): each app keeps its own
          #     source_sha from deploy/preview's map — preview built those
          #     specific digests from those specific commits, and production
          #     must verify the same pairing. Map is copied wholesale below.
          BUILD_SHA="${{ steps.env.outputs.build_sha }}"
          PREVIEW_MAP=""
          if [ "$PREVIEW_FORWARD" = "true" ]; then
            PREVIEW_MAP="${{ github.workspace }}/preview-src/.promote-state/source-sha-by-app.json"
            if [ ! -f "$PREVIEW_MAP" ]; then
              echo "❌ preview-forward mode: source-sha map missing at $PREVIEW_MAP"
              exit 1
            fi
          fi

          promote_app() {
            local app="$1" digest="$2"
            [ -z "$digest" ] && return 0
            ../app-src/scripts/ci/promote-k8s-image.sh --no-commit \
              --env "$OVERLAY_ENV" \
              --app "$app" \
              --digest "$digest"
            # Resolve source_sha BEFORE marking the app as promoted. A
            # missing preview-map entry is a hard fail: the overlay digest
            # is about to be written, and verify-buildsha (SOURCE_SHA_MAP
            # mode) would silently fall back to EXPECTED_BUILDSHA (= the
            # workflow ref SHA), which does NOT match the image build SHA.
            # Better to refuse the promote than silent-green a mismatched
            # contract probe downstream.
            local app_source_sha="$BUILD_SHA"
            if [ -n "$PREVIEW_MAP" ]; then
              app_source_sha=$(jq -r --arg k "$app" '.[$k] // ""' "$PREVIEW_MAP")
              if [ -z "$app_source_sha" ]; then
                echo "❌ preview-forward: no source_sha for $app in preview map ($PREVIEW_MAP) — refusing to promote without verifiable build provenance"
                exit 1
              fi
            fi
            APP="$app" SOURCE_SHA="$app_source_sha" \
              bash ../app-src/scripts/ci/update-source-sha-map.sh
            PROMOTED+=("$app")
          }

          # task.0370 step 1 retired the per-node migrator companion target —
          # promote one digest per app (initContainer + main share the runtime image).
          # shellcheck source=../../scripts/ci/lib/image-tags.sh
          . ../app-src/scripts/ci/lib/image-tags.sh
          DIGESTS="$DIGESTS_JSON"

          for node in "${NODE_TARGETS[@]}"; do
            app_digest=$(printf '%s' "$DIGESTS" | jq -r --arg k "$node" '.[$k] // ""')
            promote_app "$node" "$app_digest"
          done
          sw_digest=$(printf '%s' "$DIGESTS" | jq -r '."scheduler-worker" // ""')
          promote_app scheduler-worker "$sw_digest"

          # Export for deploy-push step
          echo "PROMOTED_CSV=$(IFS=,; echo "${PROMOTED[*]}")" >> $GITHUB_ENV

      - name: Commit and push overlay changes to deploy branch
        id: deploy-push
        env:
          OVERLAY_ENV: ${{ steps.env.outputs.overlay }}
          HEAD_SHA: ${{ steps.env.outputs.head_sha }}
          DEPLOY_BRANCH: ${{ steps.env.outputs.deploy_branch }}
        working-directory: deploy-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHORT_SHA=$(echo "$HEAD_SHA" | cut -c1-8)

          git add -A

          if git diff --cached --quiet; then
            echo "No overlay changes (digests unchanged)"
            echo "pushed=false" >> $GITHUB_OUTPUT
            # Still export the deploy-branch tip SHA so wait-for-argocd has a
            # deterministic target (== the same SHA Argo is already reconciled to).
            DEPLOY_SHA=$(git rev-parse HEAD)
            echo "deploy_branch_sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT
            echo "promoted_apps=${PROMOTED_CSV}" >> $GITHUB_OUTPUT
            echo "ℹ️  deploy_branch_sha=${DEPLOY_SHA} (unchanged)"
            exit 0
          fi

          # Direct push to deploy branch — all environments.
          # Deploy branches are machine-written state; git history is the audit trail.
          # No PRs: they add no review value for automated digest updates.
          if [ -z "$PROMOTED_CSV" ]; then
            git commit -m "sync: base/catalog ${SHORT_SHA} (no image promotion)"
          else
            git commit -m "promote: ${OVERLAY_ENV} ${SHORT_SHA}"
          fi
          git push origin HEAD:${DEPLOY_BRANCH}
          DEPLOY_SHA=$(git rev-parse HEAD)
          echo "pushed=true" >> $GITHUB_OUTPUT
          # Symmetric with the no-op branch above: emit deploy_branch_sha +
          # promoted_apps on the PUSH path too, otherwise downstream verify-deploy
          # gate (if: promoted_apps != '') sees empty and skips when promotions
          # actually happened — the inverse of the intended behavior.
          echo "deploy_branch_sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT
          echo "promoted_apps=${PROMOTED_CSV}" >> $GITHUB_OUTPUT

      - name: Summarise promotion
        env:
          ENV: ${{ steps.env.outputs.environment }}
          HEAD_SHA: ${{ steps.env.outputs.head_sha }}
          DEPLOY_SHA: ${{ steps.deploy-push.outputs.deploy_branch_sha }}
          PROMOTED: ${{ steps.deploy-push.outputs.promoted_apps }}
        run: |
          {
            echo "## Promote-and-Deploy (${ENV})"
            echo ""
            echo "- Source SHA: \`${HEAD_SHA}\`"
            echo "- Deploy-branch SHA: \`${DEPLOY_SHA}\`"
            echo "- Promoted apps: ${PROMOTED:-_(none)_}"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -z "$PROMOTED" ]; then
            echo "::warning::No image digests promoted. Downstream verify-buildsha step will fail if pods serve a different SHA than ${HEAD_SHA:0:8}."
          fi
          echo "deploy_branch_sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT
          echo "promoted_apps=${PROMOTED_CSV}" >> $GITHUB_OUTPUT
          echo "✅ Direct push to ${DEPLOY_BRANCH} for ${OVERLAY_ENV} ${SHORT_SHA} (deploy-branch SHA: ${DEPLOY_SHA:0:8}, promoted: ${PROMOTED_CSV})"

  # ── Deploy Compose infrastructure ────────────────────────────────
  # Skipped when skip_infra=true (app-only changes). Infra has its own
  # lever: candidate-flight-infra.yml for candidate-a, or dispatch this
  # workflow with skip_infra=false when compose config changes.
  deploy-infra:
    if: inputs.skip_infra != 'true'
    runs-on: ubuntu-latest
    needs: promote-k8s
    environment: ${{ needs.promote-k8s.outputs.environment }}
    timeout-minutes: 15
    concurrency:
      group: deploy-infra-${{ needs.promote-k8s.outputs.environment }}
      cancel-in-progress: false
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      DEPLOY_ENVIRONMENT: ${{ needs.promote-k8s.outputs.environment }}
      APP_ENV: production
      COGNI_REPO_URL: https://github.com/${{ github.repository }}.git
      COGNI_REPO_REF: ${{ needs.promote-k8s.outputs.head_sha }}
      GIT_READ_USERNAME: Cogni-1729
      GIT_READ_TOKEN: ${{ secrets.GIT_READ_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SERVICE_URL: ${{ secrets.DATABASE_SERVICE_URL }}
      POSTGRES_ROOT_USER: ${{ secrets.POSTGRES_ROOT_USER }}
      POSTGRES_ROOT_PASSWORD: ${{ secrets.POSTGRES_ROOT_PASSWORD }}
      APP_DB_USER: ${{ secrets.APP_DB_USER }}
      APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
      APP_DB_SERVICE_USER: ${{ secrets.APP_DB_SERVICE_USER }}
      APP_DB_SERVICE_PASSWORD: ${{ secrets.APP_DB_SERVICE_PASSWORD }}
      APP_DB_NAME: ${{ secrets.APP_DB_NAME }}
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
      TEMPORAL_DB_USER: ${{ secrets.TEMPORAL_DB_USER }}
      TEMPORAL_DB_PASSWORD: ${{ secrets.TEMPORAL_DB_PASSWORD }}
      GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
      GHCR_USERNAME: Cogni-1729
      # bug.0344: Argo CD Image Updater git write-back to main. Consumed by
      # Step 7b in scripts/ci/deploy-infra.sh (preview/prod deploy also bootstraps
      # the image-updater controller idempotently — same PAT as the git-bump
      # steps above at lines 109, 186, 534, 747, 780).
      ACTIONS_AUTOMATION_BOT_PAT: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
      GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
      GRAFANA_CLOUD_LOKI_USER: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
      GRAFANA_CLOUD_LOKI_API_KEY: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
      PROMETHEUS_REMOTE_WRITE_URL: ${{ secrets.PROMETHEUS_REMOTE_WRITE_URL }}
      PROMETHEUS_USERNAME: ${{ secrets.PROMETHEUS_USERNAME }}
      PROMETHEUS_PASSWORD: ${{ secrets.PROMETHEUS_PASSWORD }}
      PROMETHEUS_QUERY_URL: ${{ secrets.PROMETHEUS_QUERY_URL }}
      PROMETHEUS_READ_USERNAME: ${{ secrets.PROMETHEUS_READ_USERNAME }}
      PROMETHEUS_READ_PASSWORD: ${{ secrets.PROMETHEUS_READ_PASSWORD }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
      SCHEDULER_API_TOKEN: ${{ secrets.SCHEDULER_API_TOKEN }}
      BILLING_INGEST_TOKEN: ${{ secrets.BILLING_INGEST_TOKEN }}
      INTERNAL_OPS_TOKEN: ${{ secrets.INTERNAL_OPS_TOKEN }}
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      OPENCLAW_GITHUB_RW_TOKEN: ${{ secrets.OPENCLAW_GITHUB_RW_TOKEN }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      DISCORD_OAUTH_CLIENT_ID: ${{ secrets.DISCORD_OAUTH_CLIENT_ID }}
      DISCORD_OAUTH_CLIENT_SECRET: ${{ secrets.DISCORD_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      GH_REVIEW_APP_ID: ${{ secrets.GH_REVIEW_APP_ID }}
      GH_REVIEW_APP_PRIVATE_KEY_BASE64: ${{ secrets.GH_REVIEW_APP_PRIVATE_KEY_BASE64 }}
      GH_REPOS: ${{ vars.GH_REPOS }}
      GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
      PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      PRIVY_SIGNING_KEY: ${{ secrets.PRIVY_SIGNING_KEY }}
      PRIVY_USER_WALLETS_APP_ID: ${{ secrets.PRIVY_USER_WALLETS_APP_ID }}
      PRIVY_USER_WALLETS_APP_SECRET: ${{ secrets.PRIVY_USER_WALLETS_APP_SECRET }}
      PRIVY_USER_WALLETS_SIGNING_KEY: ${{ secrets.PRIVY_USER_WALLETS_SIGNING_KEY }}
      POLY_WALLET_AEAD_KEY_HEX: ${{ secrets.POLY_WALLET_AEAD_KEY_HEX }}
      POLY_WALLET_AEAD_KEY_ID: ${{ secrets.POLY_WALLET_AEAD_KEY_ID }}
      POLY_WALLET_ALLOW_STUB_CREDS: ${{ secrets.POLY_WALLET_ALLOW_STUB_CREDS }}
      COPY_TRADE_TARGET_WALLETS: ${{ secrets.COPY_TRADE_TARGET_WALLETS }}
      CONNECTIONS_ENCRYPTION_KEY: ${{ secrets.CONNECTIONS_ENCRYPTION_KEY }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
      COGNI_NODE_DBS: ${{ secrets.COGNI_NODE_DBS }}
    steps:
      # Checkout the source-artifact SHA for AppSet YAML, wait-for-argocd
      # inputs, and other job-internal files. deploy-infra.sh itself sources
      # infra/compose/** from a detached `git worktree add --ref main` so
      # infra rsync is independent of head_sha (task.0314). This separation
      # preserves the source-SHA invariant for the rest of the job while
      # still fixing the stale-PR-rsync failure mode.
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.head_sha }}

      - name: Setup SSH
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set — skipping infra deploy"
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Testing SSH connection to $VM_HOST..."
          set +e
          OUT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6 root@"$VM_HOST" "echo SSH test successful" 2>&1)
          RC=$?
          set -e
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            echo "❌ SSH failed (rc=$RC)"
            exit 1
          fi
          echo "✅ SSH connection successful"

      # AppSet reconcile (bug.0312) moved to verify-deploy so it runs on
      # every non-empty promotion regardless of skip_infra (bug.0361).

      - name: Deploy infrastructure
        if: env.VM_HOST != ''
        run: scripts/ci/deploy-infra.sh --ref main

      # wait-for-argocd + wait-for-in-cluster-services + verify-buildsha
      # moved to the verify-deploy job (bug.0321 Fix 3). Those gates are
      # now visibly skipped at the JOB level when promoted_apps is empty
      # instead of silently skipped at the step level (green-on-empty).

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infra-deployment-artifacts-${{ github.run_id }}
          path: ${{ runner.temp }}/deploy-infra-${{ github.run_id }}/
          if-no-files-found: warn
          retention-days: 14

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── Verify promoted apps rolled and serve the expected SHA ──────
  # bug.0321 Fix 3: job-level gate on promoted_apps. Empty-promotion
  # run surfaces as visibly SKIPPED (grey in the checks list) — never
  # a silent-green. Downstream jobs (e2e, lock-preview-on-success)
  # that consume this via `needs:` also correctly cascade to skipped.
  #
  # Order is authoritative:
  #   1. wait-for-argocd       — Argo reconciled to deploy-branch tip, Healthy
  #   2. wait-for-in-cluster-services — rollouts clean, catches secrets-restart crashloops
  #   3. verify-buildsha       — contract probe: /version.buildSha (per map; NODES=promoted_apps when set — task.0349)
  verify-deploy:
    runs-on: ubuntu-latest
    needs: [promote-k8s, deploy-infra]
    # Explicit result guard, not GHA's implicit success(). Without the
    # `|| deploy-infra.result == 'skipped'` leg, this job cascade-skips
    # every time flight-preview dispatches with skip_infra=true (bug.0361).
    if: |
      always() &&
      needs.promote-k8s.result == 'success' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped') &&
      needs.promote-k8s.outputs.promoted_apps != ''
    environment: ${{ needs.promote-k8s.outputs.environment }}
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      DEPLOY_ENVIRONMENT: ${{ needs.promote-k8s.outputs.environment }}
    steps:
      # Bare checkout at workspace root so local composite actions
      # (./.github/actions/loki-ci-telemetry, which itself nests
      # uses: ./.github/actions/loki-push and invokes scripts/ci/*.sh
      # with cwd=$GITHUB_WORKSPACE) can resolve. Nested `uses: ./...`
      # inside a composite resolves against $GITHUB_WORKSPACE, not the
      # parent action's dir — a one-line path prefix on the outer call
      # is insufficient.
      - name: Checkout (workspace root — for local composite actions)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.head_sha }}

      - name: Checkout app source (for verification scripts)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.head_sha }}
          path: app-src

      - name: Checkout deploy branch (for .promote-state/source-sha-by-app.json)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.deploy_branch }}
          path: deploy-branch
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Setup SSH
        if: env.VM_HOST != ''
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # Reconcile the ApplicationSet on the VM BEFORE waiting for sync. This
      # is the fix for the bug.0312 preview-stuck-on-deploy/staging incident:
      # the live AppSet template can drift behind the repo (e.g. when the
      # deploy branch name was retired in a repo-only change), and no CD step
      # was re-applying it. Runs in verify-deploy (not deploy-infra) so the
      # reconcile still happens on every non-empty promotion when skip_infra
      # is true (bug.0361).
      - name: Reconcile ArgoCD ApplicationSet from repo
        if: env.VM_HOST != ''
        env:
          SSH_OPTS: "-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          DEPLOY_ENVIRONMENT: ${{ needs.promote-k8s.outputs.environment }}
        run: |
          APPSET_FILE="app-src/infra/k8s/argocd/${DEPLOY_ENVIRONMENT}-applicationset.yaml"
          if [ ! -f "$APPSET_FILE" ]; then
            echo "⚠️  No ApplicationSet file for ${DEPLOY_ENVIRONMENT} (${APPSET_FILE}) — skipping"
            exit 0
          fi
          echo "📤 SCPing ${APPSET_FILE} to VM and applying..."
          # shellcheck disable=SC2086
          scp $SSH_OPTS "$APPSET_FILE" root@"$VM_HOST":/tmp/appset.yaml
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl apply -f /tmp/appset.yaml -n argocd && rm -f /tmp/appset.yaml"
          echo "✅ ApplicationSet reconciled"

      - name: Wait for ArgoCD sync
        if: env.VM_HOST != ''
        env:
          SSH_OPTS: "-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          # Argo tracks the deploy branch, not main. EXPECTED_SHA must be the
          # deploy-branch tip SHA written by promote-k8s (NOT source-app SHA).
          # See scripts/ci/wait-for-argocd.sh:29-34 — passing the wrong SHA
          # silently times out.
          EXPECTED_SHA: ${{ needs.promote-k8s.outputs.deploy_branch_sha }}
          # Scope the wait to apps actually promoted this run. Untouched apps
          # (e.g. sandbox-openclaw placeholder) would false-fail.
          PROMOTED_APPS: ${{ needs.promote-k8s.outputs.promoted_apps }}
        run: bash app-src/scripts/ci/wait-for-argocd.sh

      - name: Wait for in-cluster services
        if: env.VM_HOST != ''
        run: bash app-src/scripts/ci/wait-for-in-cluster-services.sh

      # Authoritative contract probe: pods serve the SHA that built their
      # current overlay digest. Runs in per-app SOURCE_SHA_MAP mode (bug.0321
      # Fix 4): reads deploy-branch/.promote-state/source-sha-by-app.json and
      # asserts each promoted node-app's /version.buildSha matches its map entry
      # (NODES=promoted_apps restricts to affected-only subset — task.0349).
      # Works for preview (same SHA across nodes) and production (cross-PR:
      # nodes may have mixed SHAs). Falls back to single-SHA single-NODES mode
      # on first-deploy bootstrap where the map file does not yet exist.
      - name: Verify buildSha on endpoints
        if: env.VM_HOST != ''
        env:
          SOURCE_SHA_MAP: deploy-branch/.promote-state/source-sha-by-app.json
          # build_sha is the PR branch head SHA baked into images — not the
          # squash-merge commit on main (head_sha). See promote-k8s inputs.
          EXPECTED_BUILDSHA: ${{ needs.promote-k8s.outputs.build_sha }}
          NODES: ${{ needs.promote-k8s.outputs.promoted_apps }}
        run: bash app-src/scripts/ci/verify-buildsha.sh

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── Verify deployment (DOMAIN probes, independent of promotion) ────
  verify:
    runs-on: ubuntu-latest
    needs: [promote-k8s, deploy-infra]
    # Explicit result guard — see verify-deploy note. bug.0361.
    if: |
      always() &&
      needs.promote-k8s.result == 'success' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    environment: ${{ needs.promote-k8s.outputs.environment }}
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      K8S_NAMESPACE: cogni-${{ needs.promote-k8s.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.head_sha }}

      - name: Verify deployment
        run: |
          if [ -z "$DOMAIN" ]; then
            echo "⚠️ No DOMAIN variable set — skipping verify"
            exit 0
          fi
          scripts/ci/verify-deployment.sh

      - name: Dump diagnostics on failure
        if: failure() && env.VM_HOST != ''
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          echo "=== Argo CD Applications ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n argocd get applications -o wide" 2>&1 || true
          echo ""
          echo "=== Pods ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n $K8S_NAMESPACE get pods -o wide" 2>&1 || true
          echo ""
          echo "=== Events ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n $K8S_NAMESPACE get events --sort-by=.lastTimestamp | tail -20" 2>&1 || true

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── E2E Smoke Tests ─────────────────────────────────────────────
  # Runs after verify + verify-deploy pass. Same workflow — no workflow_run
  # chaining. When promoted_apps is empty, verify-deploy is skipped and
  # e2e correctly cascades to skipped (its `needs:` includes verify-deploy).
  e2e:
    runs-on: ubuntu-latest
    needs: [promote-k8s, verify, verify-deploy]
    # e2e requires real verification — verify and verify-deploy must have
    # actually succeeded (not skipped). Empty-promotion path (promoted_apps
    # empty) correctly cascades to skipped because verify-deploy is skipped.
    if: |
      needs.promote-k8s.result == 'success' &&
      needs.verify.result == 'success' &&
      needs.verify-deploy.result == 'success'
    timeout-minutes: 10
    environment: ${{ needs.promote-k8s.outputs.environment }}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      TEST_BASE_URL: https://${{ vars.DOMAIN }}
    steps:
      - name: Check prerequisites
        id: gate
        run: |
          if [ -z "$TEST_BASE_URL" ] || [ "$TEST_BASE_URL" = "https://" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ DOMAIN not set in environment — skipping E2E"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Running E2E against $TEST_BASE_URL"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.head_sha }}

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright smoke tests
        if: steps.gate.outputs.skip != 'true'
        run: pnpm e2e:smoke

      # verify-buildsha moved to the verify-deploy job (bug.0321 Fix 3 +
      # Fix 4) so the contract probe surfaces at the correct structural
      # level: a skipped verify-deploy job distinguishes "no promotion"
      # from "promotion verified", visible in the checks list.

      - name: Upload E2E artifacts
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-${{ github.run_id }}
          path: e2e/artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── Preview review-state lease transitions ─────────────────────
  # Three-value lease model (task.0293): unlocked → dispatching → reviewing.
  # flight-preview.yml claims the dispatching lease before invoking
  # this workflow. The two jobs below drive the terminal transitions:
  #   - lock-preview-on-success: dispatching → reviewing + write current-sha
  #   - unlock-preview-on-failure: dispatching → unlocked (current-sha untouched)
  # Both only run when the target environment is preview.
  lock-preview-on-success:
    runs-on: ubuntu-latest
    needs: [promote-k8s, e2e]
    if: |
      needs.promote-k8s.outputs.environment == 'preview' &&
      needs.e2e.result == 'success'
    steps:
      # Check out main — set-preview-review-state.sh is orthogonal to the
      # deploy artifact SHA and must always resolve, including off-main
      # workflow_dispatch runs where source_sha predates the script.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Transition dispatching → reviewing and write current-sha
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: deploy/preview
        run: |
          bash scripts/ci/set-preview-review-state.sh reviewing "${{ needs.promote-k8s.outputs.head_sha }}"

  unlock-preview-on-failure:
    runs-on: ubuntu-latest
    needs: [promote-k8s, deploy-infra, verify, verify-deploy, e2e]
    # Fires when any upstream job did not reach `success` — including failure,
    # cancelled, and skipped (which happens downstream of a failing job OR on
    # the empty-promotion bug.0321 Fix 3 path where verify-deploy and e2e are
    # visibly skipped). The `!= 'success'` form handles all three in one
    # expression. Catastrophic failure before the `Determine environment`
    # step leaves outputs empty and this guard skips — that case requires
    # manual unlock.
    if: |
      always() &&
      needs.promote-k8s.outputs.environment == 'preview' &&
      (needs.promote-k8s.result != 'success' ||
       (needs.deploy-infra.result != 'success' && needs.deploy-infra.result != 'skipped') ||
       needs.verify.result != 'success' ||
       needs.verify-deploy.result != 'success' ||
       needs.e2e.result != 'success')
    steps:
      # Check out main — see note on lock-preview-on-success above.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Unlock preview after deploy failure
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: deploy/preview
        run: |
          bash scripts/ci/set-preview-review-state.sh unlocked
