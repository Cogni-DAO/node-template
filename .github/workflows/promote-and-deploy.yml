name: Promote and Deploy

# Dispatched by flight-preview.yml (primary path: PR merge → re-tag → dispatch here).
# Updates deploy branch overlays with image digests, reconciles the Argo CD
# ApplicationSet on the VM from repo state, waits until Argo reports the new
# deploy-branch SHA as Healthy, deploys Compose infra via SSH, verifies health,
# runs E2E, and drives the preview review-state lease.
#
# Job outputs that downstream jobs care about:
#   promote-k8s.deploy_branch_sha  — tip SHA of deploy/{env} after promote
#                                    pushes. deploy-infra passes this to
#                                    wait-for-argocd as the Argo reconcile
#                                    target. On no-op promotes (overlay
#                                    unchanged) this still carries the
#                                    current deploy-branch tip so the wait
#                                    step has a deterministic target.
#   promote-k8s.head_sha           — source_sha the caller dispatched with
#                                    (merge commit SHA for normal flow).
#                                    Written into deploy/preview current-sha
#                                    by lock-preview-on-success.
#
# Checkout refs (each job picks the right one):
#   promote-k8s, deploy-infra, verify, e2e          — ref=head_sha
#     (need overlay templates, compose bundles, and e2e specs from the
#     source artifact commit)
#   lock-preview-on-success, unlock-preview-on-failure — ref=main
#     (set-preview-review-state.sh is orthogonal to the deploy artifact;
#     checking out source_sha broke any dispatch with an off-main SHA)
#
# All envs: direct push to deploy branch (git history is the audit trail).
# App containers are managed by Argo CD (auto-syncs on deploy branch change).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: preview
        type: choice
        options: [preview, production]
      source_sha:
        description: "SHA of source images (PR head SHA — images must exist as preview-{sha} in GHCR)"
        required: false

permissions:
  contents: write
  packages: read
  actions: read

concurrency:
  group: promote-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  # ── Promote k8s overlays via direct commit to deploy branch ─────
  promote-k8s:
    runs-on: ubuntu-latest
    concurrency:
      group: promote-${{ inputs.environment }}
      cancel-in-progress: false
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      overlay: ${{ steps.env.outputs.overlay }}
      head_sha: ${{ steps.env.outputs.head_sha }}
      deploy_branch: ${{ steps.env.outputs.deploy_branch }}
      deploy_branch_sha: ${{ steps.deploy-push.outputs.deploy_branch_sha }}
    steps:
      - name: Determine environment
        id: env
        run: |
          ENV="${{ inputs.environment }}"
          SHA="${{ inputs.source_sha || github.sha }}"

          case "$ENV" in
            preview)    OVERLAY=preview;    DEPLOY_BRANCH=deploy/preview ;;
            production) OVERLAY=production; DEPLOY_BRANCH=deploy/production ;;
            *)          echo "❌ Unknown environment: $ENV"; exit 1 ;;
          esac

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "overlay=$OVERLAY" >> $GITHUB_OUTPUT
          echo "head_sha=$SHA" >> $GITHUB_OUTPUT
          echo "deploy_branch=$DEPLOY_BRANCH" >> $GITHUB_OUTPUT
          echo "Promoting to $ENV (overlay: $OVERLAY, deploy branch: $DEPLOY_BRANCH, sha: ${SHA:0:8})"

      # Checkout app source for scripts and overlay templates
      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.env.outputs.head_sha }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          path: app-src

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve all image digests
        id: digests
        env:
          HEAD_SHA: ${{ steps.env.outputs.head_sha }}
        run: |
          IMAGE_NAME="ghcr.io/cogni-dao/cogni-template"
          TAG="preview-${HEAD_SHA}"

          # Non-fatal: affected-only CI builds only changed services.
          # Empty digest = service not in this build; promote-k8s-image skips it,
          # leaving the existing digest in the overlay unchanged.
          resolve_optional() {
            local full_tag="${IMAGE_NAME}:${1}"
            local digest
            digest=$(docker buildx imagetools inspect "$full_tag" --raw 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('digest',''))" 2>/dev/null) || true
            # Fallback: parse from --format if raw didn't work
            if [ -z "$digest" ]; then
              digest=$(docker buildx imagetools inspect "$full_tag" 2>/dev/null | grep -oP 'Digest:\s+\Ksha256:[a-f0-9]+' | head -1) || true
            fi
            if [ -z "$digest" ]; then
              echo "⚠️  Image not found: $full_tag (not built in this run — overlay entry unchanged)"
              echo ""
              return 0
            fi
            echo "${IMAGE_NAME}@${digest}"
          }

          # operator is always required — fail hard if missing
          OPERATOR_DIGEST=$(docker buildx imagetools inspect "${IMAGE_NAME}:${TAG}" --raw 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('digest',''))" 2>/dev/null) || true
          if [ -z "$OPERATOR_DIGEST" ]; then
            OPERATOR_DIGEST=$(docker buildx imagetools inspect "${IMAGE_NAME}:${TAG}" 2>/dev/null | grep -oP 'Digest:\s+\Ksha256:[a-f0-9]+' | head -1) || true
          fi
          if [ -z "$OPERATOR_DIGEST" ]; then
            echo "❌ Operator image not found: ${IMAGE_NAME}:${TAG}"
            exit 1
          fi
          OPERATOR_DIGEST="${IMAGE_NAME}@${OPERATOR_DIGEST}"

          POLY_DIGEST=$(resolve_optional "${TAG}-poly")
          RESY_DIGEST=$(resolve_optional "${TAG}-resy")
          MIGRATOR_DIGEST=$(resolve_optional "${TAG}-migrate")
          SW_DIGEST=$(resolve_optional "${TAG}-scheduler-worker")

          echo "operator=$OPERATOR_DIGEST" >> $GITHUB_OUTPUT
          echo "poly=$POLY_DIGEST" >> $GITHUB_OUTPUT
          echo "resy=$RESY_DIGEST" >> $GITHUB_OUTPUT
          echo "migrator=$MIGRATOR_DIGEST" >> $GITHUB_OUTPUT
          echo "scheduler_worker=$SW_DIGEST" >> $GITHUB_OUTPUT

          echo "Resolved digests:"
          echo "  operator:         $OPERATOR_DIGEST"
          echo "  poly:             ${POLY_DIGEST:-"(not built)"}"
          echo "  resy:             ${RESY_DIGEST:-"(not built)"}"
          echo "  migrator:         ${MIGRATOR_DIGEST:-"(not built)"}"
          echo "  scheduler-worker: ${SW_DIGEST:-"(not built)"}"

      # Checkout the deploy branch — promote-k8s-image.sh runs HERE, not on app-src.
      # This preserves env-specific state (EndpointSlice IPs) written by provision.
      - name: Checkout deploy branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.env.outputs.deploy_branch }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          path: deploy-branch

      - name: Sync base and catalog from app branch
        run: |
          # Base templates and catalog may change on the app branch.
          # Overlays are NOT synced — they contain env-specific state (IPs)
          # that provision wrote directly to the deploy branch.
          # NOTE: New node overlay directories must be added to the deploy branch
          # manually when a node is added (see docs/guides/node-formation-guide.md).
          rsync -a --delete app-src/infra/k8s/base/ deploy-branch/infra/k8s/base/
          rsync -a --delete app-src/infra/catalog/ deploy-branch/infra/catalog/

      - name: Update overlay digests on deploy branch
        env:
          OVERLAY_ENV: ${{ steps.env.outputs.overlay }}
        working-directory: deploy-branch
        run: |
          echo "Promoting digests to overlay: $OVERLAY_ENV (on deploy branch)"

          # promote-k8s-image.sh runs on the deploy branch checkout.
          # It only touches image digest fields — never EndpointSlice IPs.
          # Services with empty digest were not built in this run (affected-only CI);
          # their existing overlay entry is left unchanged.

          # operator always present (checked earlier)
          MIGRATOR_DIGEST="${{ steps.digests.outputs.migrator }}"
          ../app-src/scripts/ci/promote-k8s-image.sh --no-commit \
            --env "$OVERLAY_ENV" \
            --app operator \
            --digest "${{ steps.digests.outputs.operator }}" \
            ${MIGRATOR_DIGEST:+--migrator-digest "$MIGRATOR_DIGEST"}

          POLY_DIGEST="${{ steps.digests.outputs.poly }}"
          if [ -n "$POLY_DIGEST" ]; then
            ../app-src/scripts/ci/promote-k8s-image.sh --no-commit \
              --env "$OVERLAY_ENV" \
              --app poly \
              --digest "$POLY_DIGEST" \
              ${MIGRATOR_DIGEST:+--migrator-digest "$MIGRATOR_DIGEST"}
          fi

          RESY_DIGEST="${{ steps.digests.outputs.resy }}"
          if [ -n "$RESY_DIGEST" ]; then
            ../app-src/scripts/ci/promote-k8s-image.sh --no-commit \
              --env "$OVERLAY_ENV" \
              --app resy \
              --digest "$RESY_DIGEST" \
              ${MIGRATOR_DIGEST:+--migrator-digest "$MIGRATOR_DIGEST"}
          fi

          SW_DIGEST="${{ steps.digests.outputs.scheduler_worker }}"
          if [ -n "$SW_DIGEST" ]; then
            ../app-src/scripts/ci/promote-k8s-image.sh --no-commit \
              --env "$OVERLAY_ENV" \
              --app scheduler-worker \
              --digest "$SW_DIGEST"
          fi

      - name: Commit and push overlay changes to deploy branch
        id: deploy-push
        env:
          OVERLAY_ENV: ${{ steps.env.outputs.overlay }}
          HEAD_SHA: ${{ steps.env.outputs.head_sha }}
          DEPLOY_BRANCH: ${{ steps.env.outputs.deploy_branch }}
        working-directory: deploy-branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SHORT_SHA=$(echo "$HEAD_SHA" | cut -c1-8)

          git add -A

          if git diff --cached --quiet; then
            echo "No overlay changes (digests unchanged)"
            echo "pushed=false" >> $GITHUB_OUTPUT
            # Still export the deploy-branch tip SHA so wait-for-argocd has a
            # deterministic target (== the same SHA Argo is already reconciled to).
            DEPLOY_SHA=$(git rev-parse HEAD)
            echo "deploy_branch_sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT
            echo "ℹ️  deploy_branch_sha=${DEPLOY_SHA} (unchanged)"
            exit 0
          fi

          # Direct push to deploy branch — all environments.
          # Deploy branches are machine-written state; git history is the audit trail.
          # No PRs: they add no review value for automated digest updates.
          git commit -m "promote: ${OVERLAY_ENV} ${SHORT_SHA}"
          git push origin HEAD:${DEPLOY_BRANCH}
          DEPLOY_SHA=$(git rev-parse HEAD)
          echo "pushed=true" >> $GITHUB_OUTPUT
          echo "deploy_branch_sha=$DEPLOY_SHA" >> $GITHUB_OUTPUT
          echo "✅ Direct push to ${DEPLOY_BRANCH} for ${OVERLAY_ENV} ${SHORT_SHA} (deploy-branch SHA: ${DEPLOY_SHA:0:8})"

  # ── Deploy Compose infrastructure ────────────────────────────────
  deploy-infra:
    runs-on: ubuntu-latest
    needs: promote-k8s
    environment: ${{ needs.promote-k8s.outputs.environment }}
    timeout-minutes: 15
    concurrency:
      group: deploy-infra-${{ needs.promote-k8s.outputs.environment }}
      cancel-in-progress: false
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      DEPLOY_ENVIRONMENT: ${{ needs.promote-k8s.outputs.environment }}
      APP_ENV: production
      COGNI_REPO_URL: https://github.com/${{ github.repository }}.git
      COGNI_REPO_REF: ${{ needs.promote-k8s.outputs.head_sha }}
      GIT_READ_USERNAME: Cogni-1729
      GIT_READ_TOKEN: ${{ secrets.GIT_READ_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SERVICE_URL: ${{ secrets.DATABASE_SERVICE_URL }}
      POSTGRES_ROOT_USER: ${{ secrets.POSTGRES_ROOT_USER }}
      POSTGRES_ROOT_PASSWORD: ${{ secrets.POSTGRES_ROOT_PASSWORD }}
      APP_DB_USER: ${{ secrets.APP_DB_USER }}
      APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
      APP_DB_SERVICE_USER: ${{ secrets.APP_DB_SERVICE_USER }}
      APP_DB_SERVICE_PASSWORD: ${{ secrets.APP_DB_SERVICE_PASSWORD }}
      APP_DB_NAME: ${{ secrets.APP_DB_NAME }}
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
      TEMPORAL_DB_USER: ${{ secrets.TEMPORAL_DB_USER }}
      TEMPORAL_DB_PASSWORD: ${{ secrets.TEMPORAL_DB_PASSWORD }}
      GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
      GHCR_USERNAME: Cogni-1729
      GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
      GRAFANA_CLOUD_LOKI_USER: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
      GRAFANA_CLOUD_LOKI_API_KEY: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
      PROMETHEUS_REMOTE_WRITE_URL: ${{ secrets.PROMETHEUS_REMOTE_WRITE_URL }}
      PROMETHEUS_USERNAME: ${{ secrets.PROMETHEUS_USERNAME }}
      PROMETHEUS_PASSWORD: ${{ secrets.PROMETHEUS_PASSWORD }}
      PROMETHEUS_QUERY_URL: ${{ secrets.PROMETHEUS_QUERY_URL }}
      PROMETHEUS_READ_USERNAME: ${{ secrets.PROMETHEUS_READ_USERNAME }}
      PROMETHEUS_READ_PASSWORD: ${{ secrets.PROMETHEUS_READ_PASSWORD }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
      SCHEDULER_API_TOKEN: ${{ secrets.SCHEDULER_API_TOKEN }}
      BILLING_INGEST_TOKEN: ${{ secrets.BILLING_INGEST_TOKEN }}
      INTERNAL_OPS_TOKEN: ${{ secrets.INTERNAL_OPS_TOKEN }}
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      OPENCLAW_GITHUB_RW_TOKEN: ${{ secrets.OPENCLAW_GITHUB_RW_TOKEN }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      DISCORD_OAUTH_CLIENT_ID: ${{ secrets.DISCORD_OAUTH_CLIENT_ID }}
      DISCORD_OAUTH_CLIENT_SECRET: ${{ secrets.DISCORD_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      GH_REVIEW_APP_ID: ${{ secrets.GH_REVIEW_APP_ID }}
      GH_REVIEW_APP_PRIVATE_KEY_BASE64: ${{ secrets.GH_REVIEW_APP_PRIVATE_KEY_BASE64 }}
      GH_REPOS: ${{ vars.GH_REPOS }}
      GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
      PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      PRIVY_SIGNING_KEY: ${{ secrets.PRIVY_SIGNING_KEY }}
      CONNECTIONS_ENCRYPTION_KEY: ${{ secrets.CONNECTIONS_ENCRYPTION_KEY }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
      COGNI_NODE_ENDPOINTS: ${{ secrets.COGNI_NODE_ENDPOINTS }}
      COGNI_NODE_DBS: ${{ secrets.COGNI_NODE_DBS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.head_sha }}

      - name: Setup SSH
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set — skipping infra deploy"
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Testing SSH connection to $VM_HOST..."
          set +e
          OUT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6 root@"$VM_HOST" "echo SSH test successful" 2>&1)
          RC=$?
          set -e
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            echo "❌ SSH failed (rc=$RC)"
            exit 1
          fi
          echo "✅ SSH connection successful"

      # Reconcile the ApplicationSet on the VM BEFORE waiting for sync. This
      # is the fix for the bug.0312 preview-stuck-on-deploy/staging incident:
      # the live AppSet template can drift behind the repo (e.g. when the
      # deploy branch name was retired in a repo-only change), and no CD step
      # was re-applying it. Running this every deploy makes the CD path self-
      # healing against future template drift.
      - name: Reconcile ArgoCD ApplicationSet from repo
        if: env.VM_HOST != ''
        env:
          SSH_OPTS: "-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          DEPLOY_ENVIRONMENT: ${{ needs.promote-k8s.outputs.environment }}
        run: |
          APPSET_FILE="infra/k8s/argocd/${DEPLOY_ENVIRONMENT}-applicationset.yaml"
          if [ ! -f "$APPSET_FILE" ]; then
            echo "⚠️  No ApplicationSet file for ${DEPLOY_ENVIRONMENT} (${APPSET_FILE}) — skipping"
            exit 0
          fi
          echo "📤 SCPing ${APPSET_FILE} to VM and applying..."
          # shellcheck disable=SC2086
          scp $SSH_OPTS "$APPSET_FILE" root@"$VM_HOST":/tmp/appset.yaml
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl apply -f /tmp/appset.yaml -n argocd && rm -f /tmp/appset.yaml"
          echo "✅ ApplicationSet reconciled"

      - name: Wait for ArgoCD sync
        if: env.VM_HOST != ''
        env:
          SSH_OPTS: "-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          # Argo tracks the deploy branch, not main. EXPECTED_SHA must be the
          # deploy-branch tip SHA written by promote-k8s, not the source-app SHA.
          EXPECTED_SHA: ${{ needs.promote-k8s.outputs.deploy_branch_sha }}
        run: scripts/ci/wait-for-argocd.sh

      - name: Deploy infrastructure
        if: env.VM_HOST != ''
        run: scripts/ci/deploy-infra.sh

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infra-deployment-artifacts-${{ github.run_id }}
          path: ${{ runner.temp }}/deploy-infra-${{ github.run_id }}/
          if-no-files-found: warn
          retention-days: 14

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── Verify deployment ──────────────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    needs: [promote-k8s, deploy-infra]
    environment: ${{ needs.promote-k8s.outputs.environment }}
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      K8S_NAMESPACE: cogni-${{ needs.promote-k8s.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.head_sha }}

      - name: Verify deployment
        run: |
          if [ -z "$DOMAIN" ]; then
            echo "⚠️ No DOMAIN variable set — skipping verify"
            exit 0
          fi
          scripts/ci/verify-deployment.sh

      - name: Dump diagnostics on failure
        if: failure() && env.VM_HOST != ''
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"

          echo "=== Argo CD Applications ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n argocd get applications -o wide" 2>&1 || true
          echo ""
          echo "=== Pods ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n $K8S_NAMESPACE get pods -o wide" 2>&1 || true
          echo ""
          echo "=== Events ==="
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n $K8S_NAMESPACE get events --sort-by=.lastTimestamp | tail -20" 2>&1 || true

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── E2E Smoke Tests ─────────────────────────────────────────────
  # Runs after verify passes. Same workflow — no workflow_run chaining.
  e2e:
    runs-on: ubuntu-latest
    needs: [promote-k8s, verify]
    timeout-minutes: 10
    environment: ${{ needs.promote-k8s.outputs.environment }}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      TEST_BASE_URL: https://${{ vars.DOMAIN }}
    steps:
      - name: Check prerequisites
        id: gate
        run: |
          if [ -z "$TEST_BASE_URL" ] || [ "$TEST_BASE_URL" = "https://" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ DOMAIN not set in environment — skipping E2E"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Running E2E against $TEST_BASE_URL"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.promote-k8s.outputs.head_sha }}

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright smoke tests
        if: steps.gate.outputs.skip != 'true'
        run: pnpm e2e:smoke

      - name: Upload E2E artifacts
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-${{ github.run_id }}
          path: e2e/artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── Preview review-state lease transitions ─────────────────────
  # Three-value lease model (task.0293): unlocked → dispatching → reviewing.
  # flight-preview.yml claims the dispatching lease before invoking
  # this workflow. The two jobs below drive the terminal transitions:
  #   - lock-preview-on-success: dispatching → reviewing + write current-sha
  #   - unlock-preview-on-failure: dispatching → unlocked (current-sha untouched)
  # Both only run when the target environment is preview.
  lock-preview-on-success:
    runs-on: ubuntu-latest
    needs: [promote-k8s, e2e]
    if: |
      needs.promote-k8s.outputs.environment == 'preview' &&
      needs.e2e.result == 'success'
    steps:
      # Check out main — set-preview-review-state.sh is orthogonal to the
      # deploy artifact SHA and must always resolve, including off-main
      # workflow_dispatch runs where source_sha predates the script.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Transition dispatching → reviewing and write current-sha
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: deploy/preview
        run: |
          bash scripts/ci/set-preview-review-state.sh reviewing "${{ needs.promote-k8s.outputs.head_sha }}"

  unlock-preview-on-failure:
    runs-on: ubuntu-latest
    needs: [promote-k8s, deploy-infra, verify, e2e]
    # Fires when any upstream job did not reach `success` — including failure,
    # cancelled, and skipped (which happens downstream of a failing job). The
    # `!= 'success'` form handles all three in one expression. Catastrophic
    # failure before the `Determine environment` step leaves outputs empty and
    # this guard skips — that case requires manual unlock.
    if: |
      always() &&
      needs.promote-k8s.outputs.environment == 'preview' &&
      (needs.promote-k8s.result != 'success' ||
       needs.deploy-infra.result != 'success' ||
       needs.verify.result != 'success' ||
       needs.e2e.result != 'success')
    steps:
      # Check out main — see note on lock-preview-on-success above.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Unlock preview after deploy failure
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: deploy/preview
        run: |
          bash scripts/ci/set-preview-review-state.sh unlocked
