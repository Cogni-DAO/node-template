name: PR Build

# Three-stage pipeline (task.0321):
#   detect → build (matrix, one leg per affected target) → manifest
# Each matrix leg builds+pushes a single target in parallel; the manifest
# job merges per-leg fragments into the canonical build-manifest.json
# artifact so downstream candidate-flight consumers see no contract change.

on:
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/cogni-dao/cogni-template
  IMAGE_TAG: ${{ format('pr-{0}-{1}', github.event.pull_request.number, github.event.pull_request.head.sha) }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  HEAD_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate infra/catalog/*.yaml against schema
        run: |
          pipx install 'check-jsonschema==0.37.1'
          check-jsonschema --schemafile infra/catalog/_schema.json infra/catalog/*.yaml

  detect:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      has_targets: ${{ steps.detect.outputs.has_targets }}
      targets_json: ${{ steps.detect.outputs.targets_json }}
      targets_csv: ${{ steps.detect.outputs.targets }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect affected image targets
        id: detect
        env:
          TURBO_SCM_BASE: origin/${{ github.event.pull_request.base.ref }}
          TURBO_SCM_HEAD: HEAD
        run: bash scripts/ci/detect-affected.sh

  build:
    needs: detect
    if: needs.detect.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect.outputs.targets_json) }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.target }}
        env:
          TARGETS: ${{ matrix.target }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force the real PR head SHA into BUILD_SHA. On pull_request triggers,
          # GITHUB_SHA is the ephemeral refs/pull/{N}/merge commit, which /readyz
          # would otherwise report as a phantom version. See bug.0313.
          BUILD_SHA: ${{ github.event.pull_request.head.sha }}
          OUTPUT_FILE: ${{ runner.temp }}/build-fragment-${{ matrix.target }}.json
        run: bash scripts/ci/build-and-push-images.sh

      - name: Upload build fragment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-build-fragment-${{ matrix.target }}-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/build-fragment-${{ matrix.target }}.json
          retention-days: 1
          if-no-files-found: error
          overwrite: true

  manifest:
    needs: [detect, build]
    # Run when build succeeded, or when it was skipped because no targets were
    # affected. Any build-leg failure should fail this PR check — don't ship a
    # manifest for a partially built PR.
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Download build fragments
        if: needs.detect.outputs.has_targets == 'true'
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/build-fragments
          pattern: pr-build-fragment-*-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          merge-multiple: true

      - name: Merge fragments into build-images.json
        env:
          FRAGMENTS_DIR: ${{ runner.temp }}/build-fragments
          OUTPUT_FILE: ${{ runner.temp }}/build-images.json
        run: bash scripts/ci/merge-build-fragments.sh

      - name: Write build manifest
        env:
          IMAGES_FILE: ${{ runner.temp }}/build-images.json
          MANIFEST_FILE: ${{ runner.temp }}/build-manifest.json
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REF_NAME: ${{ github.event.pull_request.head.ref }}
        run: bash scripts/ci/write-build-manifest.sh

      - name: Upload build manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-manifest-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/build-manifest.json
          retention-days: 7
          if-no-files-found: error
          overwrite: true
