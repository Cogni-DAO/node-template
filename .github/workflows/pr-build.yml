name: PR Build

on:
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/cogni-dao/cogni-template
  IMAGE_TAG: ${{ format('pr-{0}-{1}', github.event.pull_request.number, github.event.pull_request.head.sha) }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  HEAD_SHA: ${{ github.event.pull_request.head.sha }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect affected image targets
        id: detect
        env:
          TURBO_SCM_BASE: origin/${{ github.event.pull_request.base.ref }}
          TURBO_SCM_HEAD: HEAD
        run: bash scripts/ci/detect-affected.sh

      - name: Set up Docker Buildx
        if: steps.detect.outputs.has_targets == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.detect.outputs.has_targets == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push affected images
        env:
          TARGETS: ${{ steps.detect.outputs.targets }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/build-and-push-images.sh

      - name: Write build manifest
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REF_NAME: ${{ github.event.pull_request.head.ref }}
        run: bash scripts/ci/write-build-manifest.sh

      - name: Upload build manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-manifest-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/build-manifest.json
          retention-days: 7
          if-no-files-found: error
