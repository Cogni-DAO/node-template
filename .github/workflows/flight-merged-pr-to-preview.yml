name: Flight Merged PR to Preview

# Triggered on every push to main (PR merged) or via workflow_dispatch(sha).
# Re-tags pr-{N}-{sha} → preview-{sha} in GHCR (no rebuild) and then calls
# scripts/ci/promote-to-preview.sh which handles the three-value lease gate:
# unlocked → dispatching → reviewing. See task.0293 for the full model.
#
# Direct pushes to main (no associated PR) are NOT a supported flight trigger:
# the re-tag source images are pr-{N}-{sha}, and a direct push has no PR number.
# Such pushes exit 0 with a message and do nothing.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Merged commit SHA (must be reachable from origin/main)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  pull-requests: read
  actions: write

# Serialize entry to the unlocked → dispatching transition. Two merges landing
# within seconds will run back-to-back, not in parallel. The three-value lease
# in promote-to-preview.sh is the correctness guarantee; this concurrency group
# just reduces push-retry churn under bursty merges.
concurrency:
  group: flight-preview
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/cogni-dao/cogni-template

jobs:
  flight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0

      - name: Resolve target SHA and associated PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ inputs.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            HEAD_SHA="$DISPATCH_SHA"
            # Ancestor check: refuse to flight a SHA not on main.
            git fetch origin main --depth=100 >/dev/null
            if ! git merge-base --is-ancestor "$HEAD_SHA" origin/main 2>/dev/null; then
              echo "❌ SHA $HEAD_SHA is not reachable from origin/main — refusing to flight"
              exit 1
            fi
          else
            HEAD_SHA="$PUSH_SHA"
          fi

          # Canonical "find PR that produced this commit" — GitHub's API for it.
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${HEAD_SHA}/pulls" \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ]; then
            echo "ℹ️  No PR associated with ${HEAD_SHA:0:8} — direct push to main is not a supported flight trigger"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=pr-${PR_NUMBER}-${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Merged PR #${PR_NUMBER} head SHA ${HEAD_SHA:0:8}"

      - name: Set up Docker Buildx
        if: steps.pr.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.pr.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve PR image digests
        id: images
        if: steps.pr.outputs.skip != 'true'
        env:
          IMAGE_TAG: ${{ steps.pr.outputs.image_tag }}
          OUTPUT_FILE: ${{ runner.temp }}/resolved-pr-images.json
        run: bash scripts/ci/resolve-pr-build-images.sh

      - name: Abort when no PR images exist
        if: steps.pr.outputs.skip != 'true' && steps.images.outputs.has_images != 'true'
        run: |
          echo "❌ No PR images found for ${{ steps.pr.outputs.image_tag }}"
          echo "   pr-build.yml must run successfully on the PR before it can be flighted."
          echo "   Re-run pr-build and re-dispatch this workflow with workflow_dispatch(sha)."
          exit 1

      # Re-tag only the images that were actually built (affected-only CI may skip services).
      # promote-and-deploy resolves preview-{sha} tags — this creates them without rebuilding.
      - name: Re-tag PR images as preview-{sha} in GHCR
        if: steps.pr.outputs.skip != 'true' && steps.images.outputs.has_images == 'true'
        env:
          PR_IMAGE_TAG: ${{ steps.pr.outputs.image_tag }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          RESOLVED_TARGETS: ${{ steps.images.outputs.resolved_targets }}
        run: |
          PREVIEW_TAG="preview-${HEAD_SHA}"

          retag_if_built() {
            local target="$1"
            local src_suffix="$2"
            local dst_suffix="$3"

            if echo "$RESOLVED_TARGETS" | grep -qw "$target"; then
              local src="${IMAGE_NAME}:${PR_IMAGE_TAG}${src_suffix}"
              local dst="${IMAGE_NAME}:${PREVIEW_TAG}${dst_suffix}"
              echo "Re-tagging ${target}: ${PR_IMAGE_TAG}${src_suffix} → ${PREVIEW_TAG}${dst_suffix}"
              docker buildx imagetools create --tag "$dst" "$src"
            else
              echo "Skipping ${target} — not in PR build (not affected or not built)"
            fi
          }

          retag_if_built "operator"         ""                  ""
          retag_if_built "poly"             "-poly"             "-poly"
          retag_if_built "resy"             "-resy"             "-resy"
          retag_if_built "migrator"         "-migrate"          "-migrate"
          retag_if_built "scheduler-worker" "-scheduler-worker" "-scheduler-worker"

          echo "✅ Re-tag complete for preview-${HEAD_SHA:0:8}"

      - name: Flight to preview (lock-gate aware)
        if: steps.pr.outputs.skip != 'true' && steps.images.outputs.has_images == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
        run: |
          bash scripts/ci/promote-to-preview.sh \
            "${{ steps.pr.outputs.head_sha }}" \
            "${{ github.repository }}" \
            "deploy/preview" \
            "$GH_TOKEN"
