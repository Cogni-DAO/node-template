name: E2E Smoke

# Runs Playwright smoke tests after Promote and Deploy succeeds.
# On staging: E2E success auto-creates a release/* branch + PR to main.

on:
  workflow_run:
    workflows: ["Promote and Deploy"]
    types: [completed]
    branches: [canary, staging]

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10
    environment: ${{ github.event.workflow_run.head_branch == 'canary' && 'canary' || 'preview' }}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      TEST_BASE_URL: https://${{ vars.DOMAIN }}
    steps:
      - name: Check prerequisites
        id: gate
        run: |
          if [ -z "$TEST_BASE_URL" ] || [ "$TEST_BASE_URL" = "https://" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ DOMAIN not set in environment — skipping E2E"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Running E2E against $TEST_BASE_URL"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright smoke tests
        if: steps.gate.outputs.skip != 'true'
        run: pnpm e2e:smoke

      - name: Upload E2E artifacts
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-${{ github.run_id }}
          path: e2e/artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── Canary → staging promotion ───────────────────────────────────
  # After canary E2E passes, dispatch promote-and-deploy for staging
  # using the SAME digests (no rebuild). This triggers the staging leg:
  # promote-and-deploy (staging) → e2e (staging) → promote-release.
  promote-to-staging:
    runs-on: ubuntu-latest
    needs: e2e
    if: ${{ github.event.workflow_run.head_branch == 'canary' }}
    steps:
      - name: Trigger staging deployment with canary digests
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
        run: |
          echo "Promoting canary SHA ${{ github.event.workflow_run.head_sha }} → staging"
          gh workflow run promote-and-deploy.yml \
            --repo "${{ github.repository }}" \
            --ref staging \
            -f environment=preview \
            -f source_sha=${{ github.event.workflow_run.head_sha }}

  # ── Release promotion (staging only) ───────────────────────────
  # After staging E2E passes, create a release/* branch + PR to main.
  promote-release:
    runs-on: ubuntu-latest
    needs: e2e
    if: ${{ github.event.workflow_run.head_branch == 'staging' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: staging
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Compute release branch name
        id: meta
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHORT_SHA=$(echo "$HEAD_SHA" | cut -c1-8)
          DATE=$(date -u +%Y%m%d)
          echo "branch=release/${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create and push release branch
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch origin
          git checkout -B "${{ steps.meta.outputs.branch }}" "$HEAD_SHA"
          git push origin "${{ steps.meta.outputs.branch }}"

      - name: Create PR body
        run: |
          mkdir -p /tmp/pr
          {
            echo "## Automated Release Promotion"
            echo ""
            echo "### Commits in this release"
            echo ""
            git log --oneline origin/main..HEAD
          } > /tmp/pr/body.md

      - name: Derive PR title
        id: title
        run: |
          git fetch origin main:origin/main
          COMMITS=$(git log --pretty=%s origin/main..HEAD || true)
          COUNT=$(printf "%s\n" "$COMMITS" | grep -c . || true)
          if [ "$COUNT" -eq 1 ]; then
            SUBJECT=$(printf "%s\n" "$COMMITS" | head -n1 | sed 's/ (#[0-9]\+)$//')
            echo "title=$SUBJECT" >> $GITHUB_OUTPUT
          else
            DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "title=release: $DATE" >> $GITHUB_OUTPUT
          fi

      - name: Create PR release/* -> main
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.meta.outputs.branch }}" \
            --title "${{ steps.title.outputs.title }}" \
            --body-file /tmp/pr/body.md \
          || gh pr view --head "${{ steps.meta.outputs.branch }}" >/dev/null
