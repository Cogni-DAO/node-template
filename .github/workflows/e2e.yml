name: E2E Smoke

# Runs Playwright smoke tests after Promote and Deploy succeeds.
# On canary success: checks CI status and promotes to preview if eligible.
# Release PR creation is human-initiated via release.yml (not auto-triggered).

on:
  workflow_run:
    workflows: ["Promote and Deploy"]
    types: [completed]
    branches: [canary, staging]

permissions:
  contents: write
  actions: read

concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10
    environment: ${{ github.event.workflow_run.head_branch == 'canary' && 'canary' || 'preview' }}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      TEST_BASE_URL: https://${{ vars.DOMAIN }}
    steps:
      - name: Check prerequisites
        id: gate
        run: |
          if [ -z "$TEST_BASE_URL" ] || [ "$TEST_BASE_URL" = "https://" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ DOMAIN not set in environment — skipping E2E"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Running E2E against $TEST_BASE_URL"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright smoke tests
        if: steps.gate.outputs.skip != 'true'
        run: pnpm e2e:smoke

      - name: Upload E2E artifacts
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-${{ github.run_id }}
          path: e2e/artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # ── Canary → preview promotion (CI-gated) ────────────────────────
  # After canary E2E passes, check CI status and promote to preview
  # if eligible. Preview is a locked snapshot lane — if under review,
  # only records the candidate SHA for later.
  promote-to-preview:
    runs-on: ubuntu-latest
    needs: e2e
    if: ${{ github.event.workflow_run.head_branch == 'canary' }}
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Promote to preview (CI-gated, locked snapshot model)
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
        run: |
          scripts/ci/promote-to-preview.sh \
            "${{ github.event.workflow_run.head_sha }}" \
            "${{ github.repository }}" \
            "deploy/preview" \
            "$GH_TOKEN"
