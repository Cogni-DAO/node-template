name: Create Release

# Human-initiated release promotion. Reads the current preview SHA and
# creates a singleton release/* PR to main. Closes any stale release PRs.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Create release PR from preview SHA
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
        run: |
          scripts/ci/create-release.sh \
            "${{ github.repository }}" \
            "deploy/preview" \
            "$GH_TOKEN"
