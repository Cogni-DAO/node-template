name: Require pinned release PRs to main

# Gates release/* PRs to main. The pinned-SHA check guarantees the release
# branch still points at the SHA that was flighted + reviewed on preview,
# so "Update branch" or extra commits can't quietly rewrite a release.
#
# Non-release PRs (feature/*, fix/*, etc.) are allowed and not evaluated
# here — the trunk-based model in docs/spec/ci-cd.md lets feature PRs merge
# to main directly when safe.

on:
  pull_request:
    branches: [main]
  push:
    branches: [release/*]

permissions:
  contents: read

jobs:
  require-pinned-release-branch:
    # Only evaluate release/* heads. Feature PRs skip this job entirely.
    if: >-
      ${{ github.event_name == 'push' ||
          startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}

      - name: Fail if release head != pinned SHA
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BRANCH="${GITHUB_HEAD_REF}"
          else
            BRANCH="${GITHUB_REF_NAME:-${GITHUB_REF#refs/heads/}}"
          fi

          PIN=$(echo "$BRANCH" | sed -E 's/^release\/[0-9]{8}-([0-9a-f]{8})$/\1/')
          if [ -z "$PIN" ] || [ "$PIN" = "$BRANCH" ]; then
            echo "ERROR: Branch name $BRANCH does not match release/YYYYMMDD-<8-char-sha>"
            exit 1
          fi

          HEAD_SHORT=$(git rev-parse --short=8 HEAD)
          if [ "$HEAD_SHORT" != "$PIN" ]; then
            echo "ERROR: Release branch head $HEAD_SHORT does not match pinned SHA $PIN."
            echo "Close this PR and re-dispatch release.yml to cut a fresh release/*."
            exit 1
          fi

          echo "OK: release head ($HEAD_SHORT) matches pinned SHA ($PIN)."
