#
# One-shot bootstrap for the alloy-secrets k8s Secret on the candidate-a VM.
#
# Why this exists:
#   - The k8s alloy DaemonSet (infra/k8s/base/alloy/) envFroms a Secret named
#     `alloy-secrets` containing Grafana Cloud + METRICS_TOKEN credentials.
#   - deploy-infra.sh creates node-app / scheduler-worker / sandbox-openclaw
#     secrets but does NOT create alloy-secrets.
#   - candidate-flight.yml doesn't touch secrets at all.
#   - Until ksops (task.0311) or ESO (task.0284) is wired end-to-end, the
#     alloy-loki-setup.md guide describes a manual SSH bootstrap. This
#     workflow captures that same command behind workflow_dispatch so there
#     is no bespoke SSH-from-workstation step.
#
# Scope:
#   - candidate-a only. preview / production should receive secrets via
#     ksops or ESO, NOT a second manual path. See proj row #16.
#   - Idempotent: uses `kubectl apply` via `--dry-run=client -o yaml` pipe.

name: Bootstrap alloy-secrets (candidate-a)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: canary # legacy naming — canary env holds SSH_DEPLOY_KEY + VM_HOST for the candidate-a VM
    steps:
      - name: Install SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create/update alloy-secrets in cogni-candidate-a
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no root@"$VM_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          if [ ! -f /opt/cogni-template-runtime/.env ]; then
            echo "[ERROR] /opt/cogni-template-runtime/.env not found on VM" >&2
            exit 1
          fi
          set -a
          # shellcheck disable=SC1091
          source /opt/cogni-template-runtime/.env
          set +a
          : "${LOKI_WRITE_URL:?missing}"
          : "${LOKI_USERNAME:?missing}"
          : "${LOKI_PASSWORD:?missing}"
          : "${PROMETHEUS_REMOTE_WRITE_URL:?missing}"
          : "${PROMETHEUS_USERNAME:?missing}"
          : "${PROMETHEUS_PASSWORD:?missing}"
          : "${METRICS_TOKEN:?missing}"
          kubectl create namespace cogni-candidate-a 2>/dev/null || true
          kubectl -n cogni-candidate-a create secret generic alloy-secrets \
            --from-literal=LOKI_WRITE_URL="$LOKI_WRITE_URL" \
            --from-literal=LOKI_USERNAME="$LOKI_USERNAME" \
            --from-literal=LOKI_PASSWORD="$LOKI_PASSWORD" \
            --from-literal=PROMETHEUS_REMOTE_WRITE_URL="$PROMETHEUS_REMOTE_WRITE_URL" \
            --from-literal=PROMETHEUS_USERNAME="$PROMETHEUS_USERNAME" \
            --from-literal=PROMETHEUS_PASSWORD="$PROMETHEUS_PASSWORD" \
            --from-literal=METRICS_TOKEN="$METRICS_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "---"
          kubectl -n cogni-candidate-a get secret alloy-secrets
          REMOTE
