name: Require pinned promote-prod PRs

# Gates promote-prod/* PRs to deploy/production. Ported from
# require-pinned-release-prs-to-main.yml — same shape, different source of
# truth: the branch-name SHA must match `.promote-state/source-sha` in the
# PR head AND that SHA must be the current-sha on deploy/preview (i.e.,
# the PR was generated by promote-to-production.yml against a
# preview-validated artifact, not hand-edited).
#
# Also enforces a narrow file-allowlist so a promotion PR can't smuggle
# in app code or workflow edits — deploy branches are state-only
# (docs/spec/ci-cd.md).

on:
  pull_request:
    branches: [deploy/production]
  push:
    branches: [promote-prod/*]

permissions:
  contents: read

jobs:
  require-pinned-promote-prod-branch:
    # Skip PRs whose head is not promote-prod/* (e.g., incident-only manual
    # PRs — spec axiom #9). Those should be reviewed by humans and don't
    # need the machine-format check.
    if: >-
      ${{ github.event_name == 'push' ||
          startsWith(github.head_ref, 'promote-prod/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || '' }}

      - name: Fail if promote-prod head != pinned source-sha
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BRANCH="${GITHUB_HEAD_REF}"
          else
            BRANCH="${GITHUB_REF_NAME:-${GITHUB_REF#refs/heads/}}"
          fi

          PIN=$(echo "$BRANCH" | sed -E 's|^promote-prod/[0-9]{8}-([0-9a-f]{8})$|\1|')
          if [ -z "$PIN" ] || [ "$PIN" = "$BRANCH" ]; then
            echo "ERROR: Branch name $BRANCH does not match promote-prod/YYYYMMDD-<8-char-sha>"
            exit 1
          fi

          if [ ! -f .promote-state/source-sha ]; then
            echo "ERROR: .promote-state/source-sha missing on ${BRANCH}"
            exit 1
          fi
          SOURCE_SHA=$(tr -d '[:space:]' < .promote-state/source-sha)
          SOURCE_SHORT=$(echo "$SOURCE_SHA" | cut -c1-8)

          if [ "$SOURCE_SHORT" != "$PIN" ]; then
            echo "ERROR: source-sha ${SOURCE_SHORT} does not match pinned SHA ${PIN}."
            echo "Close this PR and re-dispatch promote-to-production.yml."
            exit 1
          fi

          echo "OK: branch pin ($PIN) matches .promote-state/source-sha ($SOURCE_SHORT)."

      - name: Fail if source-sha is not current on deploy/preview
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The source-sha must equal deploy/preview's current-sha at some
          # point. We require it to equal the CURRENT preview current-sha,
          # which is the strongest guarantee — a later preview promotion
          # would have moved current-sha forward. If that's too strict in
          # practice we can relax to "appears in preview history".
          PREVIEW_CURRENT=$(gh api \
            "repos/${{ github.repository }}/contents/.promote-state/current-sha?ref=deploy/preview" \
            --jq '.content' 2>/dev/null | base64 -d | tr -d '[:space:]' || true)
          if [ -z "$PREVIEW_CURRENT" ]; then
            echo "ERROR: Could not read deploy/preview:.promote-state/current-sha"
            exit 1
          fi

          SOURCE_SHA=$(tr -d '[:space:]' < .promote-state/source-sha)

          if [ "$SOURCE_SHA" != "$PREVIEW_CURRENT" ]; then
            echo "ERROR: source-sha ${SOURCE_SHA:0:8} is not the current preview sha (${PREVIEW_CURRENT:0:8})."
            echo "Preview has moved on — close this PR and re-dispatch promote-to-production.yml."
            exit 1
          fi

          echo "OK: source-sha matches deploy/preview current-sha (${SOURCE_SHA:0:8})."

      - name: Fail if PR touches non-deploy-state paths
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json files --jq '.files[].path')

          if [ -z "$FILES" ]; then
            echo "ERROR: could not list PR files"
            exit 1
          fi

          # Bash `case` globs treat `*` as matching any characters
          # including `/`, so a single `*` after the prefix is enough to
          # cover any depth under that directory.
          BAD=""
          while IFS= read -r path; do
            case "$path" in
              .promote-state/* | infra/k8s/* | infra/catalog/*)
                ;;
              *)
                BAD="${BAD}${path}"$'\n'
                ;;
            esac
          done <<<"$FILES"

          if [ -n "$BAD" ]; then
            echo "ERROR: promote-prod PRs may only touch .promote-state/, infra/k8s/, infra/catalog/."
            echo "Disallowed paths:"
            echo "$BAD"
            exit 1
          fi

          echo "OK: PR touches only deploy-state paths."
