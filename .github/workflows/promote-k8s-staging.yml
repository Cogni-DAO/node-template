name: Promote k8s Staging Overlays

# Triggered by Build Multi-Node success. Resolves digests from GHCR for all
# node apps + services, updates Kustomize overlays, commits atomically.
# Argo CD auto-syncs on overlay change.
#
# Separate workflow avoids branch-mutation loop (build workflow is triggered
# by push; committing back from the same workflow would retrigger).

on:
  workflow_run:
    workflows: ["Build Multi-Node"]
    types: [completed]
    branches: [integration/multi-node, canary]

permissions:
  contents: write
  packages: read

concurrency:
  group: promote-k8s-staging
  cancel-in-progress: true

jobs:
  promote:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve all image digests
        id: digests
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Canonical GHCR name (github.repository redirects node-template, GHCR stores cogni-template)
          IMAGE_NAME="ghcr.io/cogni-dao/cogni-template"
          TAG="preview-${SHA}"

          resolve() {
            local full_tag="${IMAGE_NAME}:${1}"
            local digest
            digest=$(docker buildx imagetools inspect "$full_tag" --format '{{.Manifest.Digest}}' 2>/dev/null) || {
              echo "❌ Failed to resolve: $full_tag"
              exit 1
            }
            echo "${IMAGE_NAME}@${digest}"
          }

          # Node apps
          OPERATOR_DIGEST=$(resolve "$TAG")
          POLY_DIGEST=$(resolve "${TAG}-poly")
          RESY_DIGEST=$(resolve "${TAG}-resy")

          # Services
          MIGRATOR_DIGEST=$(resolve "${TAG}-migrate")
          SW_DIGEST=$(resolve "${TAG}-scheduler-worker")

          echo "operator=$OPERATOR_DIGEST" >> $GITHUB_OUTPUT
          echo "poly=$POLY_DIGEST" >> $GITHUB_OUTPUT
          echo "resy=$RESY_DIGEST" >> $GITHUB_OUTPUT
          echo "migrator=$MIGRATOR_DIGEST" >> $GITHUB_OUTPUT
          echo "scheduler_worker=$SW_DIGEST" >> $GITHUB_OUTPUT

          echo "✅ Resolved all digests:"
          echo "  operator:         $OPERATOR_DIGEST"
          echo "  poly:             $POLY_DIGEST"
          echo "  resy:             $RESY_DIGEST"
          echo "  migrator:         $MIGRATOR_DIGEST"
          echo "  scheduler-worker: $SW_DIGEST"

      - name: Update overlay digests
        env:
          # Unset so promote script skips auto-commit — we batch into one atomic commit
          GITHUB_SHA: ""
        run: |
          scripts/ci/promote-k8s-image.sh \
            --app operator \
            --digest "${{ steps.digests.outputs.operator }}" \
            --migrator-digest "${{ steps.digests.outputs.migrator }}"

          scripts/ci/promote-k8s-image.sh \
            --app poly \
            --digest "${{ steps.digests.outputs.poly }}"

          scripts/ci/promote-k8s-image.sh \
            --app resy \
            --digest "${{ steps.digests.outputs.resy }}"

          scripts/ci/promote-k8s-image.sh \
            --app scheduler-worker \
            --digest "${{ steps.digests.outputs.scheduler_worker }}"

      - name: Commit and push overlay updates
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add infra/k8s/overlays/staging/

          if git diff --cached --quiet; then
            echo "No overlay changes (digests unchanged)"
          else
            SHORT_SHA=$(echo "$SHA" | cut -c1-8)
            git commit -m "chore(cd): promote staging overlays to ${SHORT_SHA} [skip ci]"
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            git push origin "HEAD:${BRANCH}"
            echo "✅ Overlay digests updated"
          fi
