name: Auto-merge release PRs

# Behavior:
# - Not on main: job skipped
# - On main but not ready: job fails (red), no merge
# - On main and ready: job succeeds and merges

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: read

jobs:
  auto-merge-release:
    # Only run on release/* PRs targeting main
    if: |
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check if ready to merge
        id: ready
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
        run: |
          # Get PR details via GitHub CLI
          PR_DATA=$(gh pr view ${{ github.event.pull_request.number }} --json state,isDraft,reviewDecision,statusCheckRollup)

          # Extract values
          STATE=$(echo "$PR_DATA" | jq -r '.state')
          IS_DRAFT=$(echo "$PR_DATA" | jq -r '.isDraft')
          REVIEW_DECISION=$(echo "$PR_DATA" | jq -r '.reviewDecision')

          # Check required status checks
          REQUIRED_CHECKS=("static" "component" "unit" "stack-test" "require-pinned-release-branch")
          ALL_PASSED=true

          for check in "${REQUIRED_CHECKS[@]}"; do
            STATUS=$(echo "$PR_DATA" | jq -r --arg check "$check" '
              [
                (.statusCheckRollup // [])
                | .[]
                | select(.name == $check)
                | .conclusion
              ]
              | if length == 0 then
                  "MISSING"
                elif any(. != "SUCCESS" and . != "NEUTRAL") then
                  "FAIL"
                else
                  "SUCCESS"
                end
            ')
            
            if [[ "$STATUS" != "SUCCESS" ]]; then
              ALL_PASSED=false
            fi
          done

          # Determine if ready to merge
          if [[ "$STATE" == "OPEN" ]] && \
             [[ "$IS_DRAFT" == "false" ]] && \
             [[ "$REVIEW_DECISION" == "APPROVED" ]] && \
             [[ "$ALL_PASSED" == "true" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "🟢 PR #${{ github.event.pull_request.number }} is ready to auto-merge"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "❌ PR #${{ github.event.pull_request.number }} is NOT ready to auto-merge"
            exit 1
          fi

      - name: Auto-merge release PR
        id: merge
        if: steps.ready.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "🚀 Auto-merging release PR #${{ github.event.pull_request.number }}"

          # Merge will be authored by the owner of ACTIONS_AUTOMATION_BOT_PAT (Cogni-1729)
          # Use env var to prevent shell injection via malicious branch names
          SUBJECT="Merge ${HEAD_REF} into main"

          gh pr merge ${{ github.event.pull_request.number }} \
            --merge \
            --subject "$SUBJECT" \
            --body "Automated merge by Cogni-1729 automation after required checks passed."

          echo "✅ Successfully merged release PR"

      - name: Unlock preview for next candidate
        if: steps.merge.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: deploy/preview
        run: |
          bash scripts/ci/set-preview-review-state.sh unlocked

      - name: Drain queued candidate-sha if it differs from current-sha
        if: steps.merge.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
        run: |
          DEPLOY_BRANCH="deploy/preview"
          # Fresh fetch — the unlock step above just pushed to this ref.
          git fetch "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            "${DEPLOY_BRANCH}:refs/remotes/origin/${DEPLOY_BRANCH}" --depth=1 2>/dev/null || {
            echo "⚠️  Could not fetch ${DEPLOY_BRANCH} — skipping drain"
            exit 0
          }
          CURRENT=$(git show "refs/remotes/origin/${DEPLOY_BRANCH}:.promote-state/current-sha" 2>/dev/null || echo "")
          CANDIDATE=$(git show "refs/remotes/origin/${DEPLOY_BRANCH}:.promote-state/candidate-sha" 2>/dev/null || echo "")
          if [ -n "$CANDIDATE" ] && [ "$CANDIDATE" != "$CURRENT" ]; then
            echo "🚀 Draining queued candidate ${CANDIDATE:0:8} (current=${CURRENT:0:8})"
            gh workflow run flight-preview.yml \
              --repo "${{ github.repository }}" \
              --ref main \
              -f sha="$CANDIDATE"
          else
            echo "ℹ️  No drain needed (candidate == current or empty)"
          fi
