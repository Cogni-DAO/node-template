name: Provision Env (substrate + VM)

# Crawl row 1 of proj.agentic-fork-bootstrap — eliminates the laptop-shell
# anti-pattern from the cold-start path. Replaces `pnpm bootstrap` for
# fresh-fork provisioning: the GHA runner now owns the tofu+kubectl+bao
# session that previously lived on the operator's laptop.
#
# Trust boundary: runner is ephemeral + audit-logged + scoped to env secrets.
# The operator's laptop never holds CHERRY_AUTH_TOKEN, root-token, or k3s
# kubeconfig past the artifact-download window.
#
# Custody contract (init artifacts):
#   1. encryption_passphrase is an operator-typed workflow input — never
#      stored in env secrets, never echoed (::add-mask:: applied).
#   2. After bootstrap, `.local/<env>-openbao-init.json`, `<env>-vm-key`,
#      and `<env>-kubeconfig.yaml` are openssl-AES-256-CBC encrypted with
#      the passphrase and uploaded as a 1-day-retention GHA artifact.
#   3. always() cleanup shreds plaintext + ciphertext from the runner FS.
#   4. Operator downloads the artifact, decrypts, moves to a password
#      manager, deletes the artifact from the run page.
#
# v-next swap point: when a parent OpenBao exists (the operator's `cogni`
# deployment, or env N>1 within a multi-env fork), replace the encrypt+
# upload steps with `hashicorp/vault-action` pushes. Same workflow shape,
# different sink. Tracked as a Walk-tier row in proj.agentic-fork-bootstrap.

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        required: true
        type: choice
        options:
          - candidate-a
          - preview
          - production
      encryption_passphrase:
        description: "Operator-typed passphrase for the init artifact (NEVER stored)"
        required: true
        type: string

permissions:
  contents: read
  packages: read
  actions: read

concurrency:
  # One provision at a time per env. Re-runs of an in-progress provision
  # would race tofu-state + Cloudflare DNS edits. cancel-in-progress: false
  # because a half-applied tofu state should NOT be killed mid-flight.
  group: provision-env-${{ inputs.env }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    timeout-minutes: 60
    env:
      DEPLOY_ENV: ${{ inputs.env }}
      # Operator minting authority — surfaced from GH env secrets. Loaded
      # into bootstrap.sh via the .env.bootstrap file the next step writes.
      CHERRY_AUTH_TOKEN: ${{ secrets.CHERRY_AUTH_TOKEN }}
      CHERRY_PROJECT_ID: ${{ secrets.CHERRY_PROJECT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      # GitHub reserves the GITHUB_* secret-name prefix (HTTP 422 on set). The
      # operator-facing secret names are GH_ADMIN_*; we re-export here as the
      # GITHUB_ADMIN_* env vars bootstrap.sh consumes internally. See
      # docs/runbooks/fork-quickstart.md §6.2.
      GITHUB_ADMIN_PAT: ${{ secrets.GH_ADMIN_PAT }}
      GITHUB_ADMIN_USERNAME: ${{ secrets.GH_ADMIN_USERNAME }}
      # `bootstrap.sh` and `provision-env-vm.sh` both run non-interactively
      # on the runner; the editor-open branch in bootstrap.sh already
      # detects non-TTY and skips (scripts/setup/bootstrap.sh line 61).
      CI: "true"
    steps:
      # ─────────────────────────────────────────────────────────────
      # Pre-flight — abort BEFORE any side effect if inputs are wrong.
      # No half-provisioned VMs, no orphaned artifacts.
      # ─────────────────────────────────────────────────────────────
      - name: Mask passphrase in logs
        run: |
          # ::add-mask:: prevents any subsequent echo of the passphrase from
          # appearing in run logs. Must happen before checkout / any step that
          # might surface ${{ inputs.* }} into command output.
          echo "::add-mask::${{ inputs.encryption_passphrase }}"

      - name: Pre-flight — passphrase non-empty
        env:
          ENCRYPTION_PASSPHRASE: ${{ inputs.encryption_passphrase }}
        run: |
          set -euo pipefail
          if [[ -z "${ENCRYPTION_PASSPHRASE}" ]]; then
            echo "::error::encryption_passphrase input is empty. Aborting BEFORE any provisioning."
            echo "::error::No unencrypted credentials will ever leave this runner — re-trigger with a passphrase."
            exit 2
          fi
          # Minimum-strength sanity (not cryptographic — just rejects empties + typos).
          if [[ ${#ENCRYPTION_PASSPHRASE} -lt 12 ]]; then
            echo "::error::encryption_passphrase shorter than 12 chars. Use at least 16 random chars."
            exit 2
          fi
          echo "passphrase pre-flight ok"

      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pre-flight — infra/fork.yaml::domain.root populated
        # fork.yaml::domain.root is the operator's Cloudflare-zone declaration.
        # bootstrap.sh's auto-populate-from-API path requires a local git
        # identity + push permission to commit back, which we deliberately
        # skip on a runner (Derek's review on PR #43 / handoff). Operator
        # pre-populates + pushes fork.yaml once per fork; the workflow
        # rejects an empty value rather than risking a runner-side commit
        # that would either fail (no identity) or attribute to a bot.
        run: |
          set -euo pipefail
          root=$(yq -N '.domain.root // ""' infra/fork.yaml)
          if [[ -z "$root" || "$root" == "null" ]]; then
            echo "::error::infra/fork.yaml::domain.root is empty."
            echo "::error::Populate it locally with your Cloudflare zone name, commit, push, then re-run."
            echo "::error::Example:"
            echo "::error::  yq -i '.domain.root = \"example.com\"' infra/fork.yaml"
            echo "::error::  git add infra/fork.yaml && git commit -m 'chore(bootstrap): set fork.yaml::domain.root' && git push"
            exit 2
          fi
          echo "fork.yaml::domain.root = $root"

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install runner prereqs (tofu, age, yq)
        run: |
          set -euo pipefail
          # OpenTofu — repo's canonical wrapper (handles arch + checksum).
          bash scripts/bootstrap/install/install-tofu.sh
          # age + ssh-keygen are present on ubuntu-latest; yq + jq + openssl + gh too.
          # Confirm presence to fail fast on a runner-image regression.
          for t in tofu age age-keygen ssh-keygen openssl jq yq gh; do
            command -v "$t" >/dev/null || { echo "::error::missing prereq: $t"; exit 2; }
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env.bootstrap from GH env secrets
        # bootstrap.sh sources .env.bootstrap and chains into provision-env-vm.sh.
        # Writing the file (vs setting bare env vars) keeps the existing
        # gitignore + chmod 600 + .env.bootstrap-exists semantics intact, so
        # bootstrap.sh's two-phase template-or-execute gate behaves identically
        # to the laptop path.
        run: |
          set -euo pipefail
          umask 077
          cat > .env.bootstrap <<EOF
          CHERRY_AUTH_TOKEN=${CHERRY_AUTH_TOKEN}
          CHERRY_PROJECT_ID=${CHERRY_PROJECT_ID}
          CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
          CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID}
          GITHUB_ADMIN_PAT=${GITHUB_ADMIN_PAT}
          GITHUB_ADMIN_USERNAME=${GITHUB_ADMIN_USERNAME}
          DEPLOY_ENV=${DEPLOY_ENV}
          EOF
          chmod 600 .env.bootstrap
          # Validate non-empty (don't echo values).
          for k in CHERRY_AUTH_TOKEN CHERRY_PROJECT_ID CLOUDFLARE_API_TOKEN \
                   CLOUDFLARE_ZONE_ID GITHUB_ADMIN_PAT GITHUB_ADMIN_USERNAME; do
            grep -qE "^${k}=." .env.bootstrap || {
              echo "::error::secret ${k} is not set on env '${DEPLOY_ENV}'. Set it under repo Settings → Environments → ${DEPLOY_ENV} → Add secret."
              exit 2
            }
          done
          echo ".env.bootstrap written (${DEPLOY_ENV}, 6 keys populated)"

      - name: Configure git identity (for fork.yaml idempotent no-op + any internal commit)
        # bootstrap.sh's fork.yaml auto-commit step is a no-op when domain.root
        # is already populated (the pre-flight above asserts this), but it still
        # calls `git commit` if the working tree is dirty. Set a bot identity so
        # that path doesn't crash on a runner.
        run: |
          git config user.name  "cogni-provision-bot"
          git config user.email "ops+provision@cognidao.org"

      - name: Run bootstrap.sh (substrate + VM + DNS + deploy dispatch)
        # bootstrap.sh delegates to provision-env-vm.sh after validation.
        # The complete chain: validate inputs → generate agent secrets →
        # write .env.<env> → GitHub env secrets → tofu apply (Cherry VM) →
        # Cloudflare DNS → Phase 5b (OpenBao + ESO + auto-init + auto-unseal
        # + role bind) → Phase 5c (seed cogni/<env>/* paths) → Phase 6
        # (ExternalSecret manifests) → Phase 7 (ApplicationSets) → smoke /readyz.
        # Init artifacts land at .local/<env>-{openbao-init.json,vm-key,kubeconfig.yaml}.
        run: |
          set -euo pipefail
          bash scripts/setup/bootstrap.sh
          echo "bootstrap.sh exited 0"

      # ─────────────────────────────────────────────────────────────
      # Init-artifact custody — encrypt at the boundary, upload, summary.
      # GHA storage encryption is defense-in-depth, NOT the primary control.
      # ─────────────────────────────────────────────────────────────
      - name: Encrypt init artifacts (openssl AES-256-CBC + PBKDF2)
        env:
          ENCRYPTION_PASSPHRASE: ${{ inputs.encryption_passphrase }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p .local/encrypted
          encrypted_count=0
          for src in .local/${DEPLOY_ENV}-openbao-init.json \
                     .local/${DEPLOY_ENV}-vm-key \
                     .local/${DEPLOY_ENV}-kubeconfig.yaml; do
            [[ -r "$src" ]] || { echo "::warning::missing source: $src (provision may not have produced it)"; continue; }
            base=$(basename "$src")
            out=".local/encrypted/${base}.enc"
            openssl enc -aes-256-cbc -pbkdf2 -iter 200000 -salt \
              -in "$src" -out "$out" \
              -pass env:ENCRYPTION_PASSPHRASE
            chmod 600 "$out"
            encrypted_count=$((encrypted_count + 1))
            # Shred plaintext immediately — narrower than always() cleanup.
            shred -uz "$src" 2>/dev/null || rm -f "$src"
          done
          if [[ $encrypted_count -eq 0 ]]; then
            echo "::error::no init artifacts encrypted — provision likely failed before producing them"
            exit 1
          fi
          ls -la .local/encrypted/
          echo "encrypted ${encrypted_count} artifact(s)"

      - name: Upload encrypted init artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.env }}-init-artifacts
          path: .local/encrypted/*.enc
          # retention-days: 1 is the GHA documented minimum. The contract is
          # "operator downloads immediately and deletes from the run page";
          # retention is the safety net.
          retention-days: 1
          if-no-files-found: error

      # ─────────────────────────────────────────────────────────────
      # Scorecard — substrate state captured as the workflow's last act.
      # Eliminates manual validator typing per the handoff.
      # ─────────────────────────────────────────────────────────────
      - name: Emit substrate scorecard
        if: always()
        env:
          # bootstrap.sh fetches the kubeconfig to .local/<env>-kubeconfig.yaml
          # in Phase 4a. The encrypt step above shreds the plaintext, so the
          # scorecard runs BEFORE encrypt in a follow-up — for now, decrypt
          # locally via the same passphrase and `kubectl` against it. Keeping
          # this step at the tail-end as a best-effort surface; if encryption
          # already shredded the kubeconfig the step is a no-op + logs why.
          ENCRYPTION_PASSPHRASE: ${{ inputs.encryption_passphrase }}
        run: |
          set -uo pipefail
          KCFG_ENC=".local/encrypted/${DEPLOY_ENV}-kubeconfig.yaml.enc"
          if [[ ! -r "$KCFG_ENC" ]]; then
            echo "::warning::no encrypted kubeconfig found — skipping scorecard"
            exit 0
          fi
          KCFG_TMP=$(mktemp)
          trap 'shred -uz "$KCFG_TMP" 2>/dev/null || rm -f "$KCFG_TMP"' EXIT
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -in "$KCFG_ENC" -out "$KCFG_TMP" \
            -pass env:ENCRYPTION_PASSPHRASE
          export KUBECONFIG="$KCFG_TMP"
          {
            echo "## Substrate scorecard — ${DEPLOY_ENV}"
            echo ""
            echo "### Argo Applications"
            echo '```'
            kubectl -n argocd get application openbao external-secrets \
              -o 'custom-columns=NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status' \
              2>&1 || echo "(query failed)"
            echo '```'
            echo ""
            echo "### ClusterSecretStore"
            echo '```'
            # JSONPath uses ?(@.type=="Ready") — single-quote the whole
            # `custom-columns` value so bash doesn't try to parse the `()` as
            # a subshell. Validator run 26545120228 syntax-erred without this.
            kubectl get clustersecretstore openbao-backend \
              -o 'custom-columns=NAME:.metadata.name,READY:.status.conditions[?(@.type=="Ready")].status' \
              2>&1 || echo "(query failed)"
            echo '```'
            echo ""
            echo "### ExternalSecrets (cogni-${DEPLOY_ENV} namespace)"
            echo '```'
            kubectl -n "cogni-${DEPLOY_ENV}" get externalsecrets \
              -o 'custom-columns=NAME:.metadata.name,READY:.status.conditions[?(@.type=="Ready")].status,STORE:.spec.secretStoreRef.name' \
              2>&1 || echo "(query failed)"
            echo '```'
            echo ""
            echo "### Init artifacts"
            echo ""
            echo 'Download from this run page (above), then:'
            echo '```'
            echo "openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \\"
            echo "  -in ${DEPLOY_ENV}-openbao-init.json.enc \\"
            echo "  -out ${DEPLOY_ENV}-openbao-init.json \\"
            echo "  -pass pass:'<the passphrase you typed at dispatch>'"
            echo '```'
            echo ""
            echo 'Move the decrypted files to your password manager + DELETE the artifact from the run page (retention is a safety net, not the contract).'
          } >>"$GITHUB_STEP_SUMMARY"

      # The scorecard lives in the workflow run summary (GITHUB_STEP_SUMMARY
      # above). No PR-comment side-channel: forkers' first run has no PR;
      # validators dispatch cold against their own forks; auto-posting to a
      # hardcoded PR number is future-fragile (one fork's PR #46 is another
      # fork's PR #1, or no PR at all). If you want the scorecard on a PR,
      # `gh pr comment <N> --body-file <(gh run view <RUN_ID> --log)` from
      # any laptop after the fact.

      # ─────────────────────────────────────────────────────────────
      # Cleanup — always() runs regardless of upstream success/fail.
      # Don't rely on runner ephemerality alone (Derek's refinement).
      # ─────────────────────────────────────────────────────────────
      - name: Cleanup runner FS (shred plaintext + ciphertext)
        if: always()
        run: |
          set +e
          # Plaintext (should already be shredded by encrypt step)
          for f in .local/${DEPLOY_ENV}-openbao-init.json \
                   .local/${DEPLOY_ENV}-vm-key \
                   .local/${DEPLOY_ENV}-kubeconfig.yaml \
                   .env.bootstrap .env.${DEPLOY_ENV} .env.operator; do
            [[ -e "$f" ]] && shred -uz "$f" 2>/dev/null
          done
          # Ciphertext (uploaded; safe to remove from runner FS)
          shred -uz .local/encrypted/*.enc 2>/dev/null
          rm -rf .local/encrypted
          # tofu state is the only thing left in the workspace that touches
          # Cherry credentials — it stays in tfstate on the runner, which is
          # ephemeral. Future PR moves tfstate to a remote backend (S3-equiv).
          echo "cleanup complete"
