name: E2E Canary

# Runs Playwright smoke tests against the deployed canary environment.
# Triggers after Build Multi-Node succeeds (which includes verify — readyz healthy).
# This means Argo has deployed and all nodes are serving by the time E2E starts.

on:
  workflow_run:
    workflows: ["Build Multi-Node"]
    types: [completed]
    branches: [canary]

permissions:
  contents: read
  actions: read

concurrency:
  group: e2e-canary
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 10
    environment: integration
    env:
      NEXT_TELEMETRY_DISABLED: 1
      TEST_BASE_URL: https://${{ vars.DOMAIN }}
    steps:
      - name: Check prerequisites
        id: gate
        run: |
          if [ -z "$TEST_BASE_URL" ] || [ "$TEST_BASE_URL" = "https://" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ DOMAIN not set in integration environment — skipping E2E"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Running E2E against $TEST_BASE_URL"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright smoke tests
        if: steps.gate.outputs.skip != 'true'
        run: pnpm e2e:smoke

      - name: Upload E2E artifacts
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-${{ github.run_id }}
          path: e2e/artifacts/
          if-no-files-found: warn
          retention-days: 7
