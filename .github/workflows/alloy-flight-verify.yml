#
# One-shot verification that the alloy k8s observability pipeline is healthy
# on candidate-a after a deploy/candidate-a push.
#
# Steps:
#   1. SSH to the candidate-a VM
#   2. Wait for Argo CD to sync the candidate-a-alloy Application (up to 5m)
#   3. Wait for the alloy DaemonSet to report Ready (up to 3m)
#   4. Tail the reload-hook Job status
#   5. Show recent alloy pod logs for sanity
#   6. Query Grafana Cloud Loki for argocd + kube-system streams to confirm
#      logs are actually flowing end-to-end
#
# Dispatch only. Safe to re-run — all kubectl commands are read-only and the
# Loki query is a GET.

name: Verify alloy flight (candidate-a)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: canary # legacy naming — canary env holds SSH_DEPLOY_KEY + VM_HOST for the candidate-a VM
    steps:
      - name: Install SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Wait for Argo Application candidate-a-alloy
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no root@"$VM_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          echo "[wait] Polling argocd for candidate-a-alloy Application..."
          for i in $(seq 1 60); do
            if kubectl -n argocd get application candidate-a-alloy >/dev/null 2>&1; then
              echo "[ok] Application candidate-a-alloy exists"
              break
            fi
            echo "  [$i/60] not yet, sleeping 5s"
            sleep 5
          done
          kubectl -n argocd get application candidate-a-alloy -o wide || {
            echo "[fail] Argo Application candidate-a-alloy never appeared — the ApplicationSet generator may not have re-reconciled yet. Try: argocd app sync candidate-a-applicationset (via Argo CD UI) or wait 3m and re-run."
            exit 1
          }
          echo ""
          echo "[wait] Waiting up to 5m for Synced + Healthy..."
          for i in $(seq 1 30); do
            STATE=$(kubectl -n argocd get application candidate-a-alloy -o jsonpath='{.status.sync.status}:{.status.health.status}' 2>/dev/null || echo "?:?")
            echo "  [$i/30] state=$STATE"
            if [ "$STATE" = "Synced:Healthy" ]; then
              echo "[ok] Application is Synced + Healthy"
              break
            fi
            sleep 10
          done
          kubectl -n argocd get application candidate-a-alloy -o jsonpath='{"sync="}{.status.sync.status}{" health="}{.status.health.status}{"\n"}'
          REMOTE

      - name: Verify alloy DaemonSet + reload hook Job
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no root@"$VM_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail
          echo "=== DaemonSet ==="
          kubectl -n cogni-candidate-a get daemonset alloy -o wide || true
          echo ""
          echo "=== Pods ==="
          kubectl -n cogni-candidate-a get pods -l app.kubernetes.io/name=alloy -o wide || true
          echo ""
          echo "=== Reload Hook Job ==="
          kubectl -n cogni-candidate-a get jobs -l app.kubernetes.io/name=alloy -o wide || true
          echo ""
          echo "=== Alloy config mount (sha256 of config.alloy in pod) ==="
          POD=$(kubectl -n cogni-candidate-a get pods -l app.kubernetes.io/name=alloy -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$POD" ]; then
            kubectl -n cogni-candidate-a exec "$POD" -- sha256sum /etc/alloy/config.alloy 2>/dev/null || true
            echo ""
            echo "=== Alloy pod log tail ==="
            kubectl -n cogni-candidate-a logs "$POD" --tail=30 2>/dev/null || true
          fi
          REMOTE

      - name: Query Loki for control-plane ingest
        env:
          LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          LOKI_USER: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          LOKI_API_KEY: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$LOKI_URL" ] || [ -z "$LOKI_USER" ] || [ -z "$LOKI_API_KEY" ]; then
            echo "[skip] Grafana Cloud Loki read creds not in canary env — skipping end-to-end query"
            exit 0
          fi
          # LOKI_URL is typically the write endpoint (e.g. https://logs-prod-003.grafana.net/loki/api/v1/push).
          # Query endpoint is /loki/api/v1/query_range on the same host.
          BASE=$(printf '%s' "$LOKI_URL" | sed -E 's#/loki/api/.*$##')
          END=$(date -u +%s)000000000
          START=$(( $(date -u +%s) - 600 ))000000000
          echo "[query] Base: $BASE"
          echo "[query] Window: last 10 minutes"
          for ns in argocd kube-system cogni-candidate-a; do
            Q=$(printf 'count_over_time({env="candidate-a",namespace="%s"}[10m])' "$ns")
            echo ""
            echo "=== $ns ==="
            RESP=$(curl -sS --get -u "$LOKI_USER:$LOKI_API_KEY" \
              --data-urlencode "query=${Q}" \
              --data-urlencode "start=${START}" \
              --data-urlencode "end=${END}" \
              --data-urlencode "limit=5" \
              "$BASE/loki/api/v1/query_range" || true)
            echo "$RESP" | head -c 1000
            echo ""
          done
