# Cogni Resy Helper — Repository Specification
# Node identity and configuration for the reservation assistant

schema_version: "0.1.4"

# Unique identity for this node deployment (infrastructure only).
# Generated fresh for this fork — never reuse cogni-template's node_id.
node_id: "2eae883d-9e9a-4290-adb1-f5ba6762ac8d"

# Governance domain (project). V0 default: 'default' (single-project node).
# Derived: uuidv5(node_id, "default")
scope_id: "8ea21575-5904-58a3-a432-5989b5d2abb3"
scope_key: "default"

# Activity ledger ingestion configuration
activity_ledger:
  epoch_length_days: 7
  approvers:
    - "0x070075F1389Ae1182aBac722B36CA12285d0c949" # derekg1729.eth operator wallet
  pool_config:
    base_issuance_credits: "10000"
  activity_sources:
    github:
      attribution_pipeline: cogni-v0.0
      source_refs: ["Cogni-DAO/cogni-resy-helper"]
      excluded_logins: ["Cogni-1729"]

intent:
  name: cogni-resy-helper

# Control GitHub check conclusion behavior for gate errors/timeouts
fail_on_error: true

# Operator wallet configuration (Privy-managed)
# Will be populated by `pnpm node:activate-payments`
operator_wallet:
  address: "0xdCCa8D85603C2CC47dc6974a790dF846f8695056"

# DAO contracts — will be populated by formation wizard (/setup/dao)
cogni_dao:
  chain_id: "8453"
  dao_contract: "0x0000000000000000000000000000000000000000"
  plugin_contract: "0x0000000000000000000000000000000000000000"

# Payments status — will be set to 'active' by `pnpm node:activate-payments`
payments:
  status: pending

# DAO Financial Rails Configuration
# Stub values — will be populated by `pnpm node:activate-payments`
payments_in:
  credits_topup:
    provider: cogni-usdc-backend-v1
    receiving_address: "0x0000000000000000000000000000000000000000"
    allowed_chains:
      - Base
    allowed_tokens:
      - USDC

providers:
  openrouter:
    api_host: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY

llm_proxy:
  host_env: LITELLM_PROXY_URL
  master_key_env: LITELLM_MASTER_KEY

secrets:
  manager:
    type: env

# Gates run in the order they appear below.
gates:
  - type: review-limits
    id: review_limits
    with:
      max_changed_files: 50
      max_total_diff_kb: 1500

  - type: ai-rule
    with:
      rule_file: pr-syntropy-coherence.yaml
  - type: ai-rule
    with:
      rule_file: patterns-and-docs.yaml
  - type: ai-rule
    with:
      rule_file: repo-goal-alignment.yaml

# Governance schedule definitions
governance:
  schedules:
    - charter: HEARTBEAT
      cron: "0 * * * *"
      timezone: UTC
      entrypoint: HEARTBEAT
    - charter: LEDGER_INGEST
      cron: "0 6 * * *"
      timezone: UTC
      entrypoint: LEDGER_INGEST
