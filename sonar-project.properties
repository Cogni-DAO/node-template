sonar.organization=cogni-dao
sonar.projectKey=cogni-dao_cogni-template
sonar.projectName=cogni-template

# Where the actual application code lives
sonar.sources=nodes/operator/app/src,packages

# Where the test code lives
sonar.tests=tests,nodes/operator/app/src
sonar.test.inclusions=tests/**/*.{test,spec}.ts,nodes/operator/app/src/**/*.{test,spec}.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/dist/**,**/components/reui/**,**/components/vendor/**,packages/node-ui-kit/src/shadcn/**,packages/node-ui-kit/src/reui/**,packages/*/tests/**
# Do NOT include tests or e2e in coverage metrics
sonar.coverage.exclusions=**/tests/**,**/*.config.*,**/vitest.config.*,**/scripts/**,packages/node-ui-kit/**,packages/work-items/src/adapters/notion/mirror.ts,nodes/operator/app/src/app/api/internal/work/notion/sync/route.ts,nodes/operator/app/src/bootstrap/jobs/syncWorkItemsNotion.job.ts
# Route handlers carry repeated Next.js/auth boilerplate; functional coverage gates their behavior.
sonar.cpd.exclusions=**/tests/**,nodes/operator/app/src/app/api/internal/work/notion/sync/route.ts

# Ignore Tailwind v4 directive false-positive for the Tailwind entry file only
sonar.issue.ignore.multicriteria=tw1
sonar.issue.ignore.multicriteria.tw1.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.tw1.resourceKey=nodes/operator/app/src/styles/tailwind.css
