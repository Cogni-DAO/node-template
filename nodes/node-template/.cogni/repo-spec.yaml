# Node Template — repo-spec
#
# Identity for the upstream node-template deployment; node_id MUST agree
# with the root `.cogni/repo-spec.yaml` (which the Dockerfile bakes into
# the app image at L110) AND with `infra/k8s/base/scheduler-worker/configmap.yaml`'s
# COGNI_NODE_ENDPOINTS entry. provision-env-vm.sh Phase 5c reads this file
# first (falls back to root), so per-node + root must agree.
#
# Forks MUST regenerate both UUIDs (provision-env-vm.sh Phase 5c refuses
# to deploy if the fork still carries upstream's UUID — UPSTREAM_NODE_ID
# guard at L331):
#   node_id:  openssl rand -hex 16 | sed 's/\(.\{8\}\)\(.\{4\}\)\(.\{4\}\)\(.\{4\}\)\(.\{12\}\)/\1-\2-\3-\4-\5/'
#   scope_id: uuidv5(node_id, "default")
# See docs/spec/identity-model.md, docs/spec/multi-node-tenancy.md.

schema_version: "0.1.4"

node_id: "4ff8eac1-4eba-4ed0-931b-b1fe4f64713d"
scope_id: "a28a8b1e-1f9d-5cd5-9329-569e4819feda"
scope_key: "default"

intent:
  name: node-template

cogni_dao:
