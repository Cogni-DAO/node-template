#
# Alloy DaemonSet — collects pod logs + kubelet metrics, ships to Grafana Cloud.
# Singleton per node. Credentials via alloy-secrets Secret (created externally).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  labels:
    app.kubernetes.io/name: alloy
    app.kubernetes.io/part-of: cogni
    app.kubernetes.io/component: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy
    spec:
      serviceAccountName: alloy
      tolerations:
        - operator: Exists
      containers:
        - name: alloy
          image: grafana/alloy:v1.9.2
          args:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
            - --storage.path=/var/lib/alloy
          ports:
            - containerPort: 12345
              name: http
          env:
            - name: DEPLOY_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: alloy-config
                  key: DEPLOY_ENVIRONMENT
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - secretRef:
                name: alloy-secrets
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
            - name: data
              mountPath: /var/lib/alloy
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: varlogcontainers
              mountPath: /var/log/containers
              readOnly: true
            - name: hostproc
              mountPath: /host/proc
              readOnly: true
            - name: hostsys
              mountPath: /host/sys
              readOnly: true
            - name: hostroot
              mountPath: /host/root
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir: {}
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: hostproc
          hostPath:
            path: /proc
        - name: hostsys
          hostPath:
            path: /sys
        - name: hostroot
          hostPath:
            path: /
