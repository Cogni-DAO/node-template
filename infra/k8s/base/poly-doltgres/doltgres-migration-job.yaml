#
# Argo CD PreSync hook — runs Doltgres (knowledge plane) migrations before the
# poly Deployment syncs. Mirrors infra/k8s/base/node-app/migration-job.yaml
# exactly in shape; differs only by:
#   - Poly-specific (not included in base/node-app because only poly uses Doltgres today)
#   - DATABASE_URL sourced from DOLTGRES_URL_POLY in the poly secret (maps the
#     poly-specific secret key to the generic name drizzle-kit expects)
#   - Command runs pnpm db:migrate:poly:doltgres:container which:
#       1. drizzle-kit migrate --config=nodes/poly/drizzle.doltgres.config.ts
#       2. Trailing SELECT dolt_commit('-Am', 'migration: drizzle-kit batch')
#          to stamp DDL into dolt_log (Dolt DDL doesn't auto-commit per dolt#4843)
#
# Image is the poly migrator (cogni-template:TAG-poly-migrate) — kustomize
# overlay's images: block patches the digest per env, same machinery as the
# Postgres migrator Job. No workflow env plumbing required.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-poly-doltgres
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    app.kubernetes.io/name: poly-doltgres-migration
    app.kubernetes.io/part-of: cogni
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: poly-doltgres-migration
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate-doltgres
          # Placeholder; overlays patch via images: block (cogni-template-migrate
          # → digest of the per-PR poly migrator image built from
          # nodes/poly/app/Dockerfile AS migrator).
          image: ghcr.io/cogni-dao/cogni-template-migrate:placeholder
          command:
            [
              "node",
              "/app/nodes/poly/app/migrate-doltgres.mjs",
              "/app/nodes/poly/app/doltgres-migrations",
            ]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  # Overlays patch name → poly-node-app-secrets.
                  # Key stays DOLTGRES_URL_POLY (deploy-infra.sh writes this into
                  # the poly secret; operator/resy get DOLTGRES_URL instead).
                  name: node-app-secrets
                  key: DOLTGRES_URL_POLY
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
