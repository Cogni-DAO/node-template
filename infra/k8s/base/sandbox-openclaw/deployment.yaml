apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-openclaw
  labels:
    app.kubernetes.io/name: sandbox-openclaw
    app.kubernetes.io/part-of: cogni
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sandbox-openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sandbox-openclaw
        app.kubernetes.io/part-of: cogni
    spec:
      containers:
        - name: llm-proxy-openclaw
          image: nginx:alpine
          command:
            - sh
            - -c
            - |
              envsubst '$LITELLM_MASTER_KEY' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
              exec nginx -g 'daemon off;'
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: sandbox-openclaw-secrets
                  key: LITELLM_MASTER_KEY
          ports:
            - containerPort: 8080
              name: proxy
          volumeMounts:
            - name: proxy-template
              mountPath: /etc/nginx/nginx.conf.template
              subPath: nginx-gateway.conf.template
          readinessProbe:
            httpGet:
              path: /health
              port: proxy
            initialDelaySeconds: 3
            periodSeconds: 5

        - name: gateway
          image: ghcr.io/cogni-dao/cogni-sandbox-openclaw
          ports:
            - containerPort: 18789
              name: gateway
          command:
            - sh
            - -c
            - |
              mkdir -p /workspace/.openclaw-config
              cp /opt/openclaw/openclaw.json /workspace/.openclaw-config/openclaw.json
              exec node /app/dist/index.js gateway
          envFrom:
            - configMapRef:
                name: sandbox-openclaw-config
            - secretRef:
                name: sandbox-openclaw-secrets
          volumeMounts:
            - name: openclaw-config
              mountPath: /opt/openclaw
              readOnly: true
            - name: gateway-workspace
              mountPath: /workspace
          startupProbe:
            tcpSocket:
              port: gateway
            failureThreshold: 30
            periodSeconds: 3
          livenessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: gateway
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "1Gi"
              cpu: "750m"

      volumes:
        - name: openclaw-config
          configMap:
            name: sandbox-openclaw-gateway-config
        - name: proxy-template
          configMap:
            name: sandbox-openclaw-proxy-template
        - name: gateway-workspace
          emptyDir: {}
