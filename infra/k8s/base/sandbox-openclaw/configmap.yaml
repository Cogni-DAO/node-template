apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-openclaw-config
data:
  SERVICE_NAME: sandbox-openclaw
  OPENCLAW_LOAD_SHELL_ENV: "0"
  OPENCLAW_STATE_DIR: /workspace/.openclaw-state
  OPENCLAW_CONFIG_PATH: /workspace/.openclaw-config/openclaw.json
  OPENAI_API_BASE: http://127.0.0.1:8080/v1
