apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-openclaw-proxy-template
data:
  nginx-gateway.conf.template: |
    worker_processes 1;
    error_log stderr warn;
    pid /tmp/nginx-gateway.pid;

    events {
        worker_connections 128;
    }

    http {
        upstream litellm {
            server operator-litellm-external:4000;
            keepalive 8;
        }

        server {
            listen 8080;

            location /v1/ {
                proxy_set_header Authorization "Bearer ${LITELLM_MASTER_KEY}";
                proxy_pass_header x-litellm-call-id;
                proxy_pass_header x-litellm-response-cost;
                proxy_pass http://litellm;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header Connection "";
                proxy_buffering off;
                proxy_request_buffering off;
                proxy_cache off;
                proxy_read_timeout 3600s;
                proxy_set_header Content-Type $content_type;
            }

            location /health {
                return 200 '{"status":"ok","service":"llm-proxy-openclaw"}';
                add_header Content-Type application/json;
            }

            location / {
                return 404 '{"error":"not_found"}';
                add_header Content-Type application/json;
            }
        }
    }
