#
# Non-secret configuration for scheduler-worker.
# Env-specific values (TEMPORAL_NAMESPACE, IMAGE_DIGEST) are patched by overlays.
# COGNI_NODE_ENDPOINTS is identical across envs (same k8s Service DNS), so it lives here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scheduler-worker-config
  labels:
    app.kubernetes.io/name: scheduler-worker
    app.kubernetes.io/part-of: cogni
data:
  # Temporal connection — overridden per-env by overlay.
  # Service name `temporal-external` (ExternalName → Compose-infra on the VM)
  # matches node-app's configmap.yaml. Plain `temporal` has no Service and
  # fails DNS resolution at scheduler boot.
  TEMPORAL_ADDRESS: "temporal-external:7233"
  TEMPORAL_NAMESPACE: "cogni-staging"
  TEMPORAL_TASK_QUEUE: "scheduler-tasks"

  # Per-node API endpoints — single-node template.
  # Each entry maps nodeId/slug to the node's internal Service. The UUID
  # below MUST match `.cogni/repo-spec.yaml::node_id` — the app pod bakes
  # that file (Dockerfile L110) and submits to `scheduler-tasks-${node_id}`;
  # the worker derives the queue to poll from these endpoint keys. A drift
  # here = silent 120s chat hang (bug.5080).
  # Forks: regenerate the UUID below in lockstep with .cogni/repo-spec.yaml
  # when minting a new node identity (provision-env-vm.sh Phase 5c rejects
  # deploys whose per-node spec still carries upstream's UUID).
  # The `operator=` entry is required: scheduler-worker resolves callbacks via
  # this key on a cold-start (bug.0446 H8b — without it the worker CrashLoops
  # on the first task lookup). The "operator" identifier is the scheduler's
  # canonical name for the node-app surface and is independent of the
  # catalog slug (which forks rename via scripts/rename-node.sh).
  COGNI_NODE_ENDPOINTS: "operator=http://node-app:3000,node-template=http://node-app:3000,4ff8eac1-4eba-4ed0-931b-b1fe4f64713d=http://node-app:3000"

  # Observability
  LOG_LEVEL: "info"
  SERVICE_NAME: "scheduler-worker"
  HEALTH_PORT: "9000"

  # Image digest — set by overlay on promotion
  IMAGE_DIGEST: "placeholder"
