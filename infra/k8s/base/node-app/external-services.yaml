#
# Selectorless Services + EndpointSlices for k8s→Compose connectivity.
# Node apps run in k3s; infra (Postgres, Temporal, LiteLLM, Redis) runs on Compose.
# These let pods reach Compose services via k8s DNS.
#
# On single-VM: all endpoints are 127.0.0.1 (k3s and Compose share localhost).
# Overlay patches replace IPs if environments differ.

# --- PostgreSQL ---
apiVersion: v1
kind: Service
metadata:
  name: postgres-external
spec:
  clusterIP: None
  ports:
    - port: 5432
      protocol: TCP
      name: postgres
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: postgres-external-1
  labels:
    kubernetes.io/service-name: postgres-external
addressType: IPv4
endpoints:
  - addresses:
      - "127.0.0.1"
ports:
  - port: 5432
    protocol: TCP
    name: postgres

