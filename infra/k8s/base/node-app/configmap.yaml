#
# Non-secret configuration shared by all node apps.
# Overlays patch environment-specific values (APP_ENV, APP_BASE_URL, etc.)
apiVersion: v1
kind: ConfigMap
metadata:
  name: node-app-config
data:
  # Patched by overlay
  APP_ENV: "preview"
  NODE_NAME: "node-app"
  # Internal service URLs (same for all nodes on same VM)
  LITELLM_BASE_URL: "http://litellm-external:4000"
  TEMPORAL_ADDRESS: "temporal-external:7233"
  TEMPORAL_NAMESPACE: "cogni-preview"
  TEMPORAL_TASK_QUEUE: "scheduler-tasks"
  REDIS_URL: "redis://redis-external:6379"
  # Placeholder — real value requires git-sync sidecar (not in k8s yet).
  # /tmp exists in every container; repo tools will see empty dir but app boots.
  COGNI_REPO_PATH: "/tmp"
