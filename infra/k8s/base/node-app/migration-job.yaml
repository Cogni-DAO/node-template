#
# Argo CD PreSync hook — runs database migrations before the app Deployment syncs.
# Each node overlay patches the image and DATABASE_URL secret ref.
# Drizzle migrations are forward-only; rollback requires a reverse migration file.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-node-app
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    app.kubernetes.io/name: node-app
    app.kubernetes.io/part-of: cogni
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-app
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/cogni-dao/cogni-template-migrate:placeholder
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: node-app-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
