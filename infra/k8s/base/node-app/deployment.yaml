#
# Shared Deployment template for Cogni node apps (operator, poly, resy).
# Overlays patch: image digest, secret ref name, resource limits.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app
  labels:
    app.kubernetes.io/name: node-app
    app.kubernetes.io/part-of: cogni
    app.kubernetes.io/component: node
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: node-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-app
        app.kubernetes.io/part-of: cogni
        app.kubernetes.io/component: node
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        # Postgres migrations via the migrator stage (separate image:
        # ghcr.io/cogni-dao/cogni-node-template-migrate). Its WORKDIR is
        # /app with full node_modules (drizzle-kit + tsx + drizzle-orm)
        # and the node's drizzle.config.ts at nodes/node-template/. Per-PR
        # CI builds + pushes this stage alongside the runner; the overlay's
        # `images:` block patches both image references to the same SHA.
        # bug.0446 H8 — replaces the prior in-runner migrate.mjs attempt.
        - name: migrate
          image: ghcr.io/cogni-dao/cogni-node-template-migrate:placeholder
          command:
            - tsx
            - node_modules/drizzle-kit/bin.cjs
            - migrate
            - --config=nodes/node-template/drizzle.config.ts
          envFrom:
            - configMapRef:
                name: node-app-config
            - secretRef:
                name: node-template-env-secrets
          resources:
            requests:
              memory: "384Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      containers:
        - name: app
          image: ghcr.io/cogni-dao/cogni-node-template:placeholder
          ports:
            # containerPort MUST match infra/catalog/node-template.yaml::port,
            # which equals the Dockerfile's `ENV PORT=` (Next.js standalone
            # reads PORT at boot — see nodes/node-template/app/Dockerfile).
            # Kustomize cannot interpolate from a sibling YAML, so this value
            # is duplicated; the lint-comment is the coherence contract.
            # Probes + Service.targetPort reach this via the named port
            # `http`, so a change here is the only edit required.
            # Tracked in bug.0446 H9.
            - containerPort: 3200
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Tier 0 sizing: 512Mi container, 384MB V8 heap. See
          # docs/research/nextjs-node-memory-sizing.md for the full tier table.
          # Overlays bumping memory MUST also patch NODE_OPTIONS to the matching
          # tier; otherwise V8 auto-sizes to ~50% of cgroup, ignoring the bump.
          env:
            - name: NODE_OPTIONS
              value: "--max-old-space-size=384"
          envFrom:
            - configMapRef:
                name: node-app-config
            - secretRef:
                name: node-template-env-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
