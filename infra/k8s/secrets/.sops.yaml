#
# SOPS configuration for secret encryption at rest.
# Public keys are safe to commit — they can only encrypt, not decrypt.
# Private keys are stored as K8s Secrets in the cluster (one-time manual step).
#
# Generate keypair:  age-keygen -o age-key.txt
# Encrypt:           sops --encrypt --in-place secrets/staging/scheduler-worker.enc.yaml
# Decrypt (verify):  sops --decrypt secrets/staging/scheduler-worker.enc.yaml
creation_rules:
  # NOTE: all public keys below are placeholders. ksops is not yet end-to-end
  # activated in any cluster — the Argo CD repo-server sidecar is configured,
  # but no real age keys have been generated or installed, and no real encrypted
  # `.enc.yaml` file lives under these path_regex rules today. See:
  #   - work/projects/proj.cicd-services-gitops.md (k8s secret delivery red line)
  #   - work/items/task.0284-secrets-single-source-eso.md (long-term target: ESO)

  # Per docs/spec/ci-cd.md (2026-04-08), the environment model is
  # candidate-a (pre-merge) + preview (post-merge) + production. No new
  # creation rule for `canary/` — that concept is being purged.
  # The legacy `staging/` rule is retained ONLY because existing encrypted
  # files still live there; task.0310 renames them to `preview/`.

  - path_regex: candidate-a/.*\.enc\.yaml$
    age: "age1candidate_a_placeholder_replace_with_real_public_key"

  - path_regex: preview/.*\.enc\.yaml$
    age: "age1preview_placeholder_replace_with_real_public_key"

  - path_regex: production/.*\.enc\.yaml$
    age: "age1production_placeholder_replace_with_real_public_key"

  # Legacy — files exist, will be relocated to preview/ by task.0310.
  - path_regex: staging/.*\.enc\.yaml$
    age: "age1staging_placeholder_replace_with_real_public_key"
