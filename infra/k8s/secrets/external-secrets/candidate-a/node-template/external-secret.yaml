#
# ExternalSecret for node-template on candidate-a — proof-of-pattern (task.0284).
# Conforms to docs/spec/secrets-management.md Invariant 2 ONE_EXTERNAL_SECRET_
# PER_SERVICE_ENV: exactly one ExternalSecret per (service, env) pair, using
# `dataFrom: extract` to pull every key under cogni/candidate-a/node-template
# (the catalog service name; see infra/catalog/node-template.yaml::name) into
# a single k8s Secret consumed by the workload via `envFrom: secretRef`.
#
# k8s Secret name vs catalog service name: the workload's Deployment exists
# at infra/k8s/base/node-app/ (historical name "node-app"); the workload's
# envFrom references `node-app-env-secrets`. The OpenBao PATH uses the
# catalog name (`node-template`) — spec Invariant 1 + the docs/guides/
# secrets-add-new.md flow. Both names ship in this file unchanged.
#
# Created ONCE at service creation. Adding/removing/rotating individual keys
# in OpenBao does NOT edit this file — see docs/guides/secrets-add-new.md +
# docs/guides/secrets-rotate.md.
#
# TRANSITION_SAFE (Invariant 12): when the OpenBao path is empty (cold start
# pre-seed), ESO emits SecretSyncedError and the downstream Pod fails to start
# loudly. Both are visible in `kubectl describe externalsecret` + Argo UI.
# Unblock via the bootstrap runbook seed step.
#
# Reloader auto-restart annotation lives on the consuming Deployment, not
# here — Stakater Reloader install is task.5056's scope. Until that lands,
# rotation requires manual `kubectl rollout restart deployment/node-app`.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: node-app-env-secrets
  namespace: cogni-candidate-a
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
    app.kubernetes.io/component: node-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: node-app-env-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: candidate-a/node-template
