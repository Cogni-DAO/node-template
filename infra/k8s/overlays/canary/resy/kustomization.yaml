apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-canary

resources:
  - ../../../base/node-app
  - env-state.yaml

namePrefix: resy-

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:4fb529466e55abe9b121e68bf9d0f1855bef76bfbc50cf6328c3ec2472820633"
  - name: ghcr.io/cogni-dao/cogni-template-migrate
    newName: ghcr.io/cogni-dao/cogni-template-migrate
    digest: "sha256:f6c723a29c402c89fffd805c3707f0200d9dc0bf252418a771043027a8d3352c"

patches:
  # Node-specific ConfigMap values.
  # DNS names must match prefixed Service names (namePrefix applies to all resources).
  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/NODE_NAME
        value: "resy"
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-canary"
      - op: replace
        path: /data/LITELLM_BASE_URL
        value: "http://resy-litellm-external:4000"
      - op: replace
        path: /data/TEMPORAL_ADDRESS
        value: "resy-temporal-external:7233"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://resy-redis-external:6379"
      - op: add
        path: /data/NEXTAUTH_URL
        value: "https://resy-test.cognidao.org"
  # NodePort + instance label on selector (prevents cross-node routing)
  - target:
      kind: Service
      name: node-app
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30300
      - op: replace
        path: /spec/ports/0/targetPort
        value: 3300
      - op: add
        path: /spec/selector/app.kubernetes.io~1instance
        value: "resy"
  # Fix secret refs + container port + instance label
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: "resy-node-app-secrets"
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 3300
      - op: add
        path: /spec/selector/matchLabels/app.kubernetes.io~1instance
        value: "resy"
      - op: add
        path: /spec/template/metadata/labels/app.kubernetes.io~1instance
        value: "resy"
  # Migration: shared migrator image runs operator's schema against resy's DB.
  - target:
      kind: Job
      name: migrate-node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: "resy-node-app-secrets"
  - target:
      kind: EndpointSlice
      name: postgres-external-1
    patch: |
      - op: replace
        path: /metadata/labels/kubernetes.io~1service-name
        value: "resy-postgres-external"
  - target:
      kind: EndpointSlice
      name: temporal-external-1
    patch: |
      - op: replace
        path: /metadata/labels/kubernetes.io~1service-name
        value: "resy-temporal-external"
  - target:
      kind: EndpointSlice
      name: litellm-external-1
    patch: |
      - op: replace
        path: /metadata/labels/kubernetes.io~1service-name
        value: "resy-litellm-external"
  - target:
      kind: EndpointSlice
      name: redis-external-1
    patch: |
      - op: replace
        path: /metadata/labels/kubernetes.io~1service-name
        value: "resy-redis-external"

replacements:
  - source:
      kind: ConfigMap
      name: env-state
      fieldPath: data.VM_IP
    targets:
      - select:
          kind: EndpointSlice
          name: postgres-external-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: temporal-external-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: litellm-external-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: redis-external-1
        fieldPaths:
          - endpoints.0.addresses.0
