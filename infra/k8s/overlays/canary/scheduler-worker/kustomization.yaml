apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-canary

resources:
  - ../../../base/scheduler-worker

# Image digest — updated by promote-k8s-image.sh on each CI push.
# Argo CD ApplicationSet points here; digest change → auto-sync.
images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:abd90118c76d8f18c601e8bab7bf3df0a78c2affa956e646347125624e851fa8"

patches:
  # Patch ConfigMap with staging-specific values
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-canary"
      - op: replace
        path: /data/COGNI_NODE_ENDPOINTS
        value: "operator=http://operator-node-app:3000,poly=http://poly-node-app:3100,resy=http://resy-node-app:3300,4ff8eac1-4eba-4ed0-931b-b1fe4f64713d=http://operator-node-app:3000,5ed2d64f-2745-4676-983b-2fb7e05b2eba=http://poly-node-app:3100,f6d2a17d-b7f6-4ad1-a86b-f0ad2380999e=http://resy-node-app:3300"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "staging-placeholder-scheduler-worker"

  # EndpointSlice IPs — node InternalIP (provision script updates this per-VM)
  - target:
      kind: EndpointSlice
      name: temporal-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: postgres-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: app-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: poly-app-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: resy-app-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
