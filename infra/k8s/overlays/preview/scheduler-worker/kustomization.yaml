apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-preview

resources:
  - ../../../base/scheduler-worker
  - env-state.yaml

# Image digest — updated by promote-k8s-image.sh on each CI push.
# Argo CD ApplicationSet points here; digest change → auto-sync.
images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:b34cdf7cc148dbc8cd3912dc7ae8c12d3fde1419abd4350ce36bcffbc19a4cca"

patches:
  # Patch ConfigMap with staging-specific values
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-preview"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "staging-placeholder-scheduler-worker"

replacements:
  - source:
      kind: ConfigMap
      name: env-state
      fieldPath: data.VM_IP
    targets:
      - select:
          kind: EndpointSlice
          name: temporal-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: postgres-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: app-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: poly-app-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: resy-app-1
        fieldPaths:
          - endpoints.0.addresses.0
