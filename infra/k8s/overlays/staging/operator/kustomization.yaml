apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-staging

resources:
  - ../../../base/node-app

namePrefix: operator-

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:f93b8e247ab691f22cc8c873f9433050d200975ad9a167b7d39eea1b0ef7d360"
  - name: ghcr.io/cogni-dao/cogni-template-migrate
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:f0b7b6e9fcea0b86957ce628a1874338f874e226ed56152d645c8eb374accbce"

patches:
  # Node-specific ConfigMap values.
  # DNS names must match prefixed Service names (namePrefix applies to all resources).
  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: "test"
      - op: replace
        path: /data/NODE_NAME
        value: "operator"
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-preview"
      - op: replace
        path: /data/LITELLM_BASE_URL
        value: "http://operator-litellm-external:4000"
      - op: replace
        path: /data/TEMPORAL_ADDRESS
        value: "operator-temporal-external:7233"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://operator-redis-external:6379"
  # NodePort assignment (operator = 30000)
  - target:
      kind: Service
      name: node-app
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30000
  # Fix secret refs — namePrefix doesn't transform secretRef/secretKeyRef names
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: "operator-node-app-secrets"
  - target:
      kind: Job
      name: migrate-node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: "operator-node-app-secrets"
  # EndpointSlice IPs — node InternalIP (provision script updates this per-VM)
  - target:
      kind: EndpointSlice
      name: postgres-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: temporal-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: litellm-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: redis-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
