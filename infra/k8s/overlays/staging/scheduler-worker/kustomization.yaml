apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-staging

resources:
  - ../../../base/scheduler-worker

# Image digest — updated by promote-k8s-image.sh on each CI push.
# Argo CD ApplicationSet points here; digest change → auto-sync.
images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:3ffabe09e62ada6027b336ef06de8aa482d53f9dffb6589b46a19cfe6db001f0"

patches:
  # Patch ConfigMap with staging-specific values
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-staging"
      - op: replace
        path: /data/APP_BASE_URL
        value: "http://app:3000"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "staging-placeholder-scheduler-worker"

  # EndpointSlice IPs — node InternalIP (provision script updates this per-VM)
  - target:
      kind: EndpointSlice
      name: temporal-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: postgres-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: app-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
