apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-staging

resources:
  - ../../../base/node-app

namePrefix: resy-

images:
  - name: ghcr.io/cogni-dao/node-template
    newName: ghcr.io/cogni-dao/node-template
    newTag: "staging-placeholder-resy"
  - name: ghcr.io/cogni-dao/node-template-migrator
    newName: ghcr.io/cogni-dao/node-template
    digest: "sha256:7a9bd8cf61ead5622d3a854766b3c401215bc95dfc3b37fdaef9aaa7d76ec93d"

patches:
  # Node-specific ConfigMap values.
  # DNS names must match prefixed Service names (namePrefix applies to all resources).
  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: "test"
      - op: replace
        path: /data/NODE_NAME
        value: "resy"
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-preview"
      - op: replace
        path: /data/LITELLM_BASE_URL
        value: "http://resy-litellm-external:4000"
      - op: replace
        path: /data/TEMPORAL_ADDRESS
        value: "resy-temporal-external:7233"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://resy-redis-external:6379"
  # NodePort assignment (resy = 30300)
  - target:
      kind: Service
      name: node-app
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30300
  # Fix secret refs — namePrefix doesn't transform secretRef/secretKeyRef names
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: "resy-node-app-secrets"
  - target:
      kind: Job
      name: migrate-node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: "resy-node-app-secrets"
  # EndpointSlice IPs — node InternalIP (provision script updates this per-VM)
  - target:
      kind: EndpointSlice
      name: postgres-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: temporal-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: litellm-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: redis-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
