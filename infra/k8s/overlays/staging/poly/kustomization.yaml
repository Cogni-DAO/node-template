apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-staging

resources:
  - ../../../base/node-app

namePrefix: poly-

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:4d7ace87101a3237b2deead18a61922b1dc4b9e398f201ebe6ed0c7ac29020c8"
  - name: ghcr.io/cogni-dao/cogni-template-migrate
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:de3c0c0f967addfeb25cf5de111ab56b14bf4b789ea2927e3d8d87b3f321d4f4"

patches:
  # Node-specific ConfigMap values.
  # DNS names must match prefixed Service names (namePrefix applies to all resources).
  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: "test"
      - op: replace
        path: /data/NODE_NAME
        value: "poly"
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-preview"
      - op: replace
        path: /data/LITELLM_BASE_URL
        value: "http://poly-litellm-external:4000"
      - op: replace
        path: /data/TEMPORAL_ADDRESS
        value: "poly-temporal-external:7233"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://poly-redis-external:6379"
  # NodePort + instance label on selector (prevents cross-node routing)
  - target:
      kind: Service
      name: node-app
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30100
      - op: replace
        path: /spec/ports/0/targetPort
        value: 3100
      - op: add
        path: /spec/selector/app.kubernetes.io~1instance
        value: "poly"
  # Fix secret refs + container port + instance label
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: "poly-node-app-secrets"
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 3100
      - op: add
        path: /spec/selector/matchLabels/app.kubernetes.io~1instance
        value: "poly"
      - op: add
        path: /spec/template/metadata/labels/app.kubernetes.io~1instance
        value: "poly"
  # Migration: skip until node-template builds its own -migrate image (task.0260).
  # The current migrate digest points to the app image, which starts Next.js
  # instead of running migrations — blocking Argo PreSync indefinitely.
  - target:
      kind: Job
      name: migrate-node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: "poly-node-app-secrets"
      - op: add
        path: /spec/template/spec/containers/0/command
        value: ["sh", "-c", "echo 'poly: no dedicated migrate image yet (task.0260)' && exit 0"]
  # EndpointSlice IPs — node InternalIP (provision script updates this per-VM)
  - target:
      kind: EndpointSlice
      name: postgres-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: temporal-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: litellm-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
  - target:
      kind: EndpointSlice
      name: redis-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.222"]
