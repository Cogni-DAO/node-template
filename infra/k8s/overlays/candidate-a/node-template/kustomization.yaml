#
# Per-env overlay for the node-template app. Mirrors the scheduler-worker
# overlay pattern: base ref + image override + ConfigMap patches +
# ExternalName Service patches (bug.0295). Created in this PR to close
# the deploy-machinery gap exposed by the v0 canary; the AppSet's
# templated path `infra/k8s/overlays/candidate-a/{{.name}}` requires this
# directory to exist for `name: node-template` (from infra/catalog/node-template.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-candidate-a

resources:
  - ../../../base/node-app

# Image tag — updated by argocd-image-updater on each candidate-a flight.
images:
  - name: ghcr.io/cogni-dao/cogni-node-template
    newName: ghcr.io/cogni-dao/cogni-node-template
    newTag: "candidate-a-placeholder-node-template"

patches:
  # NodePort for Caddy → app + LiteLLM billing-ingest routing on the VM.
  # MUST match infra/catalog/node-template.yaml::node_port. Kustomize can't
  # interpolate from another YAML; v1 keeps the value duplicated with this
  # comment as the lint. If multi-node forks add a 2nd node, add its overlay
  # here with its own port (catalog declares the canonical value).
  - target: { kind: Service, name: node-app }
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30000

  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-candidate-a"

  # bug.0295: VM discovery via DNS (candidate-a.vm.cognidao.org for the
  # canonical operator; forks override the vm.* zone separately at fork
  # time). Convert headless Services → ExternalName; delete EndpointSlices.
  - target: { kind: Service, name: postgres-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: temporal-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: temporal-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: litellm-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: litellm-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: doltgres-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: doltgres-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: redis-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: redis-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: EndpointSlice, name: postgres-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: postgres-external-1
  - target: { kind: EndpointSlice, name: temporal-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: temporal-external-1
  - target: { kind: EndpointSlice, name: litellm-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: litellm-external-1
  - target: { kind: EndpointSlice, name: doltgres-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: doltgres-external-1
  - target: { kind: EndpointSlice, name: redis-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: redis-external-1
