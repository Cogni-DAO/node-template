apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-candidate-a

resources:
  - ../../../base/scheduler-worker

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:9bc3af77515a34fb5c176c43b4ea8c465537f9bd9d5721de317b470c92bf8b59"

patches:
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-candidate-a"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "candidate-a-placeholder-scheduler-worker"

  # bug.0295: VM discovery via DNS (candidate-a.vm.cognidao.org).
  # Convert base headless Services → ExternalName; delete EndpointSlices.
  - target: { kind: Service, name: temporal }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: temporal
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: postgres }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: app }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: app
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: poly-app }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: poly-app
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: resy-app }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: resy-app
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: EndpointSlice, name: temporal-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: temporal-1
  - target: { kind: EndpointSlice, name: postgres-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: postgres-1
  - target: { kind: EndpointSlice, name: app-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: app-1
  - target: { kind: EndpointSlice, name: poly-app-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: poly-app-1
  - target: { kind: EndpointSlice, name: resy-app-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: resy-app-1
