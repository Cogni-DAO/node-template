apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-candidate-a

resources:
  - ../../../base/node-app

namePrefix: operator-

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:34f5abf960a233b5960dc76f49d20b733f7ea0873e7e3451bb064fe84327ea64"
  - name: ghcr.io/cogni-dao/cogni-template-migrate
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:f6c723a29c402c89fffd805c3707f0200d9dc0bf252418a771043027a8d3352c"

patches:
  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/APP_ENV
        value: "production"
      - op: replace
        path: /data/NODE_NAME
        value: "operator"
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-candidate-a"
      - op: replace
        path: /data/LITELLM_BASE_URL
        value: "http://operator-litellm-external:4000"
      - op: replace
        path: /data/TEMPORAL_ADDRESS
        value: "operator-temporal-external:7233"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://operator-redis-external:6379"
      - op: add
        path: /data/NEXTAUTH_URL
        value: "https://test.cognidao.org"
      - op: add
        path: /data/AUTH_TRUST_HOST
        value: "true"
  - target:
      kind: Service
      name: node-app
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30000
      - op: add
        path: /spec/selector/app.kubernetes.io~1instance
        value: "operator"
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: "operator-node-app-secrets"
      - op: add
        path: /spec/selector/matchLabels/app.kubernetes.io~1instance
        value: "operator"
      - op: add
        path: /spec/template/metadata/labels/app.kubernetes.io~1instance
        value: "operator"
  - target:
      kind: Job
      name: migrate-node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: "operator-node-app-secrets"
  - target:
      kind: EndpointSlice
      name: postgres-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.160"]
      - op: replace
        path: /metadata/labels/kubernetes.io~1service-name
        value: "operator-postgres-external"
  - target:
      kind: EndpointSlice
      name: temporal-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.160"]
      - op: replace
        path: /metadata/labels/kubernetes.io~1service-name
        value: "operator-temporal-external"
  - target:
      kind: EndpointSlice
      name: litellm-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.160"]
      - op: replace
        path: /metadata/labels/kubernetes.io~1service-name
        value: "operator-litellm-external"
  - target:
      kind: EndpointSlice
      name: redis-external-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["84.32.109.160"]
      - op: replace
        path: /metadata/labels/kubernetes.io~1service-name
        value: "operator-redis-external"
