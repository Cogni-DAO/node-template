apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-candidate-a

resources:
  - ../../../base/node-app
  - ../../../base/poly-doltgres

namePrefix: poly-

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:3cdd1a4577d3f4dbf721439362ff1f3b512dc4722157ac32987a8a314c926468"
  - name: ghcr.io/cogni-dao/cogni-template-migrate
    newName: ghcr.io/cogni-dao/cogni-template-migrate
    digest: "sha256:d6b699d197cd3a6dc1f0ca8b6cfe6e68110b2d6799a28dc3d86bc48150a9102b"

patches:
  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/NODE_NAME
        value: "poly"
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-candidate-a"
      - op: replace
        path: /data/LITELLM_BASE_URL
        value: "http://poly-litellm-external:4000"
      - op: replace
        path: /data/TEMPORAL_ADDRESS
        value: "poly-temporal-external:7233"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://poly-redis-external:6379"
      - op: add
        path: /data/NEXTAUTH_URL
        value: "https://poly-test.cognidao.org"
  - target:
      kind: Service
      name: node-app
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30100
      - op: replace
        path: /spec/ports/0/targetPort
        value: 3100
      - op: add
        path: /spec/selector/app.kubernetes.io~1instance
        value: "poly"
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: "poly-node-app-secrets"
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 3100
      - op: add
        path: /spec/selector/matchLabels/app.kubernetes.io~1instance
        value: "poly"
      - op: add
        path: /spec/template/metadata/labels/app.kubernetes.io~1instance
        value: "poly"
  - target:
      kind: Job
      name: migrate-node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: "poly-node-app-secrets"
  - target:
      kind: Job
      name: migrate-poly-doltgres
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/valueFrom/secretKeyRef/name
        value: "poly-node-app-secrets"

  # bug.0295: VM discovery via DNS (candidate-a.vm.cognidao.org).
  # Convert base headless Services → ExternalName; delete EndpointSlices.
  # No env-state.yaml, no `replacements:` — reprovision = DNS update only.
  - target: { kind: Service, name: postgres-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: temporal-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: temporal-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: litellm-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: litellm-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: redis-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: redis-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: doltgres-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: doltgres-external
      spec:
        type: ExternalName
        externalName: candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: EndpointSlice, name: postgres-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: postgres-external-1
  - target: { kind: EndpointSlice, name: temporal-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: temporal-external-1
  - target: { kind: EndpointSlice, name: litellm-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: litellm-external-1
  - target: { kind: EndpointSlice, name: redis-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: redis-external-1
  - target: { kind: EndpointSlice, name: doltgres-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: doltgres-external-1
