# Alloy DaemonSet overlay for production env.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-production

resources:
  - ../../../base/alloy

patches:
  - target:
      kind: ConfigMap
      name: alloy-config
    patch: |
      - op: replace
        path: /data/DEPLOY_ENVIRONMENT
        value: "production"
  - target:
      kind: ClusterRoleBinding
      name: alloy
    patch: |
      - op: replace
        path: /subjects/0/namespace
        value: "cogni-production"
