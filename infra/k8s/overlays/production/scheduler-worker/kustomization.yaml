apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-production

resources:
  - ../../../base/scheduler-worker
  - env-state.yaml

# Image digest — updated by manual PR for production promotion.
images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    newTag: "production-placeholder-scheduler-worker"

patches:
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-production"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "production-placeholder-scheduler-worker"

replacements:
  - source:
      kind: ConfigMap
      name: env-state
      fieldPath: data.VM_IP
    targets:
      - select:
          kind: EndpointSlice
          name: temporal-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: postgres-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: app-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: poly-app-1
        fieldPaths:
          - endpoints.0.addresses.0
      - select:
          kind: EndpointSlice
          name: resy-app-1
        fieldPaths:
          - endpoints.0.addresses.0
