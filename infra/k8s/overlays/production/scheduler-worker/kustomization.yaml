apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-production

resources:
  - ../../../base/scheduler-worker

# Image tag — updated by argocd-image-updater (or manual promotion PR).
images:
  - name: ghcr.io/cogni-dao/cogni-node-template
    newName: ghcr.io/cogni-dao/cogni-node-template
    newTag: "production-placeholder-scheduler-worker"

patches:
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-production"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "production-placeholder-scheduler-worker"

  # bug.0295: VM discovery via DNS (production.vm.cognidao.org).
  # Convert base headless Services → ExternalName; delete EndpointSlices.
  - target: { kind: Service, name: temporal }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: temporal
      spec:
        type: ExternalName
        externalName: production.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: postgres }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres
      spec:
        type: ExternalName
        externalName: production.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: app }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: app
      spec:
        type: ExternalName
        externalName: production.vm.cognidao.org
        clusterIP: null
  - target: { kind: EndpointSlice, name: temporal-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: temporal-1
  - target: { kind: EndpointSlice, name: postgres-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: postgres-1
  - target: { kind: EndpointSlice, name: app-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: app-1
