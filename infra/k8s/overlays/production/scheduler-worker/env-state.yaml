#
# Per-overlay VM truth. This is the ONLY file under `infra/k8s/overlays/`
# that deploy-branch provisioning is allowed to write. Everything else in
# `infra/k8s/` on a deploy branch must be byte-identical to `main` at the
# promoted SHA (invariant INFRA_K8S_MAIN_DERIVED).
#
# `local-config: "true"` keeps this ConfigMap out of the rendered manifest;
# kustomize `replacements` in the sibling kustomization.yaml reads `data.VM_IP`
# and injects it into every EndpointSlice `/endpoints/0/addresses/0`.
#
# See: work/items/bug.0334.overlay-endpoint-ips-via-env-state.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: env-state
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  VM_IP: "127.0.0.1"
