#
# Argo CD Image Updater — continuous reconciler that keeps main's overlay
# digest seeds eventually-consistent with the preview-* tag class in GHCR.
# See bug.0344 and docs/runbooks/image-updater-bootstrap.md.
#
# Pin: v0.15.2 — last upstream release explicitly tested against Argo CD v2.13.x
# (which is the version pinned in ../kustomization.yaml). Moving to v0.18+ or
# v1.x is a follow-up tied to the Argo CD server upgrade, not a prerequisite.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # Upstream install manifest — same shape as Argo CD itself is installed in
  # ../kustomization.yaml. No fork, no vendor.
  - https://raw.githubusercontent.com/argoproj-labs/argocd-image-updater/v0.15.2/manifests/install.yaml
  # Encrypted credentials decrypted at apply-time by the ksops CMP sidecar on
  # the repo-server. See ../ksops-cmp.yaml and the bootstrap runbook for how
  # these get authored (SOPS/age).
  - ghcr-secret.enc.yaml
  - git-creds-secret.enc.yaml

patches:
  # Registry config (GHCR credentials source) + commit-message template
  # (grep-filterable provenance: `chore(deps): argocd-image-updater`).
  - path: config-patch.yaml
