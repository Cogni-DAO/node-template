#
# Argo CD Application for scheduler-worker.
# Managed by the app-of-apps root Application.
# Points at the staging overlay — production gets a separate cluster or
# a production-targeted root Application (decided in task.0149).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scheduler-worker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/cogni-dao/cogni-template.git
    path: infra/k8s/overlays/staging/scheduler-worker
    targetRevision: staging
  destination:
    server: https://kubernetes.default.svc
    namespace: cogni-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
