# Single-node (node-template) applicationset for Cogni-DAO/node-template.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cogni-production
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/cogni-dao/node-template.git
        revision: deploy/production-node-template
        files:
          - path: "infra/catalog/node-template.yaml"
  template:
    metadata:
      name: "production-{{.name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/cogni-dao/node-template.git
        targetRevision: "deploy/production-{{.name}}"
        path: "infra/k8s/overlays/production/{{.name}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: cogni-production
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
