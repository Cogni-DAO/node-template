#
# Root Application (app-of-apps pattern).
# Manages all per-service Applications in the applications/ directory.
# Applied once during cluster bootstrap (task.0149).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cogni-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/cogni-dao/cogni-template.git
    path: infra/k8s/argocd/applications
    targetRevision: staging
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
