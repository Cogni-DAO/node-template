#
# ApplicationSet for candidate-a environment.
# Single-slot pre-merge validation lane.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cogni-candidate-a
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/candidate-a
        files:
          - path: "infra/catalog/*.yaml"
  template:
    metadata:
      name: "candidate-a-{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      # bug.0344 post-merge follow-up — image updater annotations were
      # REMOVED from this AppSet. They were present in the original #974
      # design (Path A: keep main's candidate-a seed eventually-consistent
      # with the newest merged `preview-*` tag) but the operational cost
      # (~3 commits to main per merge-to-main, in perpetuity, per
      # Application whose live pr-<N>-<sha> digest trivially differs from
      # the newest preview-<mainSHA>) was judged too high for the marginal
      # seed-freshness value.
      #
      # candidate-flight.yml always rsyncs main → deploy/candidate-a and
      # then overwrites every overlay digest with the specific pr-<N>-<sha>
      # under flight. main's candidate-a seed is therefore never read by
      # the deploy path — it is a developer-reference artifact only. An
      # eventually-consistent developer reference is not worth a 3-commit-
      # per-merge git noise floor.
      #
      # The guardrail in scripts/ci/check-image-updater-scope.sh
      # enforces this decision across both candidate-a and production
      # AppSets. If candidate-a automation is later revisited, reopen
      # bug.0344 with an explicit design for write-rate minimization
      # (e.g. only write when the seed is ≥N days stale) — not a direct
      # annotation re-add.
    spec:
      project: default
      source:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        targetRevision: deploy/candidate-a
        path: "infra/k8s/overlays/candidate-a/{{name}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: cogni-candidate-a
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
