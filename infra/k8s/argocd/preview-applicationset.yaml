#
# ApplicationSet for preview environment.
# Human e2e testing. Promoted from canary after AI e2e passes.
# Generates one Argo Application per catalog entry.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cogni-preview
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview
        files:
          - path: "infra/catalog/*.yaml"
  template:
    metadata:
      name: "preview-{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      # bug.0344 — Argo CD Image Updater annotations.
      # Keeps main's infra/k8s/overlays/preview/{{name}}/kustomization.yaml
      # digest seed eventually-consistent with GHCR. Reads ghcr/git creds
      # from ksops-encrypted secrets in the argocd namespace (see
      # ../argocd/image-updater/). Scope-limited to the primary app image;
      # migrator images and sibling-env overlays are follow-up work — see
      # bug.0344 § MVP scope boundaries.
      annotations:
        argocd-image-updater.argoproj.io/image-list: "app=ghcr.io/cogni-dao/cogni-template"
        argocd-image-updater.argoproj.io/app.update-strategy: newest-build
        argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^preview-[0-9a-f]{40}{{image_tag_suffix}}$"
        argocd-image-updater.argoproj.io/app.pull-secret: "pullsecret:argocd/argocd-image-updater-ghcr"
        argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/argocd-image-updater-git-creds"
        argocd-image-updater.argoproj.io/git-branch: main
        argocd-image-updater.argoproj.io/write-back-target: kustomization
    spec:
      project: default
      source:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        targetRevision: deploy/preview
        path: "infra/k8s/overlays/preview/{{name}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: cogni-preview
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
