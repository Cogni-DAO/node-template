#
# ApplicationSet for preview environment.
#
# task.0372 v4 — per-node lane isolation. Four git generators, one per
# catalog entry, each tracking its own deploy/preview-<node> branch.
# Application names stay "preview-{{name}}" (APPLICATION_NAMES_UNCHANGED).
# See candidate-a-applicationset.yaml for the design reference.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cogni-preview
  namespace: argocd
spec:
  preserveResourcesOnDeletion: true # APPSET_PRESERVE_ON_TRANSITION
  generators:
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview-operator
        files:
          - path: "infra/catalog/operator.yaml"
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview-poly
        files:
          - path: "infra/catalog/poly.yaml"
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview-resy
        files:
          - path: "infra/catalog/resy.yaml"
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview-scheduler-worker
        files:
          - path: "infra/catalog/scheduler-worker.yaml"
  template:
    metadata:
      name: "preview-{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        targetRevision: "{{preview_branch}}"
        path: "infra/k8s/overlays/preview/{{name}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: cogni-preview
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
