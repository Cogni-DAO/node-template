#
# ApplicationSet for preview environment.
# Human e2e testing. Promoted from canary after AI e2e passes.
# Generates one Argo Application per catalog entry.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cogni-preview
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        revision: deploy/preview
        files:
          - path: "infra/catalog/*.yaml"
  template:
    metadata:
      name: "preview-{{name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      # bug.0344 — Argo CD Image Updater annotations.
      # Keeps main's infra/k8s/overlays/preview/{{name}}/kustomization.yaml
      # digest seed eventually-consistent with GHCR. GHCR credentials are
      # configured at the registry level (see ../argocd/image-updater/
      # config-patch.yaml → registries.conf); git push credentials come from
      # the imperatively-created argocd-image-updater-git-creds Secret (see
      # docs/runbooks/image-updater-bootstrap.md §1).
      #
      # Two image aliases per Application because every kustomize overlay for
      # a node (operator/poly/resy) declares TWO images blocks:
      #   - name: ghcr.io/cogni-dao/cogni-template           (primary app)
      #   - name: ghcr.io/cogni-dao/cogni-template-migrate   (per-node migrator)
      # Both resolve to the same GHCR repo (ghcr.io/cogni-dao/cogni-template),
      # distinguished by tag suffix (image_tag_suffix vs migrator_tag_suffix).
      # Matches the pairing already wired by scripts/ci/promote-k8s-image.sh
      # --migrator-digest — without this, the migrator seed rots on main and
      # bug #970 recurs on every unrelated flight (rsync overwrites the fresh
      # migrator digest on deploy/preview with main's stale seed).
      # scheduler-worker has no migrator entry; its migrator alias regex
      # matches zero tags, so the controller no-ops for it.
      #
      # update-strategy: latest = pick the tag with the newest image-manifest
      # creation timestamp among those matching allow-tags (v0.15.2 terminology
      # — `newest-build` is not a valid strategy name).
      annotations:
        argocd-image-updater.argoproj.io/image-list: "app=ghcr.io/cogni-dao/cogni-template,migrator=ghcr.io/cogni-dao/cogni-template"
        argocd-image-updater.argoproj.io/app.update-strategy: latest
        argocd-image-updater.argoproj.io/app.allow-tags: "regexp:^preview-[0-9a-f]{40}{{image_tag_suffix}}$"
        argocd-image-updater.argoproj.io/migrator.update-strategy: latest
        argocd-image-updater.argoproj.io/migrator.allow-tags: "regexp:^preview-[0-9a-f]{40}{{migrator_tag_suffix}}$"
        argocd-image-updater.argoproj.io/migrator.kustomize.image-name: ghcr.io/cogni-dao/cogni-template-migrate
        argocd-image-updater.argoproj.io/write-back-method: "git:secret:argocd/argocd-image-updater-git-creds"
        argocd-image-updater.argoproj.io/git-branch: main
        argocd-image-updater.argoproj.io/write-back-target: kustomization
    spec:
      project: default
      source:
        repoURL: https://github.com/cogni-dao/cogni-template.git
        targetRevision: deploy/preview
        path: "infra/k8s/overlays/preview/{{name}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: cogni-preview
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
