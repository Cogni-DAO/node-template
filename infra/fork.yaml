#
# infra/fork.yaml — Fork-identity SSOT.
#
# Single source of truth for what's TRULY fork-level (not node-level or
# repo-level). Today, that's just the Cloudflare zone the operator owns;
# every public URL composes from this root plus the per-node subdomain
# prefix declared in infra/catalog/<node>.yaml::public_url.
#
# Spec: docs/spec/agentic-fork-bootstrap.md §Fork Identity.
#
# REQUIRED EDIT before bootstrap. The committed value is intentionally
# empty — node-template is a template, not a deployment. The upstream
# (Cogni-DAO/node-template) ships no default zone because no fork should
# inherit any other fork's zone as its starting point. bootstrap.sh and
# provision-env-vm.sh both validate this is non-empty and abort if not.
#
# Forking checklist:
#   1. Set `domain.root` below to a Cloudflare zone YOU own.
#   2. Commit. That's it — every URL rederives.
#
# DO NOT add per-node concerns here (image tags, deploy branches, ports).
# Those belong in infra/catalog/<node>.yaml.

schema_version: 1

domain:
  # The Cloudflare zone the operator owns. Public URLs compose as
  # `https://<catalog-prefix>.<root>` (or `https://<root>` if catalog
  # prefix is empty, e.g. production at the apex). Must match the zone
  # named by .env.bootstrap::CLOUDFLARE_ZONE_ID.
  root: "" # ← set me
