#
# infra/fork.yaml — Fork-identity SSOT.
#
# Single source of truth for what's TRULY fork-level (not node-level).
# Public URLs compose from the Cloudflare zone plus the per-node subdomain
# prefix declared in infra/catalog/<node>.yaml::public_url. VM DNS aliases
# compose from the fork slug plus env so multiple forks can share one zone.
#
# Spec: docs/spec/agentic-fork-bootstrap.md §Fork Identity.
#
# Committed empty by design — node-template is a template, not a deployment;
# no fork should inherit another's zone. `pnpm bootstrap` auto-populates
# `domain.root` by resolving .env.bootstrap::CLOUDFLARE_ZONE_ID against
# the Cloudflare API on first run, then prints a one-line `git commit` to
# persist the value. If you hand-set it and it disagrees with the API,
# bootstrap aborts on the mismatch instead of silently overwriting.
#
# Forking checklist:
#   1. Fill .env.bootstrap (incl. CLOUDFLARE_ZONE_ID).
#   2. Usually leave `fork.slug` empty; bootstrap derives it from the
#      GitHub repo name. Set it only if you need a different infra alias.
#   3. Run `pnpm bootstrap`. It auto-populates `domain.root` and tells
#      you the git commit command to persist it. Every URL rederives.
#
# DO NOT add per-node concerns here (image tags, deploy branches, ports).
# Those belong in infra/catalog/<node>.yaml.

schema_version: 1

fork:
  # Repo/fork-level slug for account-scoped infra aliases. This is NOT a
  # node slug: a multi-node repo still shares one VM substrate per env.
  # Empty means bootstrap/provision derive it from the GitHub repo name.
  #
  # Example VM aliases:
  #   candidate-a: <slug>-candidate-a.vm.<domain.root>
  #   preview:     <slug>-preview.vm.<domain.root>
  #   production:  <slug>.vm.<domain.root>
  slug: ""

domain:
  # The Cloudflare zone the operator owns. Public URLs compose as
  # `https://<catalog-prefix>.<root>` (or `https://<root>` if catalog
  # prefix is empty, e.g. production at the apex). Must match the zone
  # named by .env.bootstrap::CLOUDFLARE_ZONE_ID.
  root: "" # auto-populated by pnpm bootstrap from CLOUDFLARE_ZONE_ID
