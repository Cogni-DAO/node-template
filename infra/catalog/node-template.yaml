name: node-template
type: node
port: 3200
# Image tag a fresh fork pulls from `ghcr.io/cogni-dao/cogni-node-template`
# BEFORE its own pr-build has published anything. Phase 4c of
# provision-env-vm.sh sed-substitutes this into the overlay's `newTag`,
# so the first canary deploys upstream's code (proving the bootstrap path
# works). argocd-image-updater swaps to the fork's own pr-* tags after
# its first push-to-main publishes them. Bump this when the pinned upstream
# build goes stale (GHCR retention, upstream restructure, etc.) — see PR
# #22 / docs/spec/agentic-fork-bootstrap.md §Bootstrap Image.
bootstrap_image_tag: "pr-46-d638ff639532c6876a57af3338a8086793e2203f-node-template"
# K8s NodePort exposed for Compose→k8s gateway access (LiteLLM billing
# callbacks via host.docker.internal:${node_port}). Read by both
# provision-env-vm.sh (writes COGNI_NODE_ENDPOINTS) and the per-env overlay
# Service patch. Keep these two consumers in sync.
node_port: 30000
node_id: "00000000-0000-4000-a000-000000000000"
dockerfile: nodes/node-template/app/Dockerfile
image_tag_suffix: "-node-template"
migrator_tag_suffix: "-node-template-migrate"
candidate_a_branch: deploy/candidate-a-node-template
preview_branch: deploy/preview-node-template
production_branch: deploy/production-node-template
path_prefix: nodes/node-template/
# Per-env subdomain prefix. Composed with FORK_DOMAIN_ROOT env var at
# read time via public_url_for_target (bug.5002 + B2 fork-portability).
# Empty string = root domain (typical for production at the apex). Omit
# the env key entirely to mean "no public Ingress for this env".
# Forks: leave these prefixes alone — set FORK_DOMAIN_ROOT GH variable.
public_url:
  candidate-a: node-template-test
  preview: node-template-preview
  production: node-template
