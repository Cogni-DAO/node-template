# Akash SDL Template: Agent + MCP Crew
# This template shows the structure of a multi-service crew deployment.
# The actual SDL is generated programmatically by packages/akash-client.
#
# A crew consists of:
#   - One or more MCP servers (internal networking only)
#   - One or more AI agents (globally exposed)
#   - Shared internal DNS for service discovery
#
# Example: Research crew with GitHub MCP + Filesystem MCP + Research Agent

version: "2.0"

services:
  mcp-github:
    image: ghcr.io/cogni-dao/mcp-golden/github:latest
    env:
      - GITHUB_TOKEN=<sealed>
    expose:
      - port: 3101
        proto: tcp
        to:
          - service: agent-research

  mcp-filesystem:
    image: ghcr.io/cogni-dao/mcp-golden/filesystem:latest
    expose:
      - port: 3100
        proto: tcp
        to:
          - service: agent-research

  agent-research:
    image: ghcr.io/cogni-dao/openclaw:latest
    env:
      - MCP_SERVERS=mcp-github:3101,mcp-filesystem:3100
      - SOUL_MD=<base64-encoded-soul-md>
    expose:
      - port: 8080
        proto: tcp
        to:
          - global: true

profiles:
  compute:
    mcp-github:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi
    mcp-filesystem:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 256Mi
        storage:
          size: 1Gi
    agent-research:
      resources:
        cpu:
          units: 1
        memory:
          size: 1Gi
        storage:
          size: 2Gi
  placement:
    default:
      pricing:
        mcp-github:
          denom: uakt
          amount: 100
        mcp-filesystem:
          denom: uakt
          amount: 100
        agent-research:
          denom: uakt
          amount: 200

deployment:
  mcp-github:
    default:
      count: 1
  mcp-filesystem:
    default:
      count: 1
  agent-research:
    default:
      count: 1
