#
# Cloud-init for k3s VM provisioning.
# Extends the base/bootstrap.yaml pattern: same marker files, same logging,
# same failure handling. Installs k3s with Argo CD + ksops for GitOps.
#cloud-config

package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release

swap:
  filename: /swapfile
  size: 2147483648

write_files:
  # k3s server config — durable settings (K3S_CONFIG_YAML constraint)
  # Install script reads this automatically; no INSTALL_K3S_EXEC flags needed.
  - path: /etc/rancher/k3s/config.yaml
    owner: root:root
    permissions: "0644"
    content: |
      disable:
        - traefik
        - servicelb

  # k3s GHCR registry auth — node-level, all pods get access
  - path: /etc/rancher/k3s/registries.yaml
    owner: root:root
    permissions: "0600"
    content: |
      mirrors:
        ghcr.io:
          endpoint:
            - "https://ghcr.io"
      configs:
        "ghcr.io":
          auth:
            username: "${ghcr_deploy_username}"
            password: "${ghcr_deploy_token}"

  # Journald config — same as base
  - path: /etc/systemd/journald.conf
    owner: root:root
    permissions: "0644"
    content: |
      [Journal]
      Storage=persistent
      SystemMaxUse=200M
      SystemMaxFileSize=50M
      RuntimeMaxUse=50M

  # Bootstrap script
  - path: /opt/cogni-bootstrap-k3s.sh
    owner: root:root
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail

      LOGFILE="/var/log/cogni-bootstrap.log"
      MARKER_DIR="/var/lib/cogni"
      mkdir -p "$MARKER_DIR"

      exec > >(tee -a "$LOGFILE") 2>&1

      trap 'code=$?; cmd=$BASH_COMMAND; {
        echo "=== BOOTSTRAP FAILED ==="
        echo "exit_code=$code"
        echo "failed_command=$cmd"
        echo "timestamp=$(date -u +%FT%TZ)"
        echo "=== cloud-init status ==="
        cloud-init status 2>/dev/null || true
        echo "=== last 50 lines of cloud-init-output ==="
        tail -50 /var/log/cloud-init-output.log 2>/dev/null || true
      } > "$MARKER_DIR/bootstrap.fail"
      exit $code' ERR

      echo "=== k3s bootstrap started at $(date -u +%FT%TZ) ==="

      # Restart journald with updated config
      systemctl restart systemd-journald

      # ── k3s ──────────────────────────────────────────────────
      echo "Installing k3s..."
      curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="v1.31.4+k3s1" sh -
      echo "Waiting for k3s node to be ready..."
      kubectl wait --for=condition=Ready node --all --timeout=120s
      k3s --version
      kubectl get nodes

      # ── age (SOPS decryption) ────────────────────────────────
      echo "Installing age..."
      AGE_VERSION="v1.2.0"
      curl -sLo /tmp/age.tar.gz "https://github.com/FiloSottile/age/releases/download/$${AGE_VERSION}/age-$${AGE_VERSION}-linux-amd64.tar.gz"
      tar -xzf /tmp/age.tar.gz -C /tmp
      mv /tmp/age/age /usr/local/bin/age
      mv /tmp/age/age-keygen /usr/local/bin/age-keygen
      rm -rf /tmp/age /tmp/age.tar.gz
      age --version

      # Generate age keypair — private key goes to k8s Secret,
      # public key saved for SOPS encryption (tofu output).
      echo "Generating age keypair..."
      age-keygen -o /tmp/age-key.txt 2>/tmp/age-keygen-output.txt
      AGE_PUBKEY=$(grep "public key:" /tmp/age-keygen-output.txt | awk '{print $NF}')
      echo "$AGE_PUBKEY" > "$MARKER_DIR/age-public-key.txt"
      echo "Age public key: $AGE_PUBKEY"

      # ── Argo CD + ksops ──────────────────────────────────────
      # Clone repo for kustomized manifests (ksops patches, app-of-apps).
      echo "Cloning repo for Argo CD manifests..."
      apt-get install -y git
      git clone --depth=1 --branch "${cogni_repo_ref}" \
        "${cogni_repo_url}" /tmp/cogni-repo

      # Create argocd namespace + age key Secret BEFORE Argo CD install.
      # ksops sidecar mounts this Secret as a volume.
      kubectl create namespace argocd || true
      kubectl -n argocd create secret generic sops-age-key \
        --from-file=keys.txt=/tmp/age-key.txt
      rm -f /tmp/age-key.txt /tmp/age-keygen-output.txt

      # Apply kustomized Argo CD (base install + ksops sidecar patches).
      echo "Installing Argo CD with ksops..."
      kubectl kustomize /tmp/cogni-repo/infra/cd/argocd/ \
        | kubectl apply -n argocd -f -
      echo "Waiting for Argo CD to be ready..."
      kubectl -n argocd wait --for=condition=Available \
        deployment/argocd-server --timeout=300s

      # Apply app-of-apps — Argo CD syncs the staging overlay.
      # Sync will be degraded until SOPS secrets are encrypted
      # with the age public key and committed to the repo.
      echo "Applying Argo CD Application..."
      sed -i "s|repoURL: .*|repoURL: ${cogni_repo_url}|" /tmp/cogni-repo/infra/cd/apps/staging.yaml
      kubectl apply -f /tmp/cogni-repo/infra/cd/apps/staging.yaml

      # Cleanup
      rm -rf /tmp/cogni-repo

      # ── Success marker ───────────────────────────────────────
      {
        echo "bootstrap=ok"
        echo "timestamp=$(date -u +%FT%TZ)"
        echo "k3s_version=$(k3s --version 2>&1 | head -1)"
        echo "kubectl_version=$(kubectl version --client 2>&1 | head -1)"
        echo "age_version=$(age --version 2>&1)"
        echo "age_public_key=$AGE_PUBKEY"
        echo "argocd=installed"
        echo "argocd_ksops=installed"
        echo "argocd_app=scheduler-worker-staging"
      } > "$MARKER_DIR/bootstrap.ok"

      echo "=== k3s bootstrap completed at $(date -u +%FT%TZ) ==="

runcmd:
  - bash /opt/cogni-bootstrap-k3s.sh
