# Cogni Edge Stack
# Always-on TLS termination layer. Isolated from app deployments to prevent
# connection resets during deploys. Started once at bootstrap, rarely touched.
#
# INVARIANTS:
# - Never `docker compose down` this stack during app deployments
# - Only restart on Caddyfile changes or cert issues
# - Shares `cogni-edge` network with app stack for service DNS resolution

services:
  caddy:
    image: caddy:2
    restart: always
    networks:
      - cogni-edge
    ports:
      - "80:80"
      - "443:443"
    # Allow Caddy to reach k3s NodePorts on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DOMAIN=${DOMAIN}
      # Single-node fork: Caddy reaches the k3s pod via the host NodePort
      # (catalog::node_port — node-template ships 30000). Override via .env
      # if a fork uses a different node port. provision-env-vm.sh writes
      # NODE_UPSTREAM into .env at bootstrap, derived from the same catalog
      # field. Multi-block *_DOMAIN / *_UPSTREAM env vars removed in bug.5001
      # cleanup — the Caddyfile no longer references them.
      - NODE_UPSTREAM=${NODE_UPSTREAM:-host.docker.internal:30000}
      # ACME issuer URL. Empty → Caddyfile default (LE PROD = browser-trusted).
      # Override via .env (provision-env-vm.sh propagates the caller's
      # ACME_CA when set) for rapid-iteration scenarios that would otherwise
      # exhaust LE PROD's per-domain weekly quota.
      - ACME_CA=${ACME_CA:-}
    volumes:
      - ./configs/Caddyfile.tmpl:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:2019/config/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  cogni-edge:
    name: cogni-edge
    external: true

volumes:
  caddy_data:
    name: cogni-edge_caddy_data
  caddy_config:
    name: cogni-edge_caddy_config
