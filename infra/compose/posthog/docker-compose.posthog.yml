# PostHog Self-Hosted MVP Stack
# Minimal PostHog deployment for product analytics event store (ClickHouse-backed).
# Internal-only exposure by default. No public ingress.
#
# Usage:
#   docker network create cogni-edge || true
#   docker compose -f platform/infra/services/posthog/docker-compose.posthog.yml up -d
#
# Resource requirements: ~4GB RAM minimum for all services.
# See docs/guides/posthog-setup.md for setup, docs/spec/posthog.md for architecture.

services:
  posthog-postgres:
    image: postgres:15
    container_name: posthog-postgres
    restart: unless-stopped
    networks:
      - posthog-internal
    environment:
      POSTGRES_DB: posthog
      POSTGRES_USER: posthog
      POSTGRES_PASSWORD: ${POSTHOG_DB_PASSWORD:-posthog}
    volumes:
      - posthog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posthog"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s

  posthog-redis:
    image: redis:7-alpine
    container_name: posthog-redis
    restart: unless-stopped
    networks:
      - posthog-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 5s

  posthog-clickhouse:
    image: clickhouse/clickhouse-server:24.8.5.115
    container_name: posthog-clickhouse
    restart: unless-stopped
    networks:
      - posthog-internal
      - internal
    ports:
      # ClickHouse HTTP (for direct SQL queries from host)
      - "127.0.0.1:8123:8123"
      # ClickHouse native protocol
      - "127.0.0.1:9000:9000"
    volumes:
      - posthog_clickhouse_data:/var/lib/clickhouse
    environment:
      # Reduce memory usage for local dev
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 30s

  posthog-zookeeper:
    image: zookeeper:3.9
    container_name: posthog-zookeeper
    restart: unless-stopped
    networks:
      - posthog-internal
    volumes:
      - posthog_zookeeper_data:/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 15s

  posthog-kafka:
    image: bitnami/kafka:3.6
    container_name: posthog-kafka
    restart: unless-stopped
    networks:
      - posthog-internal
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=posthog-zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://posthog-kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - posthog_kafka_data:/bitnami/kafka
    depends_on:
      posthog-zookeeper:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  posthog-objectstorage:
    image: minio/minio:RELEASE.2024-06-11T03-13-30Z
    container_name: posthog-objectstorage
    restart: unless-stopped
    networks:
      - posthog-internal
    environment:
      - MINIO_ROOT_USER=object_storage_root_user
      - MINIO_ROOT_PASSWORD=object_storage_root_password
    volumes:
      - posthog_minio_data:/data
    entrypoint: sh
    command: -c 'mkdir -p /data/posthog && minio server --address ":19000" --console-address ":19001" /data'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:19000/minio/health/live || exit 1",
        ]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 10s

  posthog-web:
    image: posthog/posthog:release-1.43.0
    container_name: posthog-web
    restart: unless-stopped
    networks:
      - posthog-internal
      - internal
    ports:
      # PostHog UI + API (internal only, bound to localhost)
      - "127.0.0.1:8000:8000"
    environment: &posthog-env
      SECRET_KEY: ${POSTHOG_SECRET_KEY:-phog-secret-key-for-local-dev-only-change-in-production}
      DATABASE_URL: postgres://posthog:${POSTHOG_DB_PASSWORD:-posthog}@posthog-postgres:5432/posthog
      REDIS_URL: redis://posthog-redis:6379
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_VERIFY: "false"
      KAFKA_HOSTS: posthog-kafka:9092
      SITE_URL: ${POSTHOG_SITE_URL:-http://localhost:8000}
      # Object storage
      OBJECT_STORAGE_ENDPOINT: http://posthog-objectstorage:19000
      OBJECT_STORAGE_ACCESS_KEY_ID: object_storage_root_user
      OBJECT_STORAGE_SECRET_ACCESS_KEY: object_storage_root_password
      OBJECT_STORAGE_BUCKET: posthog
      # Disable external features for self-hosted MVP
      DISABLE_SECURE_SSL_REDIRECT: "true"
      IS_BEHIND_PROXY: "false"
    command: /compose/start
    depends_on:
      posthog-postgres:
        condition: service_healthy
      posthog-redis:
        condition: service_healthy
      posthog-clickhouse:
        condition: service_healthy
      posthog-kafka:
        condition: service_healthy
      posthog-objectstorage:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/_health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  posthog-worker:
    image: posthog/posthog:release-1.43.0
    container_name: posthog-worker
    restart: unless-stopped
    networks:
      - posthog-internal
    environment:
      <<: *posthog-env
    command: /compose/worker
    depends_on:
      posthog-web:
        condition: service_healthy

  posthog-plugins:
    image: posthog/posthog:release-1.43.0
    container_name: posthog-plugins
    restart: unless-stopped
    networks:
      - posthog-internal
    environment:
      <<: *posthog-env
    command: /compose/plugins
    depends_on:
      posthog-web:
        condition: service_healthy

networks:
  posthog-internal:
    name: posthog-internal
  # Connect to the main app internal network for ClickHouse query access
  internal:
    name: internal
    external: true

volumes:
  posthog_postgres_data:
    name: posthog_postgres_data
  posthog_clickhouse_data:
    name: posthog_clickhouse_data
  posthog_zookeeper_data:
    name: posthog_zookeeper_data
  posthog_kafka_data:
    name: posthog_kafka_data
  posthog_minio_data:
    name: posthog_minio_data
