#
# Selectorless Services + EndpointSlices for cross-VM connectivity.
# During the k3s transition, scheduler-worker runs in k3s while Temporal,
# Postgres, and App remain on the Compose VM. These resources let the pod
# reach them via standard K8s DNS (e.g., "temporal", "postgres", "app").
#
# Overlay replacements inject per-service addresses from inventory.env.
# Remove these resources when each dependency migrates to k3s.
#
# Pattern: Selectorless ClusterIP Service + user-managed EndpointSlice.
# Plain ClusterIP (not headless) gives a stable virtual IP with standard DNS.
# See: https://kubernetes.io/docs/concepts/services-networking/endpoint-slices/

# --- Temporal (gRPC) ---
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  ports:
    - port: 7233
      protocol: TCP
      name: grpc
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: temporal-external
  labels:
    kubernetes.io/service-name: temporal
    endpointslice.kubernetes.io/managed-by: cogni-dao/manual-endpoints
addressType: IPv4
endpoints:
  - addresses:
      - "10.0.0.1"
ports:
  - port: 7233
    protocol: TCP
    name: grpc

---
# --- PostgreSQL ---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  ports:
    - port: 5432
      protocol: TCP
      name: postgres
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: postgres-external
  labels:
    kubernetes.io/service-name: postgres
    endpointslice.kubernetes.io/managed-by: cogni-dao/manual-endpoints
addressType: IPv4
endpoints:
  - addresses:
      - "10.0.0.1"
ports:
  - port: 5432
    protocol: TCP
    name: postgres

---
# --- App (HTTP) ---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  ports:
    - port: 3000
      protocol: TCP
      name: http
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: app-external
  labels:
    kubernetes.io/service-name: app
    endpointslice.kubernetes.io/managed-by: cogni-dao/manual-endpoints
addressType: IPv4
endpoints:
  - addresses:
      - "10.0.0.1"
ports:
  - port: 3000
    protocol: TCP
    name: http
