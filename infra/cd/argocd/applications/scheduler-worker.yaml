#
# Argo CD Application for scheduler-worker (staging).
# Redundant with services-applicationset.yaml — kept for coverage check
# and as a standalone fallback if ApplicationSet is removed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scheduler-worker
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/cogni-dao/cogni-template.git
    path: infra/cd/overlays/staging/scheduler-worker
    targetRevision: staging
  destination:
    server: https://kubernetes.default.svc
    namespace: cogni-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
