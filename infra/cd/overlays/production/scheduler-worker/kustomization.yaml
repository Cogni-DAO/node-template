apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-production

resources:
  - ../../../base/scheduler-worker

# Image digest — updated by manual PR for production promotion.
images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    newTag: "production-placeholder-scheduler-worker"

patches:
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-production"
      - op: replace
        path: /data/APP_BASE_URL
        value: "http://app:3000"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "production-placeholder-scheduler-worker"

  # EndpointSlice IPs — 127.0.0.1 (single-VM: k3s + Compose on same host)
  - target:
      kind: EndpointSlice
      name: temporal-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["127.0.0.1"]
  - target:
      kind: EndpointSlice
      name: postgres-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["127.0.0.1"]
  - target:
      kind: EndpointSlice
      name: app-1
    patch: |
      - op: replace
        path: /endpoints/0/addresses
        value: ["127.0.0.1"]
