apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-production

resources:
  - ../../../base/akash-deployer

images:
  - name: ghcr.io/cogni-dao/akash-deployer
    newName: ghcr.io/cogni-dao/akash-deployer
    newTag: "production-placeholder-akash-deployer"

patches:
  - target:
      kind: ConfigMap
      name: akash-deployer-config
    patch: |
      - op: replace
        path: /data/LOG_LEVEL
        value: "info"
