apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-staging

resources:
  - namespace.yaml
  - ../../base/scheduler-worker

# Image digest — CI updates newTag to @sha256: digest via promote-k8s-image.sh
images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    newTag: "staging-placeholder-scheduler-worker"

# External service inventory → ConfigMap (non-secret routing data only).
# Sensitive values belong in Kubernetes Secrets (SOPS path).
configMapGenerator:
  - name: external-service-inventory
    envs:
      - inventory.env

generatorOptions:
  disableNameSuffixHash: true

# Inject per-service addresses from inventory into their EndpointSlices.
# Each replacement scoped by name — won't match unrelated EndpointSlices.
replacements:
  - source:
      kind: ConfigMap
      name: external-service-inventory
      fieldPath: data.TEMPORAL_ADDR
    targets:
      - select:
          kind: EndpointSlice
          name: temporal-external
        fieldPaths:
          - endpoints.0.addresses.0
  - source:
      kind: ConfigMap
      name: external-service-inventory
      fieldPath: data.POSTGRES_ADDR
    targets:
      - select:
          kind: EndpointSlice
          name: postgres-external
        fieldPaths:
          - endpoints.0.addresses.0
  - source:
      kind: ConfigMap
      name: external-service-inventory
      fieldPath: data.APP_ADDR
    targets:
      - select:
          kind: EndpointSlice
          name: app-external
        fieldPaths:
          - endpoints.0.addresses.0

patches:
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-staging"
      - op: replace
        path: /data/APP_BASE_URL
        value: "http://app:3000"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "staging-placeholder-scheduler-worker"
