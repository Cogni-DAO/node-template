#
# SOPS configuration for secret encryption at rest.
# Public keys are safe to commit — they can only encrypt, not decrypt.
# Private keys are stored as K8s Secrets in the cluster (one-time manual step).
#
# Generate keypair:  age-keygen -o age-key.txt
# Encrypt:           sops --encrypt --in-place secrets/staging/scheduler-worker.enc.yaml
# Decrypt (verify):  sops --decrypt secrets/staging/scheduler-worker.enc.yaml
creation_rules:
  - path_regex: staging/.*\.enc\.yaml$
    # Replace with actual staging age public key after generation
    age: "age1gwusglw4yl7yhmdym58rnyn6qzr29h5rjjgeajd4h6hqx9ny5gpsak0k5j"

  - path_regex: production/.*\.enc\.yaml$
    # Replace with actual production age public key after generation
    age: "age1z4ew2l0pyw4j59xvml95fyee56zgy94x36nerfeu505e56y083asx6ynlf"
